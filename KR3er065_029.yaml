body:
  text: 卷二十九腿股膝臏踝足病源流按銅人圖膝上曰髀膝上骨曰髀骨髀骨與髖骨接處曰骨髀樞穴名髀內曰股髀外曰腿腿下脛上接處曰膝膝之蓋骨曰臏膝下曰脛一名曰骭膝下之骨曰䯒骨䯒骨之外曰輔骨脛之後魚腹曰腨脛下跗上相接處曰腕腕骨曰踝足通謂之腳據此則腿股膝臏踝等皆屬於足凡腿股膝臏踝之病以足居下部皆當從下部治之也夫足之為病其大端有三曰厥厥者氣逆上之名不論寒厥熱厥皆從手足逆起雖厥之因不一大約由於腎虛經故曰腎虛則清厥意不藥又曰下虛則厥也另詳諸厥篇茲不贅曰痿痿者手足痿弱不能運動足為尤甚五臟雖各有痿由於下焦虛冷以致腳膝無力陽事不行者實多宜羊腎一枚煮熟和米粉六兩煉成乳粉空腹食之並有新娶後得軟腳病且痛甚者宜杜仲切一兩酒水各半盞煎服三日能行又三日愈矣至如感受寒濕亦能令腳痿行步不穩宜萆薢二十四兩杜仲八兩搗末每旦酒服三錢忌牛肉其詳在諸痿篇中茲亦不贅曰腳氣腳氣者全由受濕成病其間又有風濕寒濕濕熱之別並有食積流注之因東垣以為有南北之異南方多外感寒濕北方多內傷濕熱是也千金方云腳氣初起甚微飲食如故人多不覺惟卒然腳屈弱或腫痛發則經旬纍月往來寒熱大似傷寒瘧疾此可見腳氣之為病矣而其為病又有干有濕筋脈局縮攣痛枯細不腫為乾腳氣干即熱也當潤血清燥筋脈弛張而軟或浮腫或生臁瘡為濕腳氣當利濕疏風而其腫處則又分屬諸經前廉屬陽明宜白芷升麻葛根後廉屬太陽宜羌活防風外廉屬少陽宜柴胡內廉屬厥陰宜青皮川芎吳萸內前廉屬太陰宜蒼朮白芍內後廉屬少陰宜萆薢牛膝腳氣之候必身痛發熱惡食嘔逆或腹痛下利或少腹不仁或二便閉或驚悸昏潰或壯熱或身冷疼或轉筋或上腫下不腫或頑痹或緩縱或攣急或兩脛腫赤便當以腳氣治其風寒暑濕所勝亦各有症狀宜辨風勝者必自汗走注脈浮弦宜越婢加朮湯寒勝者必無汗攣急掣痛脈沉澀宜牛膝丸暑勝者必身熱煩渴脈洪數宜清暑益氣湯濕勝者必腫痛重著脈濡細宜除濕湯至腳氣為壅疾當疏下然太過則損脾不及則病不去如腳氣初發一身皆痛便溺阻隔當先用導氣之法宜羌活導氣湯再用方藥以除之宜當歸拈痛湯腳氣飲食不消心下痞悶必以開解為主宜開結導飲丸腳氣欲吐必每旦飽食午後少食日晚不食若餓可食豉粥覺不消欲致霍亂者宜高良薑一兩水三升煮一升頓服即消腳氣攻注腿脛痛宜田螺搗敷兩股便覺冷趨至足而安腳氣發作筋骨引痛宜金銀花末每二錢熱酒下腳氣不論男婦骨節皮膚腫疼痛宜五加皮丸腳氣腫痛成瘡腫爛不能步履脈沉緩由於寒濕為患宜沈氏腳氣湯腳氣由於寒濕未至成瘡但腿膝疼痛行步無力宜胡蘆巴丸腳氣上攻結成腫核宜甘遂末水調敷即濃煎甘草湯服即消腳氣風腫不仁宜萆麻葉蒸搗裹之日二三易腳氣脹滿非冷非熱或老弱人病此宜檳榔末茶調二錢服甚利腳氣濕瘡極癢有蟲宜烏臼根為末傅少時有涎出良腳氣由於酒毒危甚宜巴黃丸腳氣成漏跟有一孔深半寸許其痛異常宜人中白煅研有水出滴入瘡口腳氣病致腿肚轉筋宜蒜擦足心令熱即安仍以冷水食一瓣腳氣膝浮宜甘松香煎湯淋洗腳氣入腹脹悶喘急宜威靈仙末每二錢酒下痛減一分藥亦減一分腳氣入腹脅作痞塊大如石悶絶且死困不知人搐搦上視宜杉木節湯腳氣衝心為火氣上逆包以附子末津調塗湧泉穴內仍服湯劑宜四物湯加炒黃柏腳氣衝心悶亂不識人宜白檳榔十二個為分二服空心暖小便五合調下日二服或薑汁同酒服腳氣上衝亦有由於虛熱者宜金匱腎氣丸以上皆治腳氣病之大法也至如一切腿股脛膝雜病又可進詳之如濕鬱腳痠痛並引少腹及腰宜蠶砂防己杏仁滑石厚朴草果萆薢茯苓皮如老年膝痛牽引兩足不堪步履宜鹿角霜當歸蓯蓉薄桂小茄柏子仁如足膝腫痛久不止內熱宜生虎骨牛膝萆薢當歸仙靈脾金毛狗脊如腿骨麻疼由於勞力傷損宜生虎骨丸如痛著右腿深入筋骨肌肉不腫夜分勢篤由邪留於陰必從肝治宜歸鬚湯如足大拇指硬強而痛並嘔逆吐涎宜吳萸附子獨活細辛當歸漢防己如兩足皮膜撫之則痛脈弦而數由於肝邪犯胃胃厥所致宜川楝子青皮橘紅查肉延胡紫歸鬚桃仁黑山梔如血熱而少以致兩腿筋不舒展時覺微痛宜沈氏苧根湯雖自腿至足為病正多而從此類推庶可無誤矣脈法仲景曰腳氣之脈其狀有四浮弦為風濡濕氣遲澀因寒洪數熱鬱又曰尺脈虛弱緩澀而緊病為足痛或是痿病正傳曰微滑者虛牢堅者實三因曰腳氣之脈浮為風緊為寒緩細為濕熱又曰沉而弦者為風沉而緊者為寒沉細為濕沉數為熱腳氣古今異名醫鑑曰腳氣者古名緩風又謂之厥後人謂之腳氣後又以腳腫者名濕腳氣不腫者名乾腳氣漸而至於足脛腫大如瓜匏者有之腳氣原由症治綱目曰腳氣之疾實水濕之所為也其為病有症無名腳氣之稱自蘇敬始關中河朔無有也惟南方地下水寒其清濕之氣中於人必自足始故經曰清濕襲虛則病起於下是也靈樞曰脾有邪其氣流於兩股腎有邪其氣流於兩膕東垣曰水性潤下注之於足積久而作腫痛此飲食下流之所致也內經曰太陽之勝火氣內郁流散於外足脛附腫飲發於中附腫於下加之房事不節陰盛陽虛遂成痼疾孫真人云古人少有此疾自永嘉南渡後衣冠士人多有之亦此意也千金方曰凡腳氣之病起始甚微多不令人識也食飲嬉戲氣力如故惟卒起腳屈伸不能動作異耳又曰腳氣之疾皆由氣實而死終無一人以服藥致虛而殂故其病皆不得大補亦不可大瀉縱甚虛羸亦須微微通泄宜時取汗也入門曰腳氣外症全類傷寒但初起腳膝軟弱頑痹轉筋赤腫乃為異耳又曰濕熱在三陽則宜神祕左經湯在太陽麻黃左經湯在少陽半夏左經湯在陽明大黃左經湯或加味敗毒散通宜檳蘇散濕熱在三陰則宜羌活導滯湯搜風丸枳實大黃湯開結導引丸當歸拈痛湯氣血虛者獨活奇生湯羌活續斷湯寒濕盛則宜捉虎丹病久者卷柏散熱甚者加味蒼柏散腫甚者勝濕餅子桑白皮散直指曰腳氣為病雖起於足實周乎身或壯熱頭痛或百節拘攣或十指走注或轉筋急痛或小腹不仁以至胸滿喘息煩悶怔沖昏憒羞明腹痛下利嘔噦痰涎惡聞食氣二便祕澀腿至膝自脛及踝屈弱頑痹攣急痠疼或焮不焮或腫不腫皆其候也其傳足六經外症與傷寒頗類但卒然腳痛為異耳又曰治法大要疏導大便使毒氣得泄而後愈其用湯淋洗皆醫家之大戒也醫鑑曰腳氣治法用蒼朮白朮以治濕黃芩黃柏知母以治熱當歸白芍地黃以調血檳榔木瓜以調氣羌活獨活以利關節而散風濕兼用木通防己牛膝引諸藥下行此為治之大法清熱瀉濕湯亦可醫説曰人黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白人不耐風濕瘦人肉硬肥人肉軟肉軟則受病難愈腳氣惡候千金曰腳氣病但覺心下急氣喘不停或自汗出或乍熱乍寒其脈促短而數嘔吐不止者死上氣脈數不得臥者亦死上氣肩息胸脅逆臟急者亦死腳氣脈浮大而緊此最惡候之脈也若細而緊同是惡脈又曰腳氣病其小腹頑痹不仁者多不腫小腹頑後不過三五日即令人嘔吐名曰腳氣入心死在旦夕丹溪曰入腎則腰腳腫小便閉氣上喘急尺脈絶目皆黑光以腎乘心水剋火死不旋踵急以八味丸去山藥救之入門曰腳氣入腹喘急欲死宜木萸湯杉節湯三將軍元烏藥平氣湯救之禁忌法外臺祕要曰第一忌嗔嗔則必煩腳氣發第二禁大語大語則傷肺亦發動又忌露足當風入水以冷水洗足東垣曰凡飲食後宜緩行二三百步疲倦即止如此則不能成壅也凡飲食酒面勿過度過度則腳氣發欲不可縱嗜欲多則腳氣亦發以上言未髮腳氣平日保養法也千金曰腳氣之病極忌房室勿食牛羊魚肉蔥蒜韭菘菜酒面酥油豬雞鵝鴨惟食粳粟醬豉薑椒生果子犯禁者病不差入門曰最忌熱藥蒸泡恐逼邪入經絡也以上言已髮腳氣後保養法也腳氣按摩法養生書曰湧泉穴在足心濕氣皆從此入日夕之間常以兩足赤肉更次用一手握指一手摩擦數目多時覺足心熱即將腳指略略動轉倦則少歇腳力強健無痿弱痠痛之疾矣瘡瘍之發下部為多以下部易於傷濕濕鬱生熱風邪時毒又易相侵故多發外症也試即腿以下至足胕詳言其症其治發於腿髀及陰股者名曰陰疽其初起必腰胯發強口渴數欲飲而水不能多宜仙方活命飲若至七日發堅腫脹噁心煩躁者不治發於腿上筋骨之內痛如錐刺皮肉全無赤腫突起者名附骨疽俗謂之貼骨腿癰外由風露寒濕所侵內由醇酒厚味所注與積痰瘀血相搏而成初起痛不能轉側寒熱無汗宜青草蒼柏湯漏蘆飲子若得微汁便愈或至經久寒鬱為熱便成膿汁急用火針使毒不得內潰內急服藥宜內消升麻湯或有至於便祕者宜漏蘆飲子五香連翹湯下之如體弱不可下須用分經內托法或發在足尖宜內托羌活湯或發在腿內近膝股漫腫木硬宜內托耆柴湯或發在腿外宜內托酒煎湯或發在左腿外側漫腫長闊行走作痛以手按至骨大痛宜黃連消毒散或初起大痛而肉色不變宜三生散檳蘇散或漫腫作光色宜三生散或以神應膏為丸酒下三十丸或堅硬漫腫不辨肉色重按大痛此候多見於足少陽之分宜東垣柴胡鼠黏子湯足少陽分者左腿外側也若大腿近膝股內便屬足厥陰分或膿成便當針刺若待全熟則內潰益甚收斂愈難或潰後亦可以狗頭燒煙燻之宜平肌散或起於伏兔穴則死不治穴在腿外膝蓋上六寸至於未成骨疽但環跳穴痛不已即宜預防之宜青草蒼柏湯不效加麻黃一錢用二三帖然附骨疽與緩疽石疽賊風三者頗相類不可不辨蓋緩疽石疽皆由寒氣伏於骨體之間而成其熱勢緩慢積日不潰久方紫黑皮肉俱爛者名緩疽宜內托酒煎湯其腫與皮肉相似疼而堅硬如石名石疽宜生商陸根打爛和鹽許塗敷日換一次即軟甚有腫痛口乾煩熱四肢拘急者宜沉香湯由石疽推之又有石癰結硬發熱毒氣攻衝不定疼痛者是也宜黃連散賊風則由風邪搏於骨髓故其痛亦徹骨遇寒則更甚外症惡寒有汗痛處常欲熱尉失治則變為攣曲偏枯宜越婢湯然此三者雖與附骨疽相類究竟有別也發於大股之內陰囊之側者在左名上馬癰在右名下馬癰在肛門旁為肛門癰俱屬厥陰經濕熱及七情憂憤而成宜內補黃耆湯內托羌活湯十全大補湯繆仲淳云大抵瘡瘍初發必腫痛氣血鬱積蒸肉為膿其痛宜也潰膿之後腫散肌寬故痛則漸減若痛還不止是氣血不足宜大補之丹溪河間有虛甚之説仲淳此言蓋指凡屬瘡瘍言之不獨股疽也發於腿外側胯下名伏兔發即前所云起於伏兔穴者是也必寒熱大作疼痛無頭屬足陽明胃經病固為不治之症然急早治之或可希冀萬一速用隔蒜灸法灸而疱起者猶可治先汗下之宜紫金丹隨用止痛消毒藥宜仙方活命飲發於膝者名庇疽其狀大而肉色不變寒熱而堅按之如石者死症也若肌肉稍溫按之不至如石急用生商陸根擦之宜犀角湯去升麻加酒牛膝發於膝上或有在臂膊者名人面瘡狀如人面眼目口鼻皆具古書云是冤業所生須清心悔過乃得宜十六味流氣飲久者大苦參丸腎氣丸昔有人患此瘡以物餉之皆能食灌以酒面亦赤醫者歷試諸藥皆無苦至貝母其瘡乃聚眉閉口因即取貝母未和水灌入口中數日成痂而愈發於兩膝壅腫內外皆痛寒熱間作腿日瘦削膝獨腫大如鶴之股膝者名鶴膝風多由足三陰經虧損風邪乘之所致初起即當用蔥尉法令其內消為要著否則內熱食減肌肉漸瘦肢體攣痛其症有寒熱齊作者宜五積交加散加烏藥薑蠶有倏忽發熱者乃無根虛火也宜十全大補湯有臍腹疼痛溺頻頭暈吐痰者宜八味丸有血虛甚而發熱大渴面赤脈大者宜歸耆湯有陰虛形瘦發熱者宜腎氣丸有挾濕熱者宜蒼龜丸二妙蒼柏散有食少面黃者宜六君子湯有津液干中氣不足者宜補中益氣湯加五味子有至成膿潰爛者宜獨活寄生湯大防風湯有膿清而肌肉不生者宜八味丸皆當隨症施治而總治宜用隔蒜灸法內服大防風湯切不可針刺以致傷生而其由來亦有因腳軟痛難行漸成此症者然其名則曰痢風亦有因傷寒餘毒不能發散風寒濕氣結於經絡而成此症者亦即鶴膝風之原委而其為治則一雖然鶴膝風必兩膝壅腫其大概也若一膝引痛上下不甚腫而微紅則名膝遊風而不謂之鶴膝風矣宜防風通聖散加木瓜牛膝或換骨丹若但膝之兩旁腫痛憎寒壯熱晝夜偏劇腫處手不可近則名膝眼毒而不謂之鶴膝風矣宜勝金丹紫金丹仙方活命飲加牛膝若膝蓋上腫痛亦發寒熱則名膝癰而不謂之鶴膝風矣宜勝金丹紫金丹仙方活命飲加牛膝固知膝臏腫痛之病有非一端所當辨析以治之者也發於足小肚上半三四寸許大紅腫堅硬如石痛甚者名黃鰍癰由肝脾二經濕熱或積怒所致宜五香湯流氣飲加牛膝木瓜防己黃柏壯實者下之宜萬病解毒丹又有足小肚下半生疽寒熱煩躁名腓腨疽屬腎水不足積熱所致宜仙方活命飲加淮牛膝木瓜黃柏或八珍湯加牛膝壯實者下之宜一粒金丹虛極老弱者補之宜金匱腎氣丸又有似疽非疽似瘡非瘡生於脛上名曰兔齧其狀如赤豆根至骨不急治則殺人宜仙方活命飲加牛膝又有足脛之間生瘡狀如牛眼或紫或黑膿水淋漓止處即爛名濕毒流注緣風雨霧露寒濕邪氣侵入腠理所致也宜防風通聖散加牛膝木瓜防己或當歸拈痛湯加牛膝發於臁骨正面及內外兩臁者名臁瘡而以臁骨正面者為重以其骨上肉少皮薄難治也由本有濕熱下注瘀血凝滯又適為搔傷或磕撲破損而成又日逐步履多所傷動又午後氣多下墜愈覺腫痛是以纍年不愈致成頑瘡女人患此或經水往來或裙風相扇更難調治故其名曰裙風褲口瘡總之臁瘡之治當分正面內外三處其在正面漫腫作痛或不腫作痛三陰虛也甚則寒熱交作宜八物湯十全大補湯又有脾虛挾表邪者宜補中益氣湯加桔梗白芷又有脾虛濕熱流膿口乾食少者宜補中益氣湯加茯苓白芍甚則晡熱宜前方加熟地炒黑黃柏或挾怒氣宜前方加山梔川芎或更有郁宜歸脾湯加山梔柴胡皆當酌治又有患處黑黯肢體惡寒飲食少思者肝腎虛敗也宜八味丸效甚則內熱口乾宜腎氣丸或腎臟虛風宜四生散黃耆丸或日久不愈宜大苦參丸皆宜酌治若妄投攻伐之劑亦能殺人其在外臁有因風濕者宜洗以蔥湯貼龍骨膏有因風熱者宜馬齒膏有因濕熱者宜窯土膏有因血氣凝滯者宜小駐車丸加乳香少許摻之皆當酌治其在內臁初起時宜以鹽湯洗貼蠟礬紙勢甚重者宜桐油膏或癢甚者宜蘄艾膏或久不愈者宜先以爐灰膏點去瘀肉後貼黃蠟膏皆當酌治總之臁瘡有蠱必去蟲宜取蟲方臁瘡有惡血必去惡血宜針法臁瘡極臭爛必去臭治爛宜粉麝散而總治臁瘡必使其去腐生肌數日可愈宜沈氏二蠟膏至於禁忌第一房欲第二辛熱毒物第三多行履守此禁忌自愈不然雖藥何益矣發於內脛或臁上其瘡如癬初起兩足時熱腳跟作痛失治則延及脛股及遍身者名腎臟風瘡已詳前陰瘡條內互參可也發於足者名足發其原有二一由三陰經精血虧損其色微赤雖腫而膿清宜八味丸一由三陽經濕熱下注其色赤腫痛而潰膿急用隔蒜灸內服藥以先解壅毒宜仙方活命飲然後再補氣血宜補中益氣湯六味丸若色黯黑不腫不痛不潰膿煩熱作渴小便淋瀝者乃為陰敗未傳惡症也著肉用桑枝灸以行壅滯更服八味丸十全大補湯以壯脾胃滋化源多有得生者若專攻其症重傷元氣立斃之道也發於足旁者名癘疽其狀不大初從足小指生起急宜治之宜東垣柴胡鼠黏子湯牛膝湯下若覺有異者不可消宜托裡消毒散加牛膝不治必死發於足趺者名陽疽宜仙方活命飲加牛膝十日可刺二十日不穴者死赤白膿血不多瘡上癢及赤黑者亦死發於足指潰則指自脫者名脫疽俗名脫骨疽或云惟足大指名脫疽余指則名敦疽此因手大指生瘍名脫疽故在足亦云然也存參但此疽究為難治之症赤黑者必死救之之法惟見赤黑即急去其指與手大指疽同法內服仙方活命飲加牛膝如未赤黑可治也如初起焮腫宜萬病解毒丹必先外解其毒或未成而腫痛急用隔蒜灸內服藥宜仙方活命飲人參敗毒散加牛膝大黃白芷金銀花不可令見黑色則愈其輕者只如蛇傷瘴氣治之可也宜五神散發於腳膝始而腫繼乃潰爛成瘡者名腳氣瘡由腎虛為風濕所搏攻於腿下足上或由氣血壅滯濕毒在膚腠不得宣通所致若風毒不散其瘡漸出黃水腫痛身熱延遲太久亦能傷生至本症方治已詳前腳氣條茲不贅發於足指四邊焮腫黃水出浸淫相染五指俱爛漸漸引上足趺者名甲疽瘡又名嵌甲由足三陰經起於足指氣血沮而不行結於指甲之間此經絡之所流注非但肌肉之病也或又因裁剪指甲所傷或又因腳長履小研損肉分皆令氣血沮遏至於潰爛成疽宜緑礬散勝金散但足居下極足指下而更遠氣血易阻藥力一時難到稍涉虛弱尤宜大補方得斂口尤忌寒涼敷散又有腳指間濕爛或指甲角入肉刺損作瘡不可著履者須用藥蝕去惡肉生長好肉宜枯礬三錢黃丹五分研摻細細割去甲角便差又有因穿窄履而生肉刺在指間礙痛不得著履者宜大棗肉打爛敷貼候爛剔去凡此皆甲疽之屬也發於足指頭漸腫熱痛爪甲結膿甚至爪甲俱脫者名代指由熱氣所壅故也宜烏梅核中仁為末米醋調成膏先以芒硝煎湯洗淨浸指於膏內或以豬脂和蚯蚓糞搗敷亦效發於足背焮赤腫痛者名足跗發又名足面疽俗名腳發背此處為肝胃二經之會多因濕熱乘虛下注也宜百草膏仙方活命飲加木瓜牛膝肉桂膿清者不易治宜托裡溫中湯十全大補湯發於足跟者名足跟疽又名兔齧與脛間所生兔齧名同症異足跟乃足太陽經部分足跟骨下又陰陽二蹻發源之所又為腎經所過之地若患瘡毒則蹻氣不能發生腎氣亦由此而泄若三陰虧損者久不能使斂必瀝盡氣血而亡故凡漫腫寒熱體倦少食由脾虛下陷也宜補中益氣湯晡熱頭痛目不清由脾虛陰火熾也宜逍遙散佐以六味丸咳嗽有痰水虧金耗也宜十全大補湯八味丸此皆當滋其化源勿徒治其外也婦人足跟足指腫痛足心發熱皆因胎産或經行失於調理虧損足三陰虛熱所致故有腫痛或出膿者宜六味丸為主佐以八珍湯有胃虛少食者宜六味丸佐以六君子湯有寒熱內熱者宜六味丸佐以逍遙散晡熱甚頭目不清者宜六味丸佐以補中益氣湯大凡發熱晡熱內熱皆陰虛假熱丹溪云火起九泉陰虛假熱也酒色過度多患之陳文治亦云婦人血虛兩足發熱晡熱月經過期足跟作痛肝脾血虛也胸痞吐痰飲食不思脾胃氣虛也蓋胃為五臟之根本胃氣一虛諸病悉至矣宜補中益氣湯加茯苓半夏必服藥使胃氣漸復然後補之宜補中益氣湯佐以六味丸大約此症八珍湯是最要之藥發於足掌心者名湧泉疽與足發足趺發症治大略相似足心熱者由於陰虛宜四物湯加知柏飲食不思者由於脾虧宜補中益氣湯腎虛脾虧最為此症要治若專治瘡者往往致死然而此症又有難治易治之分如兩足心發徹骨者難治如腳心皮微破穴不深膿不多者易治湯藥通用仙方活命飲托裡消毒散加牛膝檳榔杜仲補中益氣湯腎氣丸至於潰後則用大防風湯十全大補湯八味丸蓋此固非輕症也雖然足之為病正有不可忽者如人走長路被石塊墊腫腳底不能行步痛不可忍名腳墊毒將舊草鞋浸尿桶內半日燒紅新磚放草鞋在上腳踏之令火逼尿氣入里即消若不早治必爛入腳亦能殺人蓋此症古方書罕載惟瘍科選粹有此方故録之至尋常走路腳腫痛者亦可用此法治之如腳跟皴裂者用桐油一碗男發一握熬至發化收貯毋令塵入每用以百沸湯洗令軟敷上即安如腳指縫搔癢成瘡血出不止者用多年糞桶箍蔑燒灰敷之如腳指縫患沙瘡者以燕窩土略炒黃柏末香油調敷痛者加乳香如腳裂縫者以五倍子末同牛骨髓填縫內愈或以蒸藕研成膏敷之亦愈手裂亦然如腳皴裂至春夏不愈者用生薑細糟白鹽臘豬油研爛擦入皴內一時雖痛少頃皮合再用則安矣腿足瘡瘍原由症治丹溪曰附骨癰熱在血分之極初起時先以青皮行氣甘草節消毒繼而養血誠萬全之法也薛立齋曰凡毒在下部藥氣難達勢重者砭患處去毒血仍服當歸拈痛湯虛者大補之陳文治曰方書相傳治臁瘡夾膏等方或效或不效蓋由氣稟與所感不同也要之必因其人或屬陰虛或屬脾虛或屬陰火或屬肝火或脾氣下陷濕熱滯於下部必內服湯劑用升舉之法然後外貼膏藥則經絡調和皮膚自合立齋又曰脫疽赤色作痛自潰者易治色黑不潰者不治蓋色赤作痛者元氣虛而濕毒壅盛也急以蒜隔灸次活命飲托裡散次用十全湯加減八味丸自效色黯不痛者腎氣敗而虛火盛也亦用隔蒜灸加用十全湯加減八味丸則毒氣不至上侵元氣不至虧損庶可保生其有因修手足口咬者惟避湯火風毒服藥自愈華他曰治嵌甲用硼砂乳香各一錢膩粉五分橄欖核三枚燒存性黃丹一錢真麻油調先用鹽湯洗淨拭乾敷之二次效丹溪曰嵌甲即甲疽又名陷甲割甲成瘡久不瘥用黃柏烏頭尖等分為末洗淨敷貼繆仲淳曰足跟疽由臟腑積熱所致忌毒藥敷貼宜隔蒜灸之服活命飲加牛膝肉桂又曰腳跟瘡久不愈毒氣攻注用白朮為細末先以鹽漿水溫洗乾摻上二日一換即能負重涉險又曰腿肚上瘡初生如粟以後漸大爬搔不已相沿成片黃水流出癢不可忍久成痼疾難愈先用貫衆煎湯洗後用百藥煎為末津調逐漸塗敷又曰腳脛生瘡名曰袴口或因磕損而成其瘡外狹內寬皮薄極癢又痛黃水長流延蔓而生甚則十餘年不愈且易染人須忌酒色用韭菜地干蚯蚓糞為末入輕粉清油或取白狗血調敷自效附録一切癰疽兼症方論發煩渴劉涓子曰熱毒方盛或發大渴此乃毒氣攻心令舌乾煩渴但補心氣即止薛立齋曰瘡瘍作渴焮腫發熱二便調和者熱在上焦也竹葉石膏湯腫痛發熱大便祕澀者內臟熱也四順清涼飲焮腫痛甚者熱毒蘊結也仙方活命飲漫腫微痛者氣血虛壅也補中益氣湯胃火消爍而津液短少者竹葉黃耆湯腎水乾涸作渴口苦幹燥者加減八味丸疽愈後發渴最惡候惟加減八味丸最妙蓋癰疽多因虛而得疽安發渴宜服此丸未渴先服永不發渴回春曰癰疽發渴乃氣血兩虛也黃耆六一湯寒熱得效曰癰疽未愈之間先嘔痰而寒熱汗出而止或連日或間日加味不換金正氣散薛立齋曰癰疽症口苦寒熱往來肝火血虛也托裡消毒散去白芷連翹金銀花加柴胡熟地因怒而寒熱肝火氣虛也前方加柴胡黃芩不應八珍湯加山梔棗仁龍膽草體倦寒熱肝脾氣虛也前方去金翹芷加參耆歸術不應補中益氣湯內熱晡熱而寒熱陰血虛也前方去三味加芎歸丹皮柴胡不應八珍湯加丹皮效畏寒者胃氣虛也前方去三味加參苓朮升麻不應補中益氣湯脅痛痞滿而寒熱肝氣滯也前方去三味加青皮木香不應屬氣血兩虛加參歸術作痛入門曰癰疽不可不痛亦不可大痛未潰時痛為熱毒甚或便祕內疏黃連湯膿脹痛者針之已潰膿出而反桶虛也宜歸耆湯精義曰癰疽寒熱虛實皆能為痛若熱毒痛以寒涼折其熱若寒邪痛以溫熱尉其寒虛痛補之熱痛瀉之綱目曰穢氣觸而痛和解之乳香芍藥之類風冷逼而痛溫散之防風桂枝之類回春曰膿血既泄腫痛尤甚人參黃耆湯薛立齋云瘡瘍之作由六淫七情其痛因氣血凝滯如熱毒在內便祕作痛導之內疏黃連湯熱毒熾甚焮腫作痛解之黃連解毒散不應用仙方活命飲瘀血凝滯作痛和之乳香定痛散作膿而痛排之托裡消毒散膿脹而痛針之膿潰而痛補之人參黃耆湯去蒼朮神麯氣虛而痛益之四君子湯加歸耆血虛而痛養之四物湯加參耆腎虛而痛滋之六味丸嘔逆丹溪曰未潰時嘔當作毒氣上攻治之乳粉托裡散潰後當作陰虛補之老年人潰後嘔不能食虛也參苓白朮膏河間謂瘡瘍嘔者濕氣侵於胃也多用白朮回春曰食不能下服藥而嘔六君子湯加木香砂仁薛立齋曰作嘔難泥毒氣上攻而概用敗毒等藥如熱甚焮痛而嘔邪氣實也解之仙方活命飲作膿焮痛而嘔胃氣虛也補之托裡消毒散膿熱焮痛而嘔氣血虛也泄之先用托裡散替針丸泄之焮痛便祕而嘔熱蘊於內也導之內疏黃連湯又有因寒熱傷胃而嘔者托裡健中湯有胃寒少食而嘔者托裡益中湯有中氣虛寒而嘔者托裡溫中湯有肝木乘脾而嘔者托裡抑青湯有胃脘痰停而嘔者托裡清中湯有因脾虛而嘔者托裡益黃湯有鬱結傷脾而嘔者托裡越鞠湯當各究其原而施治之丹溪雖有腫瘍作毒氣上攻潰瘍作氣虛之説亦大概言之耳大約熱毒內攻者少胃氣虛寒而嘔者多煩躁繆仲淳曰面目赤色煩熱作渴脈大而虛血脫髮躁也托裡消毒散去連芷銀花加歸耆佐以當歸補血湯身熱惡衣欲投涼水脈沉微氣脫髮躁也前方去三味加附桂或用附子理中湯頭痛眩暈薛立齋曰初腫時頭痛發熱邪在表也托裡消毒散加川芎羌活頭痛惡寒表虛也前方去銀花連翹加參耆倦怠眩暈中氣虛也前方去三味加升柴或補中益氣湯加蔓荊子日晡頭痛血虛也前方去三味加熟地佐以六味丸夢泄遺精頭暈痛或痰喘氣促腎虛不能納氣也前方去三味並川芎佐以六味丸不應大虛寒也用八味丸喘急陳文治曰癰疽喘急恍惚嗜臥肺脈洪數無力此心火刑肺金也當理氣化痰清肺人參平肺散若兼發熱作渴脈洪數有力此為火剋金之惡候加金解毒散面赤者不治痰多陳文治曰胸膈多痰脾氣虛也托裡消毒散去三味加桔梗半夏不應六君子湯加枳桔晡熱多痰脾血虛也前方去三味加歸地參耆咳嗽吐痰腎虧津液泛上也前方去三味加山萸山藥熟地佐以六味丸胸痞薛立齋曰胸痞有由氣滯者托裡消毒散加桔梗山梔或補中益氣湯加枳桔若倦怠胸痞氣虛也前方去三味加參朮茯苓不應八珍湯加柴胡自汗盜汗薛立齋曰體痛不寐而汗脾血虛也托裡消毒散去三味加茯苓遠志棗仁龍眼寐而汗出腎氣虛也前方去三味加參耆歸朮五味子目斜上視瘍科選粹曰癰疽目斜視上黑睛緊小白睛青赤乃肝挾火邪故肝脈弦緊洪數必祛肝經之火邪瀉青丸甚至有瀉利者前方去大黃加荊芥或用黃連瀉心湯一二帖四肢沉重瘍科選粹曰此乃七惡中之五惡也胃苓湯若服此湯脾氣醒濕氣除必須大補參苓白朮散大便祕結東垣曰瘡瘍熱毒深固嘔啘心逆發熱而煩脈沉而實腫硬木悶大便祕結此毒在臟腑宜疏通之故曰疏通其內以絶其源內疏黃連湯甚則用五利大黃湯又曰瘡瘍及諸面赤雖有伏火不得妄攻其里若陽氣怫鬱邪氣在經宜表發以去之故曰火鬱則發之白芷升麻湯繆仲淳曰凡痞脹大便不通乃直腸乾涸導之豬膽汁法或腸胃氣虛血涸不通培養之十全大補湯若潰瘍見此症因氣血虧損腸胃乾涸法當大補為主若不審虛實一於疏利必致大誤瀉利直指曰癰疽泄瀉宜乳粉托裡散再以木香茯苓煎湯調下加味不換金正氣散佐之回春曰腹痛泄瀉咳逆昏憒急用托裡溫中湯薛立齋曰脾氣虛寒腸鳴泄瀉腹冷托裡消毒散去三味加炮薑木香手足逆冷虛寒日甚本方三味加附子煎送四神丸瘍科選粹曰瘡瘍大便泄瀉或因寒涼克伐脾氣虧損或因脾氣虛弱食不克化或因脾虛下陷不能升舉或因命門火衰不能生土或因腎經虛弱不能禁止或因脾腎虛寒不能司職主治之法若寒涼傷脾六君子湯加木香砂仁送二神丸脾虛下陷補中益氣湯送二神丸命門火衰八味丸料送四神丸腎虛不禁薑附湯加吳萸五味子脾腎虛寒叄附湯送四神丸凡腸鳴泄瀉多屬脾氣虛寒法宜溫補治如前法多有可生小便淋閉頻數繆仲淳曰瘡瘍小便淋閉頻數或莖中澀痛者腎經虧損之惡症也宜補陰加減八味丸足脛逆冷者宜補陽八味丸若小便頻而黃宜滋腎四物湯加參朮麥冬五味子若小便短少宜補脾肺補中益氣湯加山藥麥冬五味子若熱結膀胱而不利宜清熱五淋散若脾氣燥而不能化宜滋陰黃芩清肺飲若膀胱陰虛陽無以生六味丸若膀胱陽虛陰無以化滋腎丸腎虛之患多傳此症非滋化源不救若用知柏反瀉其陽以速其危若老人陰痿思欲精內敗莖中澀痛不利者加減八味丸加牛膝車前不應更加附子薛立齋曰莖中痛小便不利內敗也托裡消毒散去三味加山萸山藥澤瀉愈便愈痛前方去三味煎送六味丸食少體倦口乾飲熱小便黃短脾肺虛熱也前方去三味加山萸五味佐以六味丸勞役便黃元氣陷也前方去三味加升柴午後小便黃短腎虛熱也前方去三味加升柴煎送六味丸出血瘍科選粹曰瘡瘍出血因五臟之氣虧損虛火動而妄行也犀角地黃湯為主氣血俱虛十全大補湯陰火動六味丸氣虛補中益氣湯又曰瘡瘍出血煩躁脈洪大無力當歸補血湯或八珍湯加黃耆山梔尤妙又曰血脫補氣此陽生陰長之理四君子湯加芎歸熟地若用涼血降火沉陰之劑則脾土復傷不但血不歸原而命亦不保矣薛立齋曰膿多帶赤血虛也托裡消毒散去三味加歸地參術不應八珍湯加丹皮忿怒後晡熱血出肝火血虛也前方去三味加丹皮山梔熟地不應八珍湯面青脅脹而出血肝氣虛而不能藏血也前方去三味加山藥山萸五味子兼用六味丸食少體倦出血脾氣虛而不能攝血也前方去三味加參朮歸地不能寐加茯神棗仁遠志龍眼或兼用歸脾湯陽氣脫陷薛立齋曰瘡瘍陽氣脫陷或因克伐太過或因膿血大泄或吐瀉之後或因誤入房室若發熱頭痛小便淋澀或滑數便血目赤煩喘氣短自汗頭暈倦怠惡寒汗出如水此為無根虛火之假熱症若畏寒頭痛喘咳嘔逆耳聵目朦小便難腸鳴瀉利裡急腹痛玉莖縮冷汗牙疼此為陽氣脫陷之真寒症勿論其脈勿論其瘡急宜參附補之以上十七條本遍身一切癰疽之兼症不獨腿足瘡瘍為然也今附録於後者亦欲人易於觀覽耳治腿股膝臏踝足病方三十五越婢加朮湯風勝麻黃石膏生薑甘草白朮大棗牛膝丸因寒牛膝二兩川椒五錢附子一錢虎脛骨六錢蜜丸酒服清暑益氣湯因暑人參黃耆白朮蒼朮麥冬茯神升麻葛根黃柏青皮歸身五味子除濕湯因濕半夏蒼朮厚朴藿香陳皮甘草白朮茯苓木瓜檳榔白芷薑棗羌活導氣湯導氣羌活獨活防己枳實大黃當歸開結導飲丸開結陳皮白朮茯苓半夏澤瀉麥芽枳實神麯乾薑青皮四物湯衝心川芎當歸白芍地黃金匱腎氣丸虛熱熟地山藥山萸丹皮茯苓澤瀉附子肉桂牛膝車前子五加皮丸腫濕五加皮四兩酒浸遠志四兩酒浸曬研酒糊丸空心酒下四五十丸沈氏腳氣湯瘡爛萆薢五錢茯苓桑枝各三錢蒼朮苡仁牛膝各二錢秦艽澤瀉各錢半此余自制方也用之無不效重者不過三四服愈胡蘆巴丸寒濕胡蘆巴酒浸一宿焙破故紙各四兩共研以木瓜切頂去瓤安藥在內令滿頂蘞合蒸爛搗丸每七十丸空心酒下巴黃丸酒毒巴戟五錢糯米炒米微轉色去米大黃一兩炒蜜丸水服仍須禁酒杉木節湯入腹杉木節一升橘葉切一升無葉則以皮代之檳榔七枚童便三升煮一升半分二服若一服得快即停後服此方兼治霍亂上氣悶絶者生虎骨丸麻疼生虎骨四兩金毛狗脊八兩五加皮仙靈脾牛膝白茄根油松節各二兩獨活一兩歸鬚湯右痛生杜仲一兩歸鬚穿山甲各二錢乾地龍小茴各一錢北細辛三分沈氏苧根湯腿痛炒杜仲三錢炒當歸酒川斷核桃肉酒杞子白苧根各二錢炒桑枝四錢二煎加秦艽桃仁紅花各二錢將藥渣用絹袋乘熱包在不舒展處遠之四五服愈此余自制方也用之無不效神祕左經湯三陽麻黃肉桂枳殼黃芩柴胡半夏羌活赤苓防風厚朴小草白薑防己麥冬葛根細辛甘草各五分大棗此方專治風寒暑濕流注足三陽經腳膝拘攣腫痛加味敗毒散又人參敗毒散一兩加大黃蒼朮各一錢薑三片薄荷七葉或人參敗毒散加羌活獨活柴胡前胡枳殼桔梗川芎赤苓人參甘草各一錢此方專治三陽經腳氣流注腳踝焮熱赤腫寒熱自汗檳蘇散又蒼朮二錢香附蘇葉陳皮木瓜檳榔羌活牛膝各一錢甘草三分薑三片蔥白二莖此方專治風濕腳氣腫痛拘攣用此疏通氣道羌活導滯湯三陰酒煨大黃二錢四分羌活獨活各錢二分防己歸尾各七分枳實五分微利即止此方專治腳氣初發一身皆痛或肢節腫痛便尿阻隔先以此導之後用當歸拈痛湯除之當歸拈痛湯又羌活茵陳酒黃芩炙草各一錢知母澤瀉赤苓白朮豬苓防己各六分人參苦參升麻葛根當歸蒼朮各四分水二盞浸藥時許煎半空心臨臥各一服搜風丸又黑牽牛子生取頭末二兩大黃枳實檳榔各五錢糊丸米飲下枳實大黃湯又酒大黃三錢羌活錢半當歸一錢枳實五分空心服開結導引丸又陳皮白朮澤瀉茯苓神麯麥芽半夏各一兩枳實青皮乾薑各五錢巴霜錢半餅糊丸此方能治腳氣挾食積流注心下痞悶獨活寄生湯肝腎虛獨活白芍當歸桑寄生各七分熟地川芎人參茯苓牛膝杜仲秦艽細辛防風肉桂各五分甘草三分薑三片此方能治肝腎虛弱筋攣骨痛腳膝偏枯緩弱冷痹羌活續斷湯又羌活防風細辛白芷杜仲酒牛膝秦艽川斷熟地人參白芍當歸赤苓肉桂川芎各五分薑三片前方桑寄生無真者則用此方捉虎丹寒濕盛五靈脂白膠香草烏黑豆同煮去豆木鱉子地龍各兩半乳香沒藥當歸各七錢半麝香京墨煅各三錢五分糯米糊丸芡子大空心酒下一丸趕到腳面赤腫下散趕至腳心中出黑汗乃除根又名一粒金丹此方專治腳氣走注疼痛不可忍卷柏散久病卷柏東向者先用鹽水煮半日再用淡水煮半日焙乾黑牽牛子頭末甘遂檳榔上各為末不得相雜每服各稱一錢惟檳榔末二錢五更初濃煎蔥白湯調下至辰巳時取下惡物如魚凍虛人減半隨吃淡物更服湯藥如清熱除濕湯調理之此方主遠年腳氣不愈者惟服此特效清熱瀉濕湯又鹽酒炒黃柏蒼朮各一錢紫蘇葉赤芍木瓜澤瀉木通防己檳榔枳殼香附羌活甘草各七分痛加木香腫加大腹皮熱加黃連大黃加味蒼柏散熱甚蒼朮一錢白朮八分知母黃柏黃芩各六分當歸白芍生地各四分木瓜檳榔羌活獨活木通漢防已牛膝各三分甘草一分薑三片勝濕餅子腫甚黑醜二兩取頭末五錢白醜二兩取頭末五錢甘遂五錢蕎麥麵兩半水調和藥作餅子如錢大飯上蒸熟每空心茶嚼一餅以利為度此治遠年腳氣足脛腫如瓜瓠桑白皮散又赤苓二錢木香防己檳榔各錢二分桑皮郁李仁各一錢蘇葉本通大腹子青皮各七分薑三片木萸湯入腹木瓜檳榔各二錢半吳萸錢半三將軍元又吳萸木瓜大黃等分糊丸枳殼湯下此治腳氣衝心大便不通烏藥平氣湯又烏藥一錢茯神人參白朮五味子川芎木瓜當歸白芷蘇葉各七分甘草三分薑五片棗二枚此方專治腳氣上攻昏迷喘促治腿股膝臏踝足瘡瘍方六十七仙方活命飲陰疽穿山甲白芷防風赤芍皂角刺甘草歸尾貝母花粉各一錢金銀花陳皮各三錢乳香沒藥各一錢另研末水酒各半煎送下二末青草蒼柏湯附骨疽蒼朮黃柏各三錢青皮錢半甘草五分加薑汁少許虛人加牛膝一錢夏加黃芩八分冬加桂枝五分痛甚無汗加麻黃二分此能治環跳穴痛不已內消升麻湯又大黃升麻枳實黃芩當歸白芍各一錢炙草八分稍熱服漏蘆飲子又漏蘆白斂黃芩麻黃枳實升麻白芍甘草朴硝各五分大黃一錢五香連翹湯又沉香木香丁香藿香麝香用少許連翹射干獨活升麻炙草大黃桑寄生各五分一方有黃耆木通水煎取利為效此方兼治諸瘡初覺一二日厥逆咽喉塞發寒熱如不用五香名七味連翹湯內托羌活湯又羌活黃柏各一錢防風藁本連翹炙草蒼朮陳皮各八分肉桂五分內托耆柴湯又黃耆二錢柴胡一錢羌活五分連翹錢半歸尾七分半肉桂三分生地黃柏各二分土瓜根酒洗錢二分水二盞酒一盞煎熱服二服即效驗過此方能治足太陰厥陰經分瘡生腿內近膝股或癰或附骨疽初起腫痛勢大內托酒煎湯又黃耆歸尾各二錢柴胡一錢半連翹肉桂牛蒡子白芷各一錢升麻七分黃柏甘草各五分水酒各半煎此方能治足少陰經分癰生腿外側或因寒濕得附骨疽或微侵足陽明經分堅硬腫痛不能行黃連消毒散又酒黃連酒生地酒歸身羌活連翹黃耆黃芩黃柏獨活酒防己防風藁本蘇木陳皮桔梗各一錢酒知母四分甘草梢人參各五分水煎入酒少許服此方兼治腦疽背疽焮腫疼痛或麻木檳蘇散又蘇梗香附各二錢甘草陳皮檳榔木瓜各一錢薑蔥三生散又露蜂房蛇退頭髮洗淨等分各燒灰存性研細酒下三錢神應膏又當歸兩一錢赤芍大黃各兩半白芷官桂各一兩元參兩三錢川斷兩二錢莪朮九錢生地兩二錢真香油二斤浸藥春五夏三秋七冬十日熬黑去渣夏用黃丹二十兩冬十五兩漸下不住攪滴水沉為度此藥本治漏瘡塞孔內並作貼子護柴胡鼠黏子湯又連翹肉桂各一錢黃柏炙草各五分歸梢黃耆各二錢柴胡鼠黏子各錢半酒煎空心服服後即飯不使熱藥犯上焦也平肌散又密陀僧煅赤色花蕊石煅赤色白龍骨各一兩黃丹炒乳香另研黃連各二錢半輕粉一錢研極細乾摻此方兼治諸瘡久不斂沉香湯石疽沉香木香防風各七錢半羚羊角麥冬當歸枳殼升麻元參赤芍地骨皮生甘草各一兩炒大黃二兩每末四錢水煎服黃連散石癰黃連大黃牙硝白斂黃柏各一兩血竭青鹽各五錢赤小豆半合杏仁去皮尖四十九粒蜜水調塗干即易之越婢湯賊風內補黃耆湯股疽黃耆二錢鹽水炒熟地人參茯苓炙草各五分白芍川芎官桂遠志當歸各八分麥冬五分薑三片棗三枚十全大補湯又人參茯苓白朮炙草川芎當歸白芍熟地黃耆肉桂薑棗紫全丹又犀角湯疪疽犀角木香各七錢半山梔仁連翹射干當歸赤芍升麻元參枳殼生甘草各一兩大黃二兩每末三錢水煎服此兼治癰疽腫硬如石久不作膿十六味流氣飲人面瘡人參黃耆當歸各一錢川芎肉桂厚朴白芷甘草防風檳榔烏藥白芍枳殼木香各五分桔梗三分紫蘇錢半水煎食後服若因怒加青皮一錢大苦參丸又苦參二兩防風荊芥白芷生川烏赤芍首烏川芎獨活蔓荊子山梔皂角赤苓山藥羌活黃耆白蒺藜白附子各五錢炮草烏錢半麵糊丸空心酒茶任下金匱腎氣丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂牛膝車前子五積交加散鶴膝風白芷當歸茯苓半夏川桂枝川芎白芍甘草枳殼麻黃陳皮桔梗厚朴乾薑蒼朮人參羌活獨活柴胡前胡此即五積散合人參敗毒散也此方兼治寒濕身體重痛腰腳痠疼八味丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂歸耆湯又當歸一錢黃耆五錢蒼龜丸又蒼朮白芍龜板各二兩半黃柏五錢粥丸每五十丸四物湯加陳皮甘草煎湯下此方兼治痢後腳弱漸小二妙蒼柏散又蒼朮鹽炒黃柏酒炒各五錢水煎服二物皆有雄壯之氣如氣實加酒少許氣虛加補氣藥血虛加補血藥痛加薑汁或為末為丸皆可此方兼治一切風寒濕熱腳氣骨間作熱或腰膝疼痹腫痛令人痿躄用之神效六君子湯又人參茯苓白朮炙草半夏陳皮補中益氣湯又獨活寄生湯又獨活桑寄生白芍當歸各七分熟地川芎人參茯苓牛膝杜仲秦艽細辛防風肉桂各五分甘草三分薑三片大防風湯又熟地防風杜仲薑汁妙當歸黃耆白芍各一錢附子川芎各七分半羌活人參酒牛膝炙草各五分白朮錢半薑棗空心服此方芎歸芍地以補血參耆朮草以補氣羌防以散風濕利關節杜仲牛膝以補腰膝附子以行參耆之氣而走周身脈絡乃治氣血兩虛挾風濕而成痿痹之聖藥豈但治鶴膝而已但不可以之治有餘耳防風通聖散膝遊風赤芍芒硝川芎滑石煅大黃桔梗荊芥石膏麻黃各四分半山梔白朮連翹當歸薄荷甘草黃芩防風各八分表裡實二便祕方可用勝金丹膝眼毒白砒制麝香各五分真蟾酥一錢雄黃辰砂乳香沒藥血竭各錢半全蠍炮天龍去頭足炙穿山甲炙各三錢薑蠶炒五錢每末三錢砂糖調蔥頭酒送下取汗五香湯黃鰍癰青木香藿香沉香丁香薰陸香各一兩流氣飲又人參肉桂桔梗當歸黃耆甘草厚朴紫蘇白芍烏藥枳殼防風檳榔川芎白芷木香生薑痛加乳香沒藥氣滯加香附胃虛加陳皮流注加羌活獨活此乃行氣散血之劑不宜多服以致氣血虛耗反不能成膿也此又名瘡科流氣飲此方主恚怒氣結成核腫硬及風寒濕熱搏結經絡或血氣不和結成腫塊漫腫木悶者神效當歸拈痛湯濕毒一粒金丹腓腨疽沉香木香乳香各五分巴霜錢半棗肉丸服法詳在前八物湯臁瘡歸脾湯又黃耆丸又黃耆烏藥地龍茴香川楝肉川椒防風赤小豆白蒺藜海桐皮威靈仙陳皮等分酒糊丸空心酒下三十丸此方專治腎臟虛風攻注手足頭面麻痹痛癢或生瘡疥臁瘡焮腫四生散又生白附子生黃耆生獨活生蒺藜各五分共為末以不落水豬腰子批開入藥末濕紙包煨熟空心連腰子細嚼鹽酒下此方兼治風癬疥癩血風等瘡龍骨膏又龍骨密陀僧乳香沒藥各二錢海螵蛸錢半肥皂子燒存性五個香油調用棉紙作夾膏以針刺眼縛貼瘡上間日一翻兩面貼之馬齒膏又馬齒莧煎汁一鍋去渣入黃蠟五兩漫火熬膏塗瘡上窯土膏又多年窯灶土或只用灶心土黃丹輕粉黃柏乳香沒藥赤石脂等分清油調成膏用傘紙夾住茶清洗過貼之以絹縛雖癢不可動直待成痂方揭未愈再貼小駐車丸又黃連六錢阿膠三錢當歸二錢乾薑一錢醋糊丸蠟礬紙又麻油二兩川椒四十九粒銅杓內煎黑入一寸長槐枝四十九段煎黑入黃蠟一兩輕粉研二錢枯礬研一錢候化將棉紙照瘡大剪十二塊四角用紙釘住投油內滲透為度勿使紙黃先以槐枝蔥椒煎湯洗將紙貼上外用油紙包裹紅絹緊扎一周時揭起去近內紙一層十二日揭盡瘡愈桐油膏又桐油百草霜發灰黃丹乳香鹿角灰各三錢共為細末熬膏塗油紙上貼之血虛痛甚者尤宜如年久紫黑者先用爐灰膏去瘀肉蘄艾膏又蘄艾川椒各五錢黃丹三錢水飛水粉一兩輕粉一錢熟麻油調膏隔紙貼爐灰膏又響糖爐內灰一升半風化石灰一升炒紅盛箕內用滾湯三碗徐徐淋汁漫火熬如稀糊先下巴霜次下蟾酥各二錢白丁香研末五分炒石灰一錢攪勻再熬如麵糊磁器盛勿泄氣每用以簪頭挑少許口呵氣令化以針撥開患處貼之此方治一切無名腫毒惡瘡及外痔瘰癧兼除瘤點痣有膿去膿無膿即散惟好肉及眼上忌用如點瘰癧去蟾酥加輕粉一錢痛者加乳香沒藥各一錢瘤痣只用灰膏不必用藥黃蠟膏又香油一兩入胎髮梅大一團熬化入白膠香黃蠟各一兩化再入龍骨赤石脂血竭三末各一兩攪勻候冷磁器收每用捏作薄片貼瘡上外以絹縛三日後翻貼外面又以活血藥煎湯洗取蟲方又生鱔魚數條以清油塗腹下置瘡上盤屈以帛系定少頃癢不可忍然後取視腹下有小竅皆蟲也針法又臁瘡色紫黑先以三稜針去惡血冷水洗淨乃貼膏藥忌日光火氣陽氣如黑腫未盡可再出血以紫黑血盡為度粉麝散又生龜殼一個醋一碗塗炙醋盡為度火煅放冷為末入輕粉麝香各一錢和勻先以蔥湯洗後塗上沈氏二蠟膏又真菜油四兩入連須蔥白三個川椒十四粒熬至二物色枯去渣再入白蠟黃蠟白礬各二殘熔化離火俟沸稍定入東丹三錢急急攪勻倒在碗內放陰土地上一日夜去火毒然後將生礬五六分滾水泡一碗將瘡洗淨拭乾將藥塗上如錢厚以油紙貼外以粗草紙略揉軟蓋上絹帛縛之每日一洗一塗縛扎如法數日即愈矣但瘡雖愈四邊必多水泡癢極切不可爬搔若搔碎即又成瘡矣故雖愈仍將藥照舊洗塗並水泡亦塗在內如是三四日全愈不癢矣此余自制方也屢試屢驗並治下部濕毒瘡托裡消毒散癘疽人參鹽水炒黃耆酒當歸炒白芍炒白朮川芎茯苓各一錢白芷金銀花連翹各七分炙草五分萬病解毒丹又五倍子捶碎洗淨焙乾三兩山茨菰去皮淨末二兩千金子去殼油淨霜大戟去蘆焙乾為末各一兩麝香三錢另研糯米濃飲丸分為四十錠此藥能應諸病各有神效若瘡疽用東流水磨塗並可服須端午日合一名玉樞丹一名紫金錠一名萬病解毒丸一名神仙萬病解毒丸一方有全蠍硃砂雄黃各一兩名神仙追毒丸人參敗毒散脫疽人參羌活獨活柴胡前胡桔梗枳殼茯苓川芎甘草各一錢五神散又金線釣葫蘆紫河車各二錢千金子霜雄黃各一錢麝香少許醋調塗之此方兼治一切蛇蠍傷瘴毒氣毒盛者以刀割去死肉以末摻之緑礬散甲疽緑礬煅過五錢蘆薈錢半麝香一字共研末照指作絹袋盛藥套指上以線扎住久而自愈制緑礬法用緑礬三兩鐵盤內炭火封煅火熾礬熔流出液汁如熔金者汁盡去火俟冷取其赤似黃丹者用之或以此礬為主入乳香三分之一為末鹽湯洗淨拭乾敷之治傷甲肌浸淫腫痛流出黃水漸引上腳四邊腫爛如火燒瘡內服勝金散勝金散又牡蠣厚頭生研為末每二錢酒研靛花下日三服已潰者以緑礬散敷之百草膏足跗發羊糞三十粒瓦上炙煙盡覆地存性研篩先用椒湯洗淨麻油調敷癢加輕粉少許痛加麝香少許以山茶葉裹之絹縛托裡溫中湯又附子羌活各四錢炒乾薑二錢炙甘草二錢丁香益智仁沉香木香茴香陳皮各一錢薑此方專治瘡瘍膿潰元氣虛寒或過服克伐以致胃氣脫陷腸鳴腹痛大便溏瀉神思昏憒此寒變內陷緩則不治逍遙散足跟疽柴胡白芍白朮茯苓當歸身麥冬各一錢甘草薄荷各五分薑六味丸又熟地山藥山萸丹皮茯苓澤瀉加減八味丸脫疽熟地八兩茯苓丹皮澤瀉各三兩肉桂五味子各一兩山藥山萸各四兩蜜丸一方五味二兩山萸山藥丹皮各一兩茯苓澤瀉肉桂各五錢生地二兩酒蒸搗膏附録一切癰疽兼症方竹葉石膏湯煩渴淡竹葉石膏桔梗木通炙甘草薄荷各一兩水煎四順清涼飲又大黃當歸赤芍炙草各錢二分薄荷十葉仙方活命飲又穿山甲白芷防風甘草赤芍花粉歸尾貝母角刺各一錢陳皮金銀花各三分乳香沒藥各一錢另研水酒煎送二末補中益氣湯又人參黃耆歸身白朮陳皮甘草升麻柴胡竹葉黃耆湯又生地黃耆各二錢竹葉當歸川芎甘草白芍黃芩人參花粉各一錢熟石膏錢半麥冬二錢薑三片此方治癰大渴發熱小便如淋加減八味丸又熟地茯苓丹皮澤瀉肉桂五味子山藥山萸分量見前黃耆六一湯又黃耆鹽水炙六兩甘草一兩半生半熟每末一兩水煎加人參尤妙或白湯下二錢加味不換金正氣散寒熱蒼朮橘紅半夏曲藿香葉厚朴各錢二分半炙草一錢茯苓川芎各七分半木香五分薑五棗二托裡消毒散又人參黃耆當歸白芍白朮川芎茯苓各一錢白芷金銀花各七分炙草連翹各五分內疏黃連湯作痛黃連黃芩山梔白芍薄荷當歸檳榔桔梗甘草木香各一錢連翹大黃各錢半水煎量人虛實而用人參黃耆湯又人參麥冬蒼朮當歸神麯白朮甘草陳皮五味各一錢蜜黃耆二錢黃柏升麻各四分薑棗此方專治膿血大泄臭敗作痛薛云此症乃七惡中之二宜治以此方亦有潰後虛而發熱或作痛者尤妙若痛止而大便不實去黃柏麥冬黃連解毒散又黃連黃芩黃柏山梔歸耆湯又黃耆當歸瓜蔞甘草角刺金銀花各一錢水煎好去渣入乳香加酒再煎服或加貝母花粉穿山甲尤妙四君子湯又人參茯苓白朮甘草四物湯又川芎當歸白芍熟地六味丸又熟地山藥山萸丹皮茯苓澤瀉乳香定痛散又乳香沒藥各五錢寒水石滑石各一兩冰片一錢共為末擦患處立止加南星半夏能止痛加萆麻仁尤佳乳粉托裡散嘔逆緑豆粉四錢乳香一錢共為末每二錢甘草湯調時時呷下一名護心散一名內托散一名內托香粉散一方治癰疽疔瘡惡瘡須服以預防毒氣攻心迷悶嘔吐喉舌生瘡用緑豆粉四兩乳香一兩硃砂三錢每末二錢甘草湯調下名乳香護心散參苓白朮膏又人參茯苓白朮山藥炙甘草各一兩苡仁蓮肉桔梗砂仁白扁豆各五錢六君子湯又人參茯苓白朮炙草半夏陳皮托裡健中湯又半夏炮薑各一錢炙草五分黃耆錢半人參白朮茯苓各二錢肉桂三分托裡益中湯又人參白朮茯苓陳皮半夏炮薑木香炙草薑棗托裡溫中湯又附子羌活各四錢炒乾薑三錢炙草二錢丁香益智仁木香沉香茴香陳皮各一錢薑棗托裡抑青湯又人參白朮茯苓半夏各一錢柴胡白芍甘草各五分陳皮八分薑棗托裡清中湯又人參白朮茯苓陳皮各一錢半夏八分桔梗七分甘草五分薑棗托裡益黃湯又人參白朮茯苓陳皮半夏各一錢炮薑丁香炙草各五分薑棗托裡越鞠湯又人參白朮各二錢半夏陳皮各一錢山梔川芎香附蒼朮各七分炙甘草五分薑棗當歸補血湯煩躁黃耆一兩酒當歸三錢八味丸頭痛暈眩熟地山藥山萸丹皮茯苓澤瀉附子肉桂人參平肺散喘急桑皮知母各七分杏仁紫蘇地骨皮橘紅半夏茯苓青皮人參各一錢五味子二十一粒甘草五分薑三片如金解毒散又瀉青丸目斜川芎當歸山梔羌活防風大黃龍膽草等分蜜丸茨子大竹葉湯下一二丸日進三四服如瀉者去大黃加荊芥黃連瀉心湯又胃苓湯四肢厚朴陳皮白朮甘草各一錢茯苓錢七分白芍澤瀉木香各一錢官桂五分竹葉二十片蒼朮二錢薑三片棗三枚參苓白朮散又人參茯苓白朮蓮肉砂仁苡仁山藥各二兩桔梗甘草扁豆炒各一兩每末二錢石菖蒲湯下五利大黃湯大便祕大黃黃芩升麻各錢二分芒硝山梔各一錢水煎稍熱服白芷升麻湯又白芷七分升麻桔梗各五分甘草生黃芩生歸梢生地各一錢肉桂紅花各分半酒黃芩連翹各二錢水酒各半煎十全大補湯又二神丸瀉利破故紙四兩肉豆蔻二兩紅棗四十枚生薑四兩煮丸食前白湯下此方主五更泄瀉大便不實不應乃命門火衰急佐以八味丸補火生土四神丸又破故紙四兩肉豆蔻五味子各二兩吳茱萸二兩紅棗百枚生薑八兩煮丸食前白湯下此方主脾氣虛弱大便不實飲食不健小腹痛薑附湯又人參附子各五錢炮薑白朮各二錢半此方專主瘡家真陽虧損或誤行汗下或膿血出多失於補托以致上氣喘急自汗盜汗氣短頭暈等症參附湯又人參附子各五錢薑五片水煎服五淋散淋瀝甘草當歸各錢半山梔赤芍各二錢赤苓二錢半煎加燈心此方專主膀胱有熱水道不通或小便如豆汁或如砂石或如凍膏或溲熱便血黃芩清肺飲又滋腎丸又酒知母酒黃柏各一兩肉桂二錢水丸此方主腎陰虛發熱作渴便赤足熱腿軟凡不渴而小便祕者熱在下焦血分最宜此藥犀角地黃湯出血犀角生地赤芍丹皮各錢半升麻黃芩炒各一錢如怒傷加柴胡山梔如脾虛不能攝血用歸脾湯如肝脾火動而妄行用加味逍遙散如血虛有火用四物湯加炮薑如腎經有火用六味丸歸脾湯又加味逍遙散又白芍白朮各錢二分知母當歸地骨皮各一錢茯苓麥冬生地各八分山梔黃柏各五分桔梗生甘草各三分水煎服
