body:
  text: 雜病源流犀燭自敘極天下能燭幽者犀之角而已角何能燭以犀性之通靈也犀之神力全注於角其通靈之性亦全聚於角是以燃之而幽無弗燭也夫人得天地最秀最靈之氣失其靈者私汩之耳私汩其靈必是非莫辨矧能燭幽若是者吾於醫有感焉人之有病或感七情或染六淫皮毛肌肉經絡臟腑受其邪即成病而病即發於皮毛肥肉經絡臟腑之間故曰雜也雜者表裡易蒙寒熱易混虛實易淆陰陽易蔽紛形錯出似是實非欲於易蒙易混易淆易蔽中確定為勿蒙勿混勿淆勿蔽之症非本通靈之性洞徹精微安能如犀之無幽弗燭秦越人視病洞見人臟腑癖結能燭幽也能本通靈之性以燭乎至幽也夫醫何能盡如秦越人然切脈辨症就症合脈反復推究從流溯源縱不能洞見癖結當必求昭悉於皮毛肌肉經絡臟腑之間或為七情所傷或為六淫所犯知其由來審其變遷夫而後表裡不相蒙寒熱不相混虛實不相淆陰陽不相蔽皆通靈之為用也悉皆通靈之用原本於性生者也雖不燃犀奚翅幽之能燭乎亦何憂病之紛形錯出於皮毛肌肉經絡臟腑間乎書既成因名之曰雜病源流犀燭乾隆癸巳清明前一日錫山沈金鰲芊緑氏自書凡例是書之成每病各著源流一篇便記誦也每篇之中無不究其原委悉其形症考其方治與夫病情之變幻病勢之緩急病體之輕重一一推極而詳言之或有奇變百出篇中所未之及是在醫者隨時審量焉每篇正文余所自撰其中援引古人論說必載明書目如靈樞曰內經曰之類而古人之論有精當不磨篇中卻不及援引而其義又足補篇中之未逮也則採録於每篇之後仍各冠名目使人曉然知誰氏之語每病必有病脈而脈法準的莫備於古人故每篇之後必於第一條先録脈法蓋欲知病必先知脈既知脈方可識病也書中如春溫夏熱瘟疫眼目咽喉跌撲閃挫等篇皆採取前人議論而成各於本篇後注明不敢掠美也一病之成或臟腑或六淫要各有所因之處因於每篇首句即為提明如咳嗽肺病也霍亂胃虛病也之類其有兼及他因者則於篇中分析言之以賓主不可紊也每病既各有因其病即隸於所因之臟腑或所因之六淫及內傷外感與身形面部之所屬閲者庶益曉然於病所由來矣臟腑內因也六淫外因也既詳臟腑六淫之病而又必立內傷外感一門者以所屬病傷於內者並不專由臟腑感於外者亦不專主何淫故必另立此一門也臟腑先後之次則以臟腑經脈之連屬為主如肺脈注於手陽明大腸大腸脈注於足陽明胃胃脈注於足太陰脾故以為次也余悉仿此面部身形之病亦由臟腑六淫然症既現於面部身形則必立此二門從部位也奇經八脈所以總持十二經不明乎此並不知十二經之綱維十二經之出入如肝藏血其人本血病治其肝而勿愈必求其原於沖沖為血海也肺主氣其人本氣病治其肺而勿愈必求其原於督督為氣海也其任帶蹺維六經可以類推一古人治病溫涼補瀉各有偏主是書所引諸方惟祈有當於病當溫則溫當涼則涼當補則補當瀉則瀉因病用方不敢稍存成見一導引運功本養生家修煉要訣但欲長生必先卻病其所導所運皆屬卻病之法今各附於篇末病者遵而行之實可佐參藥力所不逮一瘡瘍之病無不傳染六淫而發於臟腑雖症之未成脈必先現若不審此有診其脈而不知所由且誤認為內症而錯治者古名家內外必兼及良有以也一跌撲閃挫古謂之傷科雖傷於外必致侵及於內有害於臟腑經絡今列為篇庶不至臨時束手並詳金瘡杖傷諸瘡諸傷等以類及也
