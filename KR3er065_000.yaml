front:
  text: 雜病源流犀燭序余弟芊緑博古明經一生篤學大約四十以前專志儒書四十以後專攻醫學故著作甚富於儒則有芊緑草堂稿若干種於醫則有沈氏尊生書若干種余於所著儒書能讀之以余所知也於所著醫書雖讀之實不能知也然不知者醫之理猶能知者醫之文茲讀雜病源流犀燭共計長短一百七十餘篇篇各一法法各宗諸左史無一散亂無一重復於所著儒書知其能獨發心裁成一家言也則於所著醫書即文法之變妙亦可知其能獨發心裁成一家言也此余不知其醫書而猶能即所知者以知之也特書此以辨雜病源流犀燭云愚兄岵瞻書
  hash: sha256:19a5b2bc61ec9438e723eb239228d80c26dbc09f16418c9f442ff707814c6376
