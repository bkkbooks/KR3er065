body:
  text: 卷三十跌撲閃挫源流跌撲閃挫卒然身受由外及內氣血俱傷病也何言之凡人忽跌忽閃挫皆屬無心故其時本不知有跌與閃挫之將至也而忽然跌忽然閃挫必氣為之震震則激激則壅壅則氣之周流一身者忽因所壅而凝聚一處是氣失其所以為氣矣氣運乎血血本隨氣以周流氣凝則血亦凝矣氣凝在何處則血亦凝在何處矣夫至氣滯血瘀則作腫作痛諸變百出雖受跌受閃挫者為一身之皮肉筋骨而氣既滯血既瘀其損傷之患必由外侵內而經絡臟腑並與俱傷其為病有不可勝言無從逆料者矣至於打撲有受人譴責者有與人鬥毆者雖不盡無心然當譴責鬥毆之時其氣必壅其血必凝固與跌閃挫無異也其由外侵內而經絡臟腑之俱傷亦與跌閃挫無異也故跌撲閃挫方書謂之傷科俗謂之內傷其言內而不言外者明乎傷在外而病必及內其治之之法亦必於經絡臟腑間求之而為之行氣為之行血不得徒從外塗抹之已也古來傷科書甚多莫善於薛立齋分症主治諸法及陳文治按處施治之法今特即二家書採其語之切要者著為篇而傷科之治無遺法矣陳氏曰凡治顛撲迷悶急宜酒化蘇合丸灌醒顛撲損傷急宜酒蘇木調服蘇合丸大法固以血之或瘀或失分虛實而為補瀉亦當看傷之輕重輕者頓挫氣血凝滯作痛此當導氣行血而已若重者傷筋折骨必須接續但欲接續非數月不為功倘使氣血內停沮塞真氣不得行者必死急瀉其血宜雞鳴散下瘀血方通其氣宜和氣飲烏藥順氣散庶可施治大凡損傷寒涼藥一毫俱不可用蓋血見寒則凝也若飲冷致血入心即死惟看有外傷者當內外兼治若外無所傷但內有死血惟用蘇木等治血之藥可下者下之雞鳴散是也亦有血迷心竅而致昏沉不知人事者宜花蕊石散童便調服有神魄散失一時不知人事者惟在臨期斟酌大抵跌撲之病全要補氣行血若自然銅之類雖有接骨之功而燥散之害甚於刀劍丹溪備言之矣故初傷只用蘇木活血黃連降火白朮當歸和中補血加童便制炒為要又有損傷瘀血攻心不能言語者宜消上瘀血湯消下破血藥次以復元活血湯調理之又有損傷出血大多頭目暈眩者先用當歸川芎煎服次加白芍熟地續斷防風荊芥羌活獨活南星加童便服切不可用酒煎酒煎則氣逆上恐頭目益眩也如出血少內有瘀血以生料四物湯一半和獨聖散一半煎服皮血未破者煎成少加酒服又有墮傷內有瘀血腹脹滿不痛或胸脅痛者宜用破血藥清心藥及通利之劑其痛不止者宜獨聖散用乳香沒藥極散血止痛故此二味損傷藥中斷不可缺又酒煎蘇木和童便服乃傷科單方大妙止痛兼補宜當歸補血湯若皮肉不破損瘀血停滯者先用獨聖散次服破血藥隨宜加減以上言傷科大概要法也若陳氏逐處施治其法又有可條析者如腦骨傷破用輕手撙捺平正不破以膏藥貼之宜退腫膏若骨不損而但皮破肉傷者護之先摻封口藥外以散血膏貼血流不止者止之宜摻止血散慎勿見風致成破傷風便又費手雖然腦骨傷損在硬處猶易治在太陽穴則不可治須依上用藥若欲洗之須用熟油和藥水洗或溫茶洗諸處法亦略同如面傷青黑宜用敷藥宜一紫散或貼膏藥宜紫金膏傷重者亦宜貼膏宜補肉藥既治外然後隨宜服藥以治內至於腦兩角及眉稜耳鼻等處與治面數法略同如跌磕損傷牙齒或落或碎皆宜外內兼治外宜摻補肌散及掞封口藥內服破血藥用水煎不可用酒或傷齒而未動宜摻芙蓉膏末或已動宜蒺藜根燒存性擦之即固俱不同治如胸脯骨為拳捶所傷外腫內痛外宜貼定痛膏內宜服破血藥利去瘀血如脅肋傷重血不通用緑豆汁生薑汁和服使壯力人在後擠住自吐出血再服藥宜破血藥如跌撲脅痛血歸肝也宜破血消痛湯乳香神應散亦利去惡血總之顛撲壓墜專怕噁心必有惡血在內先要清心宜清心藥打血宜破血藥通利大小腸次第服之每服加童便一杯入藥立效其顛撲傷重者先服清心藥次可服清小便藥再次服去血藥令血從瘡口出或結在內則打入大腸而泄出或惡血未積者打入四肢或歸臟腑或歸上膈從口中出或歸中膈入大腸出用此急救隨服止痛藥宜二十五味藥方中加減用蓋以傷重與傷輕者不同治傷輕止須通氣活血便愈傷重則非急速治之且重藥治之勿效也傷重者急宜以薑湯燈心湯調二十五味藥服立效其發熱體實宜疏風敗毒散惡寒體弱者宜五積交加散始固不同治後之調理略同服敗毒五積後俱宜用黃白紅黑四末子用補損丹調治如老人跌墮不可轉側其治與壯盛人有異宜先用蘇木參耆芎歸陳皮甘草煎服後即以此湯調四末子或補損丹活血丹如小兒跌撲疼痛止須順氣宜蘿蔔子煎服又與老人有異以上言跌撲損傷之在皮肉氣血間者未及於筋骨也若在筋骨陳氏施治之法又有可條析者如腦骨破碎已詳在前如胸骨筋斷必須接之宜先用破血藥後貼定痛膏接骨丹若但皮破止貼補肉膏如傷腹腸出急以麻油潤瘡口輕手納入以吹藥少許吹鼻宜通關散令噴嚏其腸自入用桑白皮線將腹皮縫合以封口藥塗傷處外用藥敷貼宜雞子清調補肌散或散血膏尤妙線上用花蕊石散敷之總之腹內被傷皆當急利大小腸不可使其祕結以致重患如手足骨折斷縛之中間要帶緊兩頭略放鬆庶乎氣血流利若如截竹斷卻要兩頭緊中間寬使氣血來聚斷處俱用藥敷貼夾縛宜定痛膏接骨丹如手指跌撲損傷及刀斧打碎用雞子黃油潤之次掞封口藥外貼膏藥宜散血膏絹片縛定若咬傷則另治宜澤蘭散敷之若有寒熱又另治宜敷退熱散寒熱已即去之如腳有六出臼四折骨凡腳板上交𦙀處或挫出臼須用一人拽正自摸其骨或突出在內或出在外須用手力整歸窠若只拽不用手整便成痼疾整後用藥敷貼宜定痛膏接骨丹四折骨用正副夾縛六出臼只以布包不可夾手臂出臼與足骨同如腳大腿出臼此處身上骨是臼腿根是杵或前出或後出須用一人手把住患人身一人拽腳用手盡力搦令歸窠或是挫開可用軟綿繩從腳縛倒吊起用手整骨節從上墜下自然歸窠再用膏藥敷貼夾縛凡出臼急與挼入臼中若血浸臼中即難治總之腰腿腳骨等傷甚難整當臨時相度隨其傷處用法整頓歸元先用麻藥與服宜麻藥方令不知痛然後用手藥加杜仲又以手足筋脈最多時時要曲直不可定放又時時看顧恐再致出窠也如手腳骨被壓碎者以麻藥與服或用刀刮開尖骨用剪刀剪去骨鋒或粉碎者去之免膿血之禍後用大片桑皮以補肉膏定痛膏糊在桑皮上夾貼骨肉上莫令不正致有差錯三日一洗勿令臭穢徐用藥治如皮里有碎骨只用定痛膏接骨膏敷貼夾縛如十分傷自然爛開肉其碎骨自出然後摻補肌散外以補肉膏敷貼如骨斷皮破者不可用酒煎藥或損在內而破皮者可加童便在破血藥內和服若骨斷皮不破可全用酒煎藥若只傷而骨不折肉不破宜用藥治宜消腫膏定痛散如損傷平處骨斷碎皮不破者用接骨定痛等膏敷貼夾縛若手足曲直伸縮處只用包裹令時時轉動指骨碎者只用苧麻夾縛腿上用苧繩夾縛冬用熱縛夏冷縛余月溫縛束縛處須藥水以時泡洗夏二冬四春秋三日洗去舊藥須仔細勿驚動損處洗訖仍用前膏敷縛其束縛之法用杉木浸軟去粗皮皮上用蕉葉或薄紙攤藥移至傷處杉木為夾再用竹片去黃用青為副夾疏排周匝以小繩三度縛縛時相度高下遠近使損處氣血相續有緊有寬説見前條二三日一次換藥一月之後方另以膏貼之宜補益膏仍用正夾夾住令損處堅固如敷貼後疼痛不止可量加乳香沒藥白芷南星楓香肉桂獨活等味令溫暖痛即止刀斧傷去肉桂南星獨活如傷重者麻而不痛須拔伸捺正或用刀開皮二三日方知痛且先勻氣如折骨出臼不可用下瘀血之藥及通利藥宜疏風順氣勻血定痛補損而已如換藥切不可生換用手巾打濕拓潤逐片取脫隨手蕩洗換上又不可停留一時須預先攤貼隨手換上如服損藥不可食冷物若服草藥所生之骨必大又損藥必熱能生氣血以接骨忌用火炙損藥用酒忌灰酒然重傷便用酒反承其氣作腹脹胸滿必須稍定方用酒或酒水煎如敷貼等草藥必新採鮮的為效平時採取末之聽用可也如跌傷出血痛不可忍乃風寒所著宜用蔥杵入鹽少許炒熱罨之痛即止冷則再溫之又法凡傷痛取大蔥新折者入灰火煨擘蔥內膩汁罨傷處續續多罨只要熱者三四易即痛止搗爛仍封損處即跌殺等傷氣未絶者取蔥白炒大熱偏敷傷處頃再易其痛自止以上皆陳氏逐處損傷施治之法也醫者各隨其處所傷又即所兼症參以薛氏分症主治之法於傷科亦奚難哉按薛氏法如傷家脅肋脹痛若大便通和喘咳吐痰者肝火侮肺金也宜小柴胡湯加青皮山梔若兼胸腹痛大便不通喘咳吐血者瘀血停滯也宜當歸導滯散若肝火之症本脈必大兩脅熱脹但多飲童便再服藥宜小柴胡湯加黃連山梔歸尾紅花以肝脈浮而無力以手按其腹反不脹者此血虛而肝脹也宜四物湯加參苓青皮甘草若肝脈洪而有力胸脅脹痛按之亦痛此怒氣傷肝也宜小柴胡湯加芎歸青皮白芍桔梗枳殼總之此症不論受害輕重去血曾否但被扭按甚重恚怒努力傷其氣血血瘀歸肝多致此症甚則胸脅脹滿氣逆不通或致血溢口鼻而危矣如傷家腹痛若大便不通按之甚痛瘀血在內也必下之宜加味承氣湯既下而痛不止瘀血未盡也宜加味四物湯若腹痛按之卻不痛氣血傷也必補而和之宜四物湯加參耆白朮倘下之而脅胸反痛肝血傷也當議補宜四君子湯加芎歸或既下而發熱陰血傷也宜四物湯加參術既下而惡寒陽氣虛也宜十全大補湯既下而惡寒發熱氣血俱傷也宜八珍湯既下而作嘔胃氣傷也宜六君子湯加當歸既下而泄瀉脾腎傷也宜六君子湯加肉果破故紙既下而手足冷昏憒汗出陽氣虛寒也宜急用參附湯若手足冷指甲青脾腎虛寒甚也宜急用大劑參附湯甚至口噤手撒遺尿痰壅唇青體冷虛極之壞症也宜急投大劑參附湯曾有一人跌墜腹停瘀血用紅花大黃等不下反胸膈脹痛喘促薛氏用肉桂木香末各二錢熱酒調服而下黑血再服而愈此因寒藥凝滯而不行故以辛溫散之也如傷家小腹引陰莖作痛或兼小便如淋肝經有鬱火也宜小柴胡湯加大黃黃連山梔再用養血藥不可誤認為寒投以熱劑至使二便不通諸竅出血如傷家肌肉間作痛榮衛之氣滯也宜復元通氣散或筋骨作痛肝腎之氣傷也宜六味丸或內傷下血作痛脾胃之氣虛也宜補中益氣湯或但外傷出血作痛脾肺之氣虛也宜八珍湯大凡下血不止皆脾胃氣脫吐瀉不食脾胃氣敗也須預調脾胃如傷家瘀血作痛或兼焮腫發熱作渴陰血受傷也必砭去惡血再服藥以清肝火宜四物湯加柴芩山梔丹皮骨碎補或瘀血腫痛不消以蘿蔔汁調山梔末敷之其破處則以膏貼宜當歸膏更服活血之藥凡患處腫黑重墜者即系瘀血法當重砭去惡血看症用藥總以大補氣血為主如傷家血虛作痛或兼熱渴煩悶頭暈陰血內熱也宜八珍湯加丹皮麥冬五味肉桂骨碎補兼服地黃丸如傷家青腫不消氣虛也宜補中益氣湯或腫黯不消血滯也宜加味逍遙散或焮腫脹痛瘀血作膿也急當內托宜八珍湯加白芷或膿反痛氣血虛也宜十全大補湯或骨骱接而復脫肝腎虛也宜地黃丸或腫不消青不退氣血俱虛也急先用蔥尉法內服藥宜八珍湯倘單用行血破血脾胃愈虛衛氣愈滯若敷貼涼藥則瘀血益凝內腐益深難以收拾矣如傷家腐肉不潰或惡寒而不潰宜補中益氣湯或發熱而不潰宜八珍湯或服克伐藥而不潰宜六君子湯加當歸或內火蒸炙外皮堅黑而不潰宜內服八珍湯外塗當歸膏凡死肉不潰新肉不生皆失於預先補脾胃耳如傷家新肉不生或患處夭白脾氣虛也宜六君子湯加芎歸或患處緋赤陰血虛也宜四物湯加參術或惡寒發熱氣血虛也宜十全大補湯或膿汁稀白脾肺氣虛也宜東垣聖愈湯或寒熱交作肝火動也宜加味逍遙散日晡發熱肝血虛也宜八珍湯加丹皮或食少體倦胃氣虛也宜六君子湯膿汁臭穢陰虛而有邪火也宜六味丸或四肢困倦精神短少元氣內傷也宜補中益氣湯夏月調中益氣湯作瀉清暑益氣湯如傷家出血或血出患處或血出諸竅皆肝火熾盛血熱錯行也急清熱養血宜加味逍遙散或中氣虛弱血無所附而妄行宜加味四君子湯補中益氣湯或元氣內脫而不能攝血急當回陽宜獨參湯加炮薑不應加附子或內有蘊血而嘔吐宜四物湯加柴芩皆出血之重症也總之凡傷損勞碌怒氣肚腹脹悶誤服大黃等藥致傷陽絡則有吐血衄血便血尿血等症傷陰絡則為血積血塊肌肉青黯等症此皆臟腑虧損經隧失職也急補脾肺亦有得生者如傷家瘀血流注腰膂兩足至黑急飲童便酒砭出舊血先清肝火宣小柴胡湯去半夏加山梔黃芩骨碎補次壯脾胃宜八珍湯加茯苓如傷家昏憒其傷重者以獨參湯灌之雖有瘀血切不可用花蕊石散內化之恐因瀉而亡陰也無氣虛者尤當切戒凡瘀血在內大小便不通用大黃朴硝不下者用木香肉桂末二三錢熱酒下血下乃生假其熱以行寒也如傷家眩暈或因失血過多宜十全大補湯或元氣不足不能攝氣歸源宜參苓耆草芎歸熟地陳皮山藥山萸五味麥冬等味如傷家煩躁或由血虛宜當歸補血湯或兼日晡發熱宜四物湯加知柏柴胡丹皮地骨皮如傷家發熱或出血大多或潰膿後脈洪大而虛按之如無此陰虛發熱也宜當歸補血湯脈沉而微按之軟弱此陰盛發熱也宜四君子湯加薑附或因亡血宜聖愈湯或汗出不止宜獨參湯如傷家胸腹痛悶凡跳躍捶胸舉重閃挫而胸腹痛悶喜手摸者肝火傷脾也宜四君子湯加柴胡山梔其怕手摸者肝經血滯也宜四物湯加柴胡山梔紅花桃仁或胸脅刺痛發熱晡熱肝經血傷也宜加味逍遙散如此而不思飲食肝脾氣傷也宜四君子湯加柴梔川歸丹皮若胸腹脹滿不思飲食脾胃氣滯也宜六君子湯加芎歸柴胡若胸腹不利食少不寐脾氣鬱結也宜加味歸脾湯若痰氣不利脾肺氣滯宜二陳湯加白朮青皮山梔芎歸如傷家作嘔或因痛甚或因克伐傷胃宜四君子湯加半夏當歸生薑或因仇怒傷肝宜小柴胡湯加茯苓山梔若因痰火者急消痰宜二陳湯加山梔薑黃連若胃氣虛者急扶胃宜補中益氣湯加半夏生薑若因出血太多或潰後者宜六君子湯加當歸若因胃火者急清胃宜清胃湯加梔芩甘草或因打撲傷損敗血入胃嘔吐黑血如豆汁宜百合湯百合散如傷家喘咳凡出血過多而黑胸脹膈痛發喘氣虛瘀血乘於肺也宜二味參蘇飲若咳血衄血氣逆血蘊於肺也宜十味參蘇飲加芩連山梔蘇木如傷家作渴或因出血過多宜四物湯加白朮不應重用參耆歸地或因胃熱傷津液宜竹葉黃耆湯或因胃虛津液不足宜補中益氣湯或因胃火上熾宜竹葉石膏湯若煩熱小便淋澀乃腎經虛熱也宜地黃丸如傷家創口痛或至四五日不減或至一二日方痛欲作膿也宜托裡散若兼頭痛時作時止氣虛也再兼眩則屬痰當生肝血補脾氣以上皆薛氏之法所當詳審而熟究合之陳氏條以為傷科玉律者也倘不此之求而或恃單方或信草藥以為傷家有傷只須攻打初不問其脈其症而概用克伐獨自詡為和傷妙訣有不致陷人死地者幾何矣吾故重其科而獨立為篇此篇採取薛立齋陳文治兩家方論脈法脈經曰從高顛仆內有瘀血腹脹滿其脈堅強者生小弱者死又曰破傷有瘀血停積者其脈堅強實則生虛細澀則死若亡血過多者其脈虛細澀則生堅強實則死皆以脈病不相應故也醫鑑曰打撲損去血過多脈當虛細若得急疾大數者死入門曰凡折傷外損筋骨者可治內損臟腑里膜及破陰子其脈急疾者不可治得效曰如傷臟腑致命處一觀其脈虛促危矣跌撲閃挫症治得效曰凡墮壓死者急安好處以袖掩其口鼻上一食頃候眼開先與熱小便飲之若初覺氣絶急擘開口以熱小便灌利去瘀血綱目曰卒墮撲壓倒打死心頭溫者皆可救將本人如僧打坐令一人將其頭髮控放低以半夏末或皂角末吹入鼻內如活卻以薑汁香油灌之入門曰若取藥不及急挖開口以熱小便多灌醫鑑曰人為刀斧所傷或墮落險地或撲身體損傷筋骨皮肉皆出血不止或瘀血停積若去之不早則有入腹攻心之患又曰治損傷腫痛瘀血流注紫黑或傷眼上青黑不散大黃為末生薑汁調敷患處即消名將軍膏又曰一人落馬被所佩鎖匙傷破陰囊二丸脫落懸挂未斷痛苦無任諸藥不效豫教漫漫托上多取壁錢敷貼傷處日漸安其囊如故又曰接指方蘇木為末敷斷指間接定外用蠶繭包縛完固數日如故又曰自行顛仆穿斷舌心血出不止取米醋以雞翎刷所斷處其血即止仍用蒲黃杏仁硼砂少許為末蜜調噙化而愈又曰治擦落耳鼻用亂髮灰末乘急以所落耳鼻蘸發灰綴定以軟帛縛定有人為驢所咬下鼻一僧用此綴之神效丹溪曰跌撲損傷須用蘇木活血黃連降火白朮和中以童便煎服妙傷在上宜飲韭汁又曰凡損傷專主血論肝主血不問何經所傷惡血必歸於肝流於脅鬱於腹而作脹痛實者下之宜通導散桃仁承氣湯奪命散虛者復元活血湯當歸鬚散調之又曰凡出血過多而又嘔血不止者難治宜用蘇木煎湯調蜂霜散服之得效曰凡撲跌壓傷或從高墮落皆驚動四肢五臟必有惡血在內專怕噁心先用通二便藥和童便服之立效大小腸俱通利則自無煩悶攻心之患矣又曰蘇合香元治打撲墮落挾驚悸氣血錯亂昏迷不省急取三五丸溫酒童便調灌即蘇又曰頭上有傷或打破或金刃傷用藥糊縛不可使傷風慎之又曰凡手腳各有六出臼四折骨每手有三處出臼腳亦三處出臼手掌根出臼其骨交互相鎖或出臼則是挫出鎖骨之外須是溺骨於鎖骨下歸窠若出外則須搦入內若出內則須搦入外方入窠臼只用手拽斷難入窠十有八九成痼疾也又曰骨節損折肘臂腰膝出臼蹉跌須用法整頓歸元先用麻藥與服使不知痛然後可用手法又曰搦骨歸窠須用竹一片生柳木板片尤佳夾定一邊一邊不用夾須存屈直處時時拽屈拽直不然則愈後屈直不順又曰凡骨碎者用接骨藥火上化開糊骨上然後夾定外用夾骨法活血散接骨丹內服接骨散自然銅散接骨紫金丹淋洗用蔓荊散回春曰凡鬥毆被打成破傷風頭面腫大發熱以九味羌活湯熱服取汗外用杏仁搗爛入白麵少許新汲水調敷瘡上腫即消又曰治跌撲亦散被毆瘢痕麻油清酒各一碗同煎數沸服之服了臥火燒熱地上一夜痛止腫消無痕有被傷者仇家陰令術士以此治之次日驗審了無一毫傷痕聖惠方曰打撲傷肌膚青腫茄子種極黃極大者切片瓦上焙為末臨臥酒調二錢服一夜消盡無痕鰲曾治一人腦髓震動氣海鬱塞者其人因倒墜下樓跌傷肩臂服和傷藥損傷已愈但患頭昏眼黑竟不能俯仰時有氣從臍下而上便身聳肩息其氣直從喉上出方止日數十次診其脈諸部皆平但覺右寸指外滑數二三十至一止右寸近關半指沉澀因知其倒墜時頭項先著地故腦髓為之震動又和身倒墜身地相擊必氣為之並因遂凝抑氣海中不得調暢也因與茯神三錢白芨四錢便香附二錢菟絲子三錢硃砂五分一塊絹包線挂罐中不令著底煎好調真琥珀末五分服二帖病減半又前方加磨沉香五分愈七八分又前方加沉香再加歸身二錢二帖全愈治跌撲閃挫方九十蘇合香丸急救雞鳴散下瘀大黃一兩杏仁二十一粒去皮尖另研上為末酒煎雞鳴時服至曉下瘀血愈此方治從高墜下木石所壓瘀血凝積痛不可忍此用杏仁者因血入氣也此用藥妙處下瘀血方又歸梢川芎烏藥赤芍蒼朮青皮陳皮枳殼蘇木紅花桃仁肉桂大黃水煎服活血和氣飲通氣川芎三錢青皮二錢炙草白芍滑石各一錢丹皮五分桃仁七粒去皮尖研水煎此方治因跌撲瘀血入內和氣飲又蒼朮葛根桔梗當歸茯苓白芷枳殼甘草陳皮白芍烏藥順氣散又花蕊石散血迷花蕊石四兩硫黃一兩為末入瓦罐內鹽泥固濟曬乾安方磚上以炭巳午時煅至一夜候冷取出研細每一大匙童便酒煎熱服此方專治一切金刃研傷打撲損傷牛馬咬傷或至死者急於傷處摻此藥其血化為黃水再服藥便活更不疼痛如臟腑有瘀血內損煩悶欲死服此藥則化為黃水或吐或下泄出消上瘀血湯攻心羌活獨活連翹桔梗枳殼赤芍出梔當歸黃芩甘草川芎桃仁紅花蘇木生地大黃水煎和酒童便服此方主上膈被傷消下破血湯又柴胡川芎大黃赤芍五靈脂當歸黃芩桃仁枳實山梔木通澤蘭紅花蘇木赤牛膝生地水煎加酒童便服此方主下膈被傷復元活血湯又獨聖散痛不止香附一味薑汁浸一宿炒研每二錢白湯調服此因氣滯血凝香附行氣通血退腫膏腦骨白芙蓉葉地薄荷耳草葉澤蘭葉金桐葉赤牛膝大黃另研等分搗敷傷處中留一孔出氣此方兼治一切破傷腫痛封口藥皮肉乳香沒藥當歸兒茶杉木炭各一錢麝香五釐冰片一分虎聹葉即耳草葉一錢如無以葛葉代之各研稱合和次入麝次入水勻之磁器收一應耳斷唇缺俱可隨方施補用此藥摻之每日藥水輕洗去搽油換藥散血膏又虎聹葉澤蘭葉生搗爛冷敷傷處先用金毛狗脊毛薄薄鋪患口次掞封口藥再貼此膏四圍用截血膏敷貼令血不潮截皿膏又花粉三兩薑黃赤芍白芷各用一兩為末茶調敷患口四邊如傷頭面血不止急以此敷頸上周圍傷手者敷臂傷足敷腿傷各處敷瘡口周圍能截住血使不來潮如瘡口肉硬不消被風所襲也可加獨活以熱酒調敷如又不消則風毒已甚肌肉結實加紫金皮和敷必消止血散又血竭末一味摻之一方有白膠香松香白芷末金瘡血不止黃丹白礬末摻一紫散面傷紫金皮童便浸七日曬乾生地等分搗爛茶清調敷余處傷不必便制又芙蓉葉生地同搗名一緑散同治眼傷胞青黑紫色腫痛紫金膏又白芙蓉葉二兩紫荊皮一兩生採同生地搗敷或為末雞子清和蜜勻入生地搗敷之此膏兼一切傷腫赤焮熱補肉藥又香油一兩黃蠟八錢密陀僧五分乳香沒藥各一錢熬膏補肌散傷齒點椒五錢獸腦骨紅內消白芷各二錢為末摻即安或已落有血絲未斷摻齒齦間亦可復牢破血藥又柴胡黃芩當歸枳實五靈脂赤芍川芎生地桃仁紅花大黃朴硝蘇木水煎入童便酒皮破血流者不用酒此方主治皮肉不破瘀血積滯內攻不能言語譫妄宜此攻利若皮破血流宜作金瘡亡血過多治之芙蓉膏又紫荊皮南星各一兩芙蓉葉二兩獨活白芷赤芍各五錢薑汁茶清調溫貼紫黑不退加肉桂五錢此方專治跌打損傷腫痛紫黑定痛膏胸晡芙蓉葉二兩紫荊皮獨活天南星白芷各五錢上為末生採馬蘭菜墨斗菜各一兩打爛和末勻蔥汁和酒炒熱罨縛此方專治跌撲損筋折骨破血消痛湯脅痛羌活防風官桂各一錢連翹蘇木當歸各二錢麝香一字水蛭三錢炒令煙盡另研為末作一服酒兩大碗水一盞煎一碗另研香蛭二味稍熱調服立止此方能治跌傷脊骨脅痛定痛乳香神應散又乳香沒藥雄黑豆桑皮獨顆栗子當歸各一錢水蛭五錢破故紙炒二兩為末每五錢醋一杯瓦石器煎入麝少許此方主跌撲損傷疼痛難忍並腹中痛清心藥噁心丹皮當歸川芎赤芍生地連翹黃芩黃連山梔桃仁甘草燈心薄荷入童便服此方總治跌撲損傷腹皮破傷損折重者二十五味藥傷重白芷醋炒紫荊皮醋炒破故紙醋炒草烏醋炒孕婦不用劉寄奴當歸黑牽牛赤芍川牛膝生地川芎乳香沒藥木通自然銅骨不碎不用木香藿香川烏火煨孕婦不用骨碎補木賊草官桂羌活獨活以上各一兩炒熟地杜牛膝各五錢炒蜜丸彈子大每一丸酒磨下金刃所傷內損重者以薄荷湯或木瓜湯薑湯皆可服金刃傷挫臼者去自然銅惟骨碎骨折者用之然此方須於臨好時用之早用或生他故此方主治跌撲筋斷骨碎折刺痛疏風敗毒散又當歸川芎白芍熟地羌活獨活桔梗枳殼柴胡茯苓白芷甘草紫蘇陳皮生地香附薑水煎入酒服此方主治損傷而感風寒者五積交加散又當歸川芎白芍生地蒼朮厚朴茯苓陳皮半夏桔梗羌活獨活前胡柴胡乾薑枳殼肉桂甘草生薑有熱去薑桂敗毒五積散又黃末子又炮川烏醋草烏降香楓香松香乳香肉桂薑黃沒藥細辛各五錢當歸赤芍羌活獨活川芎骨碎補蒲黃白芷桔梗蒼朮五加皮牛膝何首烏各一兩為末酒下將好時加自然銅一兩服只骨折者便可用之此四末子專治打撲跌傷刀斧傷諸般風癰頑麻婦人血風渾身疼痛紅末子又獨活首烏白芷南星骨碎補當歸羌活蘇木牛膝赤芍川芎紅花各二兩細辛桔梗川烏炮降真香楓香乳香沒藥血竭各一兩為末酒下加法同上治亦同上黑末子又雄雞毛燒存性桑柴炭松節炒另研末松心側柏葉醋煮各四兩全當歸牛膝首烏黑豆酒煮南星骨碎補熟地赤芍羌活獨活白芷川芎各二兩細辛肉桂川烏炮草烏木鱉子南木香降真香五靈脂百草霜楓香乳香沒藥各一兩為末酒下加法同上治亦同上白末子又白芷白朮白芍白楊皮白斂白茯苓南星桔梗羌活獨活何首烏川芎當歸苡仁牛膝骨碎補續斷川烏肉桂細辛楓香乳香沒藥各一兩為末酒下加法同上治亦同上散血定痛補損丹又當歸川芎赤芍生地白芍牛膝杜仲川斷白芷南星羌活獨活防風各兩半骨碎補五加皮各兩六錢官桂乳香沒藥各一兩南木香丁皮大茴各五錢為末酒下此方專治諸般傷損腫痛活血丹又青桑炭一斤當歸牛膝川芎赤芍熟地黑豆酒煮首烏南星制白芷松節燒杜仲破故紙羌活骨碎補獨活蒼朮桔梗防風荊芥川斷各四兩草烏醋煮川烏炮肉桂大茴地龍白斂白芨細辛降香檀香松香楓香京墨煅血竭乳香沒藥木鱉子五靈脂各二兩栗間四兩醋煮秫米糊丸彈子大曬乾以生漆抹手上挪漆為衣陰乾以袋盛挂當風久而不壞用時以當歸酒磨下治法同四末子接骨丹又南星木鱉子各四兩乳香沒藥官桂各一兩生薑一斤去皮搗汁米醋少許白麵為糊攤紙上貼傷處以帛纏之用杉木片夾定縛之通關散吹鼻澤蘭散指傷芙蓉葉澤蘭葉地薄荷白佛桑葉耳草葉搗敷傷處留口通氣此方兼治一切跌咬所傷退熱散又黃耆柴胡黃連黃芩甘草赤芍生地蒼朮當歸地骨皮升麻接骨丹脫臼生南星四兩木鱉子三兩白芷紫荊皮芙蓉葉獨活官桂松香楓香各一兩乳香沒藥麥面各五錢為末薑汁酒醋調勻攤貼夾縛如法冬月熱縛夏月熱縛此方專治傷折出臼整骨麻藥麻法草烏三錢當歸白芷各二錢半每末五分熱酒調下即麻木不知痛然後用手整骨或用草烏散亦可草烏散又白芷川芎木鱉子烏藥半夏豬牙皂角當歸紫荊皮川烏各二兩草烏茴香各一兩木香五錢共為末諸骨碎折出臼者每服一錢酒下即麻倒然後開皮剪骨整頓安平用夾板束縛然後醫治或箭入不出亦用此麻之庶可鉗出箭若欲麻醒以鹽湯或鹽水灌之此方治傷骨節不歸窠者用此麻之消腫膏傷腫芙蓉葉紫荊皮各五兩白芷當歸骨碎補獨活首烏南星各三兩橙橘葉赤芍各二兩石菖蒲肉桂各五錢為末薑汁熱酒調塗腫處須乘熱再用蔥汁茶清調和溫縛如動筋折骨加山樟毛銀藤皮及葉各五兩同前為末酒調暖敷縛定此方並治胸脅跌傷腫痛或動筋骨定痛散又當歸川芎白芍赤芍熟地牛膝羌活獨活杜仲白芷川斷各二兩川烏炮肉桂乳香沒藥各一兩大茴丁皮南木香各五錢為末酒服此方專治一切損傷腫痛一名定痛當歸散補益膏損傷人參茯苓山藥熟地當歸地骨皮洗藥水又頑荊葉一兩白芷細辛蔓荊子川芎肉桂丁皮防風羌活各五錢鹽半匙連須蔥五根漿水五升煎三升去渣淋洗冷即易要避風處一名洗藥荊葉散此方治從高墜下及一切傷損瘀血凝滯者小柴胡湯喘咳柴胡黃芩人參半夏甘草東垣當歸導滯湯腹痛大黃當歸傷在上中下部用分頭身尾酒浸洗焙乾各五錢酒煎此方治跌撲損傷瘀滯不行四物湯肝脹川芎當歸白芍地黃加味承氣湯大便祕大黃朴硝各二錢厚朴枳實當歸紅花各一錢甘草五分水酒煎加減藥味量人虛實此方專治瘀血在內胸腹脹痛大便不通加味四物湯既下四君子湯肝傷人參茯苓白朮甘草十全大補湯陽虛人參茯苓白朮甘草熟地白芍川芎當歸黃耆肉桂薑棗八珍湯氣血虛人參茯苓白朮甘草川芎當歸白芍地黃六君子湯胃傷人參茯苓白朮甘草半夏陳皮參附湯虛寒人參附子復元通氣散榮衛滯穿山甲酥炙木香大茴香青皮陳皮白芷甘草漏蘆貝母等分每末錢半酒下此方治跌撲閃挫或怒氣滯血作痛之良劑經云形傷作痛氣傷作腫又云先腫後痛者形傷氣也先痛後腫者氣傷形也凡人元氣素弱或因傷叫號血氣損傷或敷寒涼之藥血氣凝結者用溫補氣血為善六味丸肝腎傷地黃山藥山萸丹皮茯苓澤瀉補中益氣湯脾胃虛人參黃耆白朮甘草當歸陳皮升麻柴胡當歸膏腫破當歸生地各一兩黃蠟七錢白蠟五錢麻油四兩先煎歸地黑去渣下二