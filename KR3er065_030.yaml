亦宜補損當歸散川芎兩半肉桂川椒當歸甘草各七錢半炮附子澤蘭各二錢半每末二錢溫酒下效如神此方治墜撲折傷疼痛叫號服此不復大痛三日筋骨相連糯米膏糯米一升皂角切碎半斤銅錢百個同炒焦黑去錢為末酒調膏貼患處神效此方專治撲傷筋斷骨折大乳沒散白朮當歸白芷炙草沒藥各三錢研勻乳香三錢另研桂心錢半和勻再研極細每三錢溫酒下一方無桂有參羌此方專治一切跌撲損傷痛不可忍人中白散人中白醋淬為末每五分酒服此方治閃挫跌撲傷骨極重者大效破血消痛湯羌活防風官桂各一錢蘇木錢半柴胡連翹歸梢各二錢麝香少許另研水蛭炒煙盡另研三錢水酒煎調麝蛭二末服二服愈此治跌破脊骨惡血流脅下作痛接骨如神丹半夏每一枚配土鱉一個同搗爛炒黃一兩自然銅二錢醋淬三次古錢文三錢醋淬三次乳香沒藥各五錢骨碎補去皮用七錢每細末三分用導滯散二錢熱酒下藥到患處其痛即止次日再服仍用藥三分導滯五分重者三服輕者一二服即愈消腫定痛散無名異炒木耳炒大黃炒各五分蜜水調塗若腐處用當歸膏敷此治跌撲腫痛地黃膏生地不計數打如泥木香末以膏隨腫大小攤紙上摻木香末一層再加攤膏貼患處不過三五換即愈此方治損傷及一切腫癰未破可以內消羌活乳香湯羌活歸身獨活川芎丹皮赤芍荊芥防風紅花桃仁陳皮續斷生地水煎有熱加柴胡黃芩此方治傷折筋骨發熱疼痛挾外邪者理傷膏黃蠟豬油各四兩乳香沒藥各一兩松節麻油各一斤上以折傷木皮一兩切碎入油煎數沸去渣入密陀僧黃丹各三錢熬成膏次入松蠟熔化再熬滴水成珠卻入乳沒自然銅末攤貼此方專治跌撲傷兼治刀斧傷大紫荊皮散紫荊皮降香補骨脂無名異酒淬七次琥珀另研川斷酒牛膝桃仁去皮蒲黃當歸各一兩煨大黃朴硝另研各一兩五錢每末二錢煎當歸蘇木酒下此方治跌打傷肺脹閃挫腰痛方西瓜青皮陰乾為末鹽酒調服三錢折傷筋骨方無名異甜瓜子各一兩乳香沒藥各一錢每末五錢熱酒服服畢以黃米粥紙上摻牡蠣末裹之竹片夾住拯傷接命丹紫金皮官桂大茴香甘草節川烏薑汁炒透草烏薑汁炒透等分為末沙糖調酒下年壯而又傷重者每服三錢老弱而又傷輕者每服錢半婦人臨時酌減此方專治跌打損傷命在危急者一服如神多亦不過二服服後身上應少發麻不得疑畏須避風出汗為度神劑也此方系揚州教師鄭老七傳跌打損傷方團瓜子炒存性研末每二錢或五錢沙糖調陳酒下便下瘀血即愈極重者不過兩三服跌打損傷方乳香末五倍子末狗骨煅研末各一錢釜底墨小麥面各五錢酒調敷患處如爛者只以鳳尾草搗罨患處並煎湯洗跌打損傷方干冬瓜皮真牛皮膠各一兩銼入鍋內炒存性研末每五錢熱酒下仍飲一甌厚蓋取微汗痛即止一宿如初極效十三太保海金沙紅花枳殼當歸延胡索地骨皮廣皮丹皮五加皮青皮自然銅乳香去油沒藥去油各三錢輕者各錢半山羊血一分半水灑煎去渣下乳沒熔化熱服蓋暖重者不過二服金瘡杖傷夾傷源流金瘡杖傷夾傷亦由外及內氣血俱傷病也古方書言金瘡俱指臨陳對敵刀劍箭簇所傷言之是已然如斗毆金刃之傷工作誤斫之傷自行刎勒之傷跌磕金鐵之傷皆金瘡也如是則金瘡之為患正多非臨陳對敵已也而要其治法則大約相仿自古治金瘡多從外塗抹所留傳方劑大約非敷即摻雖未嘗不見功效但一切金傷之人呼吸生死且既受傷神思不免昏亂若出血過多因至憒瞀者往往而是其為傷及氣血也必矣試詳言之凡金刃傷天窗穴名眉角腦後臂里跳脈髀內陰股兩乳上下心鳩尾小腸及五臟六腑俞皆死處又破腦出髓而不能語戴眼直視喉中如沸聲口急唾出兩手妄舉皆不治又腹破腸出一頭見者不可復連若腹痛短氣不得飲食大腸三日半死小腸三日死又上諸款皆屬不治固不必言其餘如腸斷兩頭見者可速續之以麻縷為線或桑白皮為線以藥敷線上宜花蕊石散從里縫之腸子則以清油捻活放人肚內乃縫肚皮不可縫外重皮用藥待生肉宜金傷散或血竭末敷之亦妙又有傷破肚皮腸與脂膏俱出者先用湯藥與服宜活血散芎歸湯用手擘去膏不妨此是間肉放心去之然後推腸人內用線縫之仍服通藥勿使二便閉澀宜導滯散又有金瘡出血不止宜白芍炒為末灑或米飲服二錢漸加之仍以末敷瘡上大妙或血出不止成內漏宜雄黃半豆大納之仍以小便服五錢血皆化水或瘀血在腹宜蔥白二十根麻子三升打碎水九升煮升半頓服當吐出膿血而愈未盡再服或出血悶絶宜蒲黃半兩熱酒灌下或被斫斷筋宜旋覆根汁滴瘡中渣敷口日三易半月斷筋自續或被斫斷指宜接上蘇木未敷蠶繭包縛固數日如故或發腫疼痛宜薔薇根灰白湯下一錢日三服或被刀刃所傷而犯內血出不止宜取所交婦人褲帶三寸燒末水服或中風角弓反張宜蒜一斤去心酒四升煮爛食之須臾得汗愈甚至痙強欲死宜乾葛末竹瀝調水送下每服三錢多服取效或傷濕潰爛不生肌肉宜寒水石煅一兩黃丹二錢為末洗傅甚者加龍骨兒茶各一錢或瘡口久不得合宜象皮燒灰和油敷之或針刺人肉宜烏鴉羽三五根炙焦醋調敷數次即出或箭簇入骨宜湧鐵膏或在咽喉胸膈不得出宜螻蛄搗取汁滴三五度自出如在他處以螻蛄搗爛塗傷處或但被箭射傷宜女人經衣燒灰敷患處或拔箭無血其人將死宜活取羊心割一口子對傷口吸住其血即流或中藥箭才傷皮肉便覺悶膿沸爛而死宜多服糞汁並糞塗凡若此者皆金瘡必兼之症皆不可忽而其大要總須調血為主蓋金刃所傷必有瘀血停積必先逐去瘀血宜奪命散花蕊石散尋滯散破血消痛湯雞鳴散復元活血湯若血去過多其人當若渴然須忍之當令干食或與肥脂之類以止其渴又不得多飲粥則血溢出殺人又忌嗔怒及大言笑大動作勞力及食鹽醋熱酒熱羹皆能使瘡痛沖發甚者且死並不可飲冷水血見寒則凝入心即死也其治法亡血甚者必當大補氣血宜八珍湯人參黃耆湯人參養榮湯十全大補湯若有變症又當於瘍科惡候諸條參酌以為治而其傷處又當詳審輕重用藥輕者只用止痛生肌宜補肌散或通用封口藥重者必須先掞封口藥四圍另用藥宜截血膏箍住使心血不潮最是要訣祕訣也至若下蠶室瘡口流血不合以所割勢煅研為末酒調服不數日愈即非下蠶室或自割其勢或誤傷落其勢者治亦同以上金瘡杖傷之患本屬外因治之一也然立齋云人之膽氣有勇怯稟賦有壯弱懷抱有開鬱或敷藥雖可同而調理之藥則少異然亦不外乎大補氣血旨哉斯言凡治杖瘡者所當於補氣血藥中而察其稟賦膽氣懷抱之不同臨時酌劑制方者也但丹溪又云杖瘡只是血熱作痛用涼血去瘀血為先須服雞鳴散之類外貼藥宜五黃散或大黃黃柏為末生地汁調敷或黃柏紫金皮生地同搗敷是丹溪之法又專以涼血清熱為主總而言之朱薛兩家之法皆當皆不可拘只在醫者神明通變而已大抵初杖者以行血解毒為主宜行血解毒湯散血爪蔞散乳香散乳香膏椒鱉丸外治宜血竭散三日後宜托裡排膿宜托裡消毒散神效當歸膏心境抑鬱者開其懷抱解其鬱結宜木香香附鬱金砂仁氣血虛弱而有瘀血必於補中行滯宜花蕊石散痛甚者急為定宜服乳香定痛散隨以熱酒儘量飲外貼黃蠟膏或敷貼五黃散或有瘀血壅腫作痛先刺出惡血然後乃貼膏藥或服鳳仙葉搗貼干則易一夜血散即愈冬月收取乾者水和塗之他如杖瘡青腫宜濕棉紙鋪傷處以燒過酒糟搗爛厚鋪紙上良久痛處如蟻行熱氣上升即散又豆腐切片貼之頻易杖瘡未破宜干黃土童尿入雞子清調塗干即以熱水洗去復刷復洗數十次以色紫轉紅為度仍刷兩胯防血攻陰杖瘡已破宜雞子黃熬油搽杖瘡血出宜豬血一升石灰七升和煅再以水和丸煅凡三次為末敷之效杖瘡忽乾黑陷毒氣攻心恍惚煩悶嘔吐者乃死不治或有杖瘡潰爛久不愈者宜補氣生血湯或有受杖責後疔甲爛肉疼痛難忍不能起動者宜烏龍解毒散速去疔甲取雞子清入麝少許以銀簪打成稀水用簪尖輕輕點上不多時其疔甲化爛取去一日一換貼膏藥化盡死肉數日如故矣大概杖瘡通滯血藥皆當以酒調服蓋血滯則氣壅瘀氣壅瘀則經絡滿急經絡滿急故腫且痛推之打撲跌磕著肌肉多腫痛者皆以經絡傷氣血不行故如是至於未杖之先亦有服藥保護並能使打著不痛之法宜寄杖散無名異散不可不知以上杖傷夾傷之患消瘀散毒治法亦與杖傷相似故初夾之時尤當調理宜八釐丸宜取小蝦蟆四五個皮硝三分生薑一兩酒糟一碗搗敷其腫者加紅內消或用緑豆粉炒令紫色以熱酒或熱醋調敷傷處如神或以飛面山梔末水調敷傷處外護以紙死血自散其有筋傷骨損者速補筋骨宜補骨散有惡血在骨節間者急逐瘀宜藝臺散如此治之無不痊可以上夾傷杖傷夾傷症治種吉曰凡杖畢即用童便好酒各一鍾合而溫服免血攻心甚妙實者雞鳴散下之虛者當歸鬚散加柴胡羌活煎服仍用蔥白搗爛炒熱搭杖處冷則易能止痛散瘀如神丹溪曰杖瘡用野苧根嫩者洗淨同鹽搗敷神效千金曰杖瘡宜服乳香散化瘀散治金瘡方三十七花蕊石散續腸花蕊石四兩硫黃一兩為末入瓦罐鹽泥固濟曬乾安方磚上以炭火從巳午時煅經宿候冷取出研細每一大匙童便入酒煎熱調服金傷散縫肚五日早朝使四人各出四方採草木莖葉各半把至午時入石灰一斤同打極爛鑿大桑木三兩株作孔納藥實築以桑皮蔽之油調石灰密塗之勿令泄氣更以桑皮填固至九月九日午時取出陰乾百日搗篩細末如遇傷摻之神效活血散腸肚傷黃耆當歸川芎白芷炮附子川斷赤芍鹿茸黃芩細辛乾薑等分每末三錢酒下日三立驗芎歸湯又川芎當歸導滯散通藥大黃一兩當歸二錢半麝少許每末三錢熱酒下湧鐵膏箭簇鼷鼠頭一個入油內熬土消蟲十個芫青螻蛄各四十九個巴豆信馬肉內蛆焙乾醬蛆焙乾硇砂夏枯草磁石黃丹地骨皮蜣螂蟲焙乾蘇木各一兩石腦油三兩蒿柴灰汁三升上為細末將石腦油蒿灰汁文武火熬成膏入各末攪勻收磁瓶遇有箭簇入骨者以藥貼之良久自出此方兼治針刺入肉奪命散逐瘀水蛭以石灰拌炒焦五錢黑牽牛頭末大黃各二兩每末二錢熱酒調下過數時無效再一服以下惡血為度破血消痛湯又水蛭炒煙盡另研三錢柴胡連翹歸尾各二錢蘇木錢半羌活防風桂皮各一錢麝香少許另研水煎去渣入蛭麝末空心服兩貼愈水酒各半煎更妙此方兼治損傷墮落惡血流於脅下痛楚不能轉側雞鳴散又酒大黃五錢歸尾三錢桃仁十四粒去皮尖酒煎雞鳴時服次日下瘀血愈復元活血湯又大黃二錢半當歸錢七分柴胡一錢半穿山甲炒研花粉甘草各一錢桃仁十個為泥紅花五分水酒煎八珍湯亡血人參茯苓白朮炙草川芎當歸白芍地黃人參黃耆湯又黃耆一錢炒黃柏四分人參當歸身升麻麥冬陳皮白朮蒼朮人參養榮湯又人參陳皮黃耆肉桂當歸白朮炙草各一錢遠志白芍各五分茯苓熟地五味子各八分薑棗十全大補湯又補肌散生肌點椒五錢獸腦骨紅內消白芷各二錢為末摻封口藥又乳香沒藥兒茶當歸杉木炭各一錢麝香五釐冰片一分葛葉一錢二分各研稱合和勻入麝次人冰勻之摻之截血膏又花粉三兩薑黃赤芍白芷各一兩茶清調敷加減法詳跌撲條五黃散杖瘡黃丹黃連黃芩黃柏大黃乳香等分為末新水調紅絹攤貼日三易行血解毒湯初杖人參白朮黃耆歸尾生地熟地各一錢羌活獨活茯苓川芎陳皮炙草各八分蘇木紅花各五分金銀花二錢乳香沒藥各一錢杏仁泥桃仁泥各六分水煎入童便酒各一杯以杏桃泥乳沒末用藥調膏以藥送下渣再煎杏仁等四味或分二服或另加一倍俱可散血瓜蔞散又瓜蔞一個忍冬藤乳香各一錢蘇木五錢沒藥三錢甘草二錢水五碗煎二碗隔湯頓熱加童便一杯服一日用盡渣為細末酒糊丸硃砂為衣乳香散又乳香沒藥各三錢茴香四錢歸尾五錢自然銅醋煅七次二錢每末五錢溫酒調下乳香膏又大黃黃連黃芩黃柏乳香沒藥各一錢冰片少許為末水調攤紅絹貼椒鱉丸又胡椒八兩木耳灰歸尾各六兩土鱉蟲一百二十個乳香沒藥杏仁桃仁發灰血竭各兩半自然銅醋煅七次二錢上研末另用胡椒三兩煮濃汁調麵糊作丸每責十板服二錢熱酒下輕責者不必用血竭散又血竭四兩大黃兩二錢自然銅醋煅七次二錢薑汁調塗托裡消毒散又人參黃耆鹽水炒酒當歸白芍川芎白朮茯苓各一錢金銀花白芷各七分炙草連翹各五分神效當歸膏又當歸生地各一兩黃蠟七錢白蠟五錢麻油四兩煎歸地至黑去渣入二蠟不住手攪至冷收瓷罐候用乳香定痛散痛甚當歸生地丹皮赤芍川芎白朮甘草乳香沒藥等分每末一錢酒童便調下一名活血止痛湯黃蠟膏又香油一兩入油發如梅大一團熬消入白膠香三錢黃蠟一兩龍骨赤石脂血竭各三錢二分攪勻候冷磁器收每用捏作薄片貼瘡上絹縛三日後翻過貼之補氣生血湯潰爛人參白朮茯苓白芍當歸陳皮香附貝母熟地桔梗甘草各一錢水酒煎烏龍解毒散疔甲木耳炒存性四兩每末五錢熱酒服服後少頃藥力行至瘡上從肉裡透如針刺癢甚不時流血水即以藥水洗淨貼膏藥寄杖散預服白蠟一兩細切滾酒泡服雖打著不痛無名異散又無名異末臨杖時服三五錢則杖不痛亦不甚傷八釐丸初夾土鱉蟲頭足全紙包焙燥自然銅醋煅七次血竭無名異乳香沒藥歸梢三錢硼砂甘草汁飛四錢巴霜十五粒酒糊丸每丸濕重一分乾重八釐量所責之數服多寡總不過五丸藝臺散又藕節陰乾荊芥各二兩馬齒莧陰乾藝臺子芒硝各一兩每末二錢用蘇木五錢酒煎服補骨散補骨古錢二百銅絲穿桑柴燒紅米醋淬七八十次取碗底沉下銅鏽屑就以醋洗淨炭灰磁瓶收用時以黑雄雞一隻清水煮熟去肉用骨醋炙為末加乳香沒藥各一兩研銅屑亦研細和勻取患人頂心發一縷燒灰和藥末二分五釐酒下止一服如吐再一服痛止不可再用但終身忌食荸薺但成藥止用二分五釐乳沒何必各用一兩今特斟酌良法莫若各末各自收貯臨時配合骨一分乳沒末各六釐銅末三釐為妙或作丸臨時酒化服亦可兼治跌撲當歸鬚散杖瘡歸尾錢半赤芍烏藥香附蘇木各一錢紅花八分桃仁七分甘草五分水酒煎化瘀散又蘇木歸尾各三錢大黃紅花各二錢每末三錢酒童便下附録金瘡杖夾傷雜方少保戚公保赤膏劉寄奴當歸生地熟地合歡樹皮男子黑髮洗淨各一兩乳香沒藥血竭各五錢黃蠟白蠟各八錢龍骨童便煅一錢麻油四兩煎前六味至發化去渣入二蠟不住手攪離火仍攪至濕將乳香四味研極細慢慢投之攪勻候冷磁器收之遇有傷者塗敷以帛包裹不可見風定痛乳香散乳香沒藥各二錢敗龜板一兩紫金皮二兩虎骨酥炙骨碎補歸梢各五錢炮穿山甲二錢半兩錢五枚醋淬每末一錢甚者二錢酒下分上下部服蠶蛾散晚蠶蛾歸頭白芷陳石灰等分為末敷傷處即愈此方專治刀斧傷止血定痛生肌一上即愈蒲黃散蒲黃生地各兩半當歸黃耆川芎白芷川斷各一兩炙草五錢每末三錢空心酒下日三四服血化為水而下口噤者抉開灌之治金瘡血出不止腹脹桑白皮散桑白皮四兩密陀僧二兩烏賊骨煅龍骨枯礬各五錢炒黃丹二錢半研敷定血如神洗藥桑皮荊芥黃連黃柏當歸白芷赤芍連翹生地水煎洗麻藥川烏草烏半夏南星川椒研末唾調搽
