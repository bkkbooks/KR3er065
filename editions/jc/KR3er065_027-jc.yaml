body:
  text: 卷二十七胸膈脊背乳病源流胸痛肝病也膈痛膽病也肝血虛肝氣實因而上逆於胸所以痛胸者肝之分肺心脾肝膽腎心包七經脈俱至胸然諸經雖能令胸滿氣短而不能使之痛惟肝獨令胸痛故屬肝病凡人心下有膈膜前齊鳩尾後齊十一椎周圍著脊所以遮隔濁氣不使上熏心肺十二經脈惟膀胱經不貫膈余皆能令膈痛今專屬少陽膽者以少陽相火為胃腐熟水穀而膈之下即為胃故少陽相火為災每易侵及於膈故屬膽病試言之肝虛胸痛引腰宜補腎補腎所以補肝也宜六味丸加首烏牛膝肝實胸痛不能轉側善太息宜疏肝宜寬胸飲胸痛常欲蹈壓其胸先未痛但欲飲熱名曰肝著宜旋覆湯胸痛短氣是水氣宜五苓散胸痛痞塞痰氣為害宜二陳湯胸痹急痛如錐刺難於俯仰汗出或徹背上不速治或至死宜生韭汁胸痹痛引背喘息咳唾短氣寸沉遲關緊數宜瓜蔞一個薤白半斤白酒七斤煮二升分二服加半夏四兩尤妙膈痛者痛不當心橫胸間是也宜寬中散胸膈隱痛腎虛不納氣氣虛不生血也宜補肝散虛弱心膈痛牽引乳肋肩背自汗人多患此乃元氣上逆宜十全大補湯龜胸肺實脹滿有痰肺虛也忌破氣發散亦忌收澀當降氣消痰宜枇杷葉湯至如胸痞與結胸有別痞輕而結胸重也痞有久患不愈者結胸不可久也大約胸滿不痛者為痞滿而痛者為結胸治法雖始終略同自有重輕之異先即胸痞明之東垣曰太陰濕土主壅塞乃土來心下而為痞也傷寒下早亦為痞乃寒傷榮血心主血邪入之故為心下痞仲景瀉心湯數方皆用黃連瀉心下之上邪其效如神酒積雜病下之過亦作痞蓋胸中之氣因虛下陷於心之分野故心下痞宜升胃氣以血藥兼之若全用導氣則氣愈下降必變為中滿鼓脹矣據此則知痞之為患只是胸膈飽悶而不舒暢外無脹急之形非若脹滿之內脹而外亦有形也要之痞總由於氣血不運內經所謂太陰所至為積飲痞膈故知是土邪之為患也然其致痞亦各有因因乎寒者為寒痞脈必遲口不渴宜枳實理中湯因乎熱者為熱痞脈必數煩且渴宜黃連消痞丸加味陷胸湯因乎痰者為痰痞脈必滑脅下痛宜柴胡半夏湯因乎虛者為虛痞脈遲弱大便利宜枳實消痞丸因乎實者為實痞脈洪實大便秘宜厚朴枳實湯又有痛痞必喘急妨悶其痛徹背宜瓜蔞實丸又有食已即痞必多痰火宜平補枳朮丸又有飲食不消痞必調養脾胃升降陰陽宜香砂養胃湯又有積年累月久痞必消痰調中扶脾宜黃連消痞丸又有不論寒熱煩悶欲死之痞宜桔梗枳殼湯又有內熱中悶夜不安臥臥則愈悶之痞宜解鬱和中湯又有心下痞堅嘔噦宜生薑半夏濃煎湯飲又有膜外氣痛痞塞或有氣塊豬胰炙熟蘸延胡索末頻食此各因其痞之由來而治之者也若乃飲食傷脾心胸痞滿兀兀欲吐者則吐之宜瓜蒂散其尤甚者則下之宜枳實導滯丸加檳榔木香此又當臨時酌量者結胸之症亦有辨有大結胸胸連臍腹痛硬手不可按日晡潮熱不大便者是也宜大陷胸湯大陷胸丸有小結胸者正在心下按之則痛者是也宜小陷胸湯有寒實結胸身不熱口不渴別無熱症只心中脹硬而痛者是也宜枳實理中丸甚者三物白散有熱實結胸懊憹煩躁而渴心下滿硬者是也宜加味陷胸湯柴陷湯有水結胸身無大熱頭與脅間微有汗出心下滿揉之汩汩有聲由傷寒飲水過多水停心下者是也宜赤茯苓湯枳朮湯甚者參用大陷胸湯有血結胸胸腹痛連腰脅背膂上下攻刺痛痛不可忍手不可按甚而搐搦者是也此惟婦人有之因患傷寒經血適來凝滯或經血適去尚有餘血未散之故宜海蛤散元胡索散有陰毒陽毒結胸傷寒陰陽二毒伏逆變成結胸或自利或不利者是也此必服藥令泄方大汗而解若心下已結延至五日便不可治陽毒宜活龍散陰毒宜破結丹有支結症傷寒未曾下而心下妨悶不滿不硬非痞亦非結胸者是也宜柴桔湯柴陳湯胃虛宜半夏瀉心湯桂枝人參湯此各因結胸之異而治之者也總之結胸之症惟傷寒有之余病則否故仲景謂傷寒病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早之故據此即傷寒症非下之太早亦無結胸也脈法仲景曰脈陽微陰弦則胸痹而痛陽微故知在上焦陰弦故知胸痹而痛又曰胸痹寸口脈沉而遲關上小緊而數脈訣曰胸痞脈滑為有痰結弦伏亦痞澀則氣劣正傳曰痞病右關脈多弦弦而遲者必心下堅胸膈名義部位靈樞曰胸腹者臟腑之郭也膻中者心主之宮城也綱目曰膈者心肺之分野也入門曰胸者呼吸所經飲食所過失節則邪氣聚疾病交至胸中乃有凶之兆故曰胸膈膜在心肺之下與背脊胸腹周圍相著如幕不漏膈者隔也遮膈濁氣不使上熏心肺故曰膈又曰胸之下胃脘也貫膈與肺系相併在肺系後其上即咽門胃脘下即胃之上口名賁門其膈膜相貼之間亦漫脂相包也又曰胃脘貫膈與心肺相通膈膜相絡也又曰心包絡在心下橫膈膜之上豎斜膈膜之下與橫膜相黏黃脂漫包者心也漫脂之外細筋膜如絲與心肺相連此包絡也銅人圖曰手太陰之脈上膈屬肺手陽明之脈下膈屬大腸足陽明之脈下膈屬胃絡脾足太陰之脈上膈挾咽其支者別上膈注心中手少陰之脈下膈絡小腸手太陽之脈下膈屬小腸足少陰之脈上貫肝膈手厥陰之脈下膈歷絡三焦手少陽之脈下膈偏屬三焦足少陽之脈貫膈絡肝屬膽足厥陰之脈上貫膈布脅肋以上十一經皆貫膈惟足太陽之脈循下於背獨不貫膈痞結胸症治丹溪曰心下痞須用枳實炒黃連如稟實氣實而痞宜枳實枳殼青皮陳皮黃連如稟弱氣弱飲食不化而痞宜白朮山楂陳皮神麯麥芽如肥人痞乃濕痰宜蒼朮半夏砂仁滑石如瘦人痞乃鬱熱宜黃連枳實葛根升麻如感食不化而痞宜藿香草蔻砂仁吳萸痞挾血成窠囊宜桃仁紅花大黃香附活人書曰傷寒本無痞應發汗醫反下之遂成痞枳殼理中湯最妙審知是痞先用桔梗枳殼湯尤妙桔梗能行氣故也海藏曰痞自血中來治痞獨益脾土以血藥佐之其法無以加矣醫說曰仲景云結胸脈浮大者不可下下之即死又曰結胸症悉具煩躁者死亦可知結胸之所以治所以不可治矣入門曰結胸見陰脈陰症及喘急呃逆者死脊痛督脈病也背痛肺經病也故經曰督脈主脊又曰肺腧在背二經虛感受六淫之邪則害痛試詳之脊以髓滿為正房欲過度脊髓空則痛宜補腎宜六味丸膀胱經脈挾脊分左右上項賊風乘虛入倔強不能屈伸宜羌活前胡防風茯苓先脊痛及背與肩是腎氣上逆宜和氣飲脊痛項強沖頭痛寒風所搏宜羌活勝濕湯腰脊酸削齒痛手足煩疼不能行動骨弱也宜虎骨酒以上脊病所屬背之為病有數端蓋背為陽腹為陰陽不足則背冷而惡寒或痛或不痛陽衰陰必盛陰盛故口中不和宜附子湯若背微惡寒渴燥心煩乃陽氣內陷裡實熱也宜人參白虎湯內伏寒痰則寒從背起冷如掌大一塊或一條如線而寒起或一片冰冷皆是也故仲景云心下有留飲其人背惡寒冷如冰茯苓丸主之宜導痰湯合蘇子降氣湯而背寒又宜辨陰陽如傷寒陽明症背上惡寒者必口中乾燥少陰症背上惡寒者必口中和此寒熱之分也又曰背熱此則屬肺蓋肺居上焦故肺熱則應於背而亦熱也宜人參瀉肺湯又曰背痛肺腧在背故肺病令人逆氣喘咳肩背痛宜通氣防風湯若兼脊痛項強腰似折則另法治之宜羌活勝濕湯而邪客於腎亦令頸項肩背痛宜溫腎散寒濕中乎太陽肩背痛不可回顧宜通氣防風湯風熱乘太陽亦肩背痛必小便數少宜通氣防風湯以上皆邪客於諸經而為病者也若肩背沉重痛是濕熱宜當歸拈痛湯寒濕相合則腦痛脊骨胛眼痛膝臏皆痛宜蒼朮復煎湯素有痰肩背痛痛必帶酸宜導痰湯久坐脊背痛虛弱之故宜補中益氣湯跌撲肩背痛必多瘀血宜地龍湯呵欠伸背舒腰腳痿勞倦數欠為陽虛不能勝陰宜補中益氣湯背心一點痛寒所聚也宜三合湯又曰脊背強靈樞云督脈之別名曰長強其病實則脊強又曰足太陽之脈病則腰脊強痛此脊背強所由來也而亦有手足太陽二經中濕氣鬱不行以致項強背脊俱痛者宜羌活勝濕湯有膀胱腎間冷氣攻衝背膂腰脊俯仰不利者宜烏沉湯又曰背傴僂年老傴僂者甚多皆督脈虛而精髓不充之故此當用補腎益髓之劑若少壯之人忽患傴僂並足攣脈沉弦而細皆中濕故也宜煨腎散令上吐下瀉內經曰濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿注云大筋受熱則縮短小筋得濕則引長故又有背傴僂而腰脊間骨節突出者宜煨腎散令上吐下瀉以上背病之屬脈法靈樞曰督脈緩甚為折脊內經曰寸口脈中手促上擊者曰肩背痛仲景曰脈大者心下有留飲其人必背寒冷丹溪曰凡背惡寒甚者脈浮大而無力是陽虛也脊背病形病內經曰背者胸中之府背曲肩隨胸將敗矣正理論曰人背有三關腦後名玉池關夾脊曰轆轤關水火之際曰尾閭關乃精氣升降之道路也尾閭又名龍虎穴尾閭穴之骨頭圓如潼金上有九竅內外相連即泥丸宮也脊骨兩傍三條逕路上衝直至泥丸宮下降復至丹田復至尾閭穴背痛導引法保生秘要曰以掌擦之九九乘熱交搭左右二肩躬身用力往來煽動九九之數加以後功運功保生秘要曰即行艮背大小圈法後行手指至指甲散出滯氣於疼病亦如之左疼行左右疼行右二肩手疼分而行之效乳痛肝氣橫逆脾氣消沮病也乳房屬胃乳頭屬肝人不知調養忿怒所逆鬱悶所過厚味所奉以致厥陰陰血不行遂令竅閉而不通陽明之血壅沸更令熱甚而化膿是以結核而成乳症此固女子常患之而男子則稍有異者蓋女子常損肝胃男子常損肝腎故有怒火房勞過度以致肝燥腎虛亦如女子結核腫痛者此男女所以異而同同而異也當分別治之男宜十六味充氣飲清肝解鬱湯若女子乳病則有腫而痛者宜牛蒡子湯有始而但腫硬不痛後微痛者宜解鬱湯鹿角散有但痛不即腫者宜蒲公英汁沖酒服以渣貼患處然女子乳病最重者莫如乳懸因產後瘀血上攻忽兩乳伸長細小如腸一般垂下直過小腹痛不可忍此危症也亦奇症也遍考古法急用川芎當歸各一斤濃煎湯不時溫服再用二斤逐漸燒煙放桌子下令病人曲身低頭將口鼻及病乳常吸菸氣未甚縮再用一劑獨不復舊則用如聖膏貼頂上無不愈其次則有乳癰乳岩吹乳此三者系外症另詳於後又其次為妒乳或由嬰兒不能吮乳或由兒口氣所吹或斷乳之時未能擠捻令盡皆致乳汁停畜停畜不去又與血氣相搏便結惡汁於內始而引熱堅結腫痛手不可近大渴引飲既而便成妒乳卻非癰也急忍痛擠捋之令乳汁出皆如膿狀內服藥宜連翹湯橘皮散勝金丹至如乳頭破裂是為險候必用大補之劑宜人參當歸白朮白芍川芎連翹甘草各一錢婦人產前乳汁自出名曰乳注生子多不育此亦先兆如此非關疾病產後不因兒吮亦有乳汁自出者由虛之故亦必大補以止之若產後乳汁不行有由氣血弱而枯涸者當補宜通乳湯有由氣血盛而壅阻者當疏宜漏蘆散有乳汁雖有卻不甚多者以婦人之乳資於衝任胃三經或素有疾在衝任飲食不調乳汁必少而芽兒食之亦怯弱多病當服通經藥以動之仍作羹臛以導之宜湧泉散有屢產而總無乳者由津液素虧之故急服滋益藥以補助宜湧泉散中加滋補藥有由氣滯而乳少者宜漏蘆散有由氣塞而乳少者宜湧泉散總之乳汁不行雖各有故而通利之法則一或一時無醫不知所以自有總治之法宜通乳湯立效散通草湯其有富貴家已不乳子及子死無人飲乳者當消宜麥芽末三四錢四物湯調下乳病多端如此總之男以腎為重女以乳為重故如男子跌撲傷損腎往往死女子跌撲傷損乳亦往往死故入門曰女人屬陰陰極則必自下而上衝是以乳房而陰戶縮男人屬陽陽極則必自上而下降是以陰莖垂而乳頭縮夫是故知女乳男腎上下雖不同而為性命之根則一也乳病症治繆仲淳曰乳之有病或痛或腫皆由肝經血虛風熱相搏或鬱火傷血甚而乳內結核且至腫潰不愈此非清肝解鬱湯不能治癰疽之發或由臟腑或由六淫所發之處不同所發之名亦不一今試即胸膈脊背乳五處所生外症而悉言之如井疽者發於胸者也其候心躁如焚肌熱似火唇焦口渴欲飲冰水多盜汗宜仙方活命飲加黃連桔梗或下宜內疏黃連湯或汗宜勝金丹斟酌為治倘至惡候發現尤當小心宜犀角解毒湯夫胸兩旁高處曰膺亦曰臆甘疽者發於膺者也其色青其候苦寒熱治之之法與上井疽同夫胸之中曰心窩心窩之上兩乳之間曰膻中為氣海能分布陰陽膻中發者發於膻中者也其候焮熱腫痛緣臟腑中陰陽不和七情鬱結所致宜仙方活命飲加紫蘇薄荷汗之或用勝金丹脾發疽者又生心窩下兩旁者也其候漫腫焮熱皆由過食炙煿醉飽入房脾上受傷所致治法略同上數症亦可汗下膈本一膜如紙厚無餘地故亦無專疽胸膈之後為背背之中為脊脊者脊骨也膂骨以下至尾骶共二十一節分上中下三段每段各有七節節又名椎故不曰一節至二十一節而曰一椎至二十一椎其毒之生於脊骨間者如十一椎脾俞之下十四椎之上其地為腎俞腎俞下為腰俞此兩處皆屬至虛如癰疽發於腎俞為腎俞發須防毒氣內攻須急用參耆歸術等補得內氣充實宜內托榮衛湯內托復煎散加補腎藥方可放破且易得潰潰後尤宜峻補勿稍淹延宜加味十全湯致成漏管不拘男婦最要是絕欲腰俞發毒另詳腰臍篇毒發自胃俞下至腎俞之地名土龍疽必大發寒熱身灼如火焚宜仙方活命飲清熱解毒湯九日可刺膿血者愈膿青黑者死失期不刺必上下俱黑二十日死毒發自肺俞及肝俞名特疽宜仙方活命飲其色赤肉起如椒子者死八日可刺如不穴二十日死毒發自心俞及心包絡俞名蜂疽宜仙方活命飲其色赤黑十日刺之膿清者不治二十日不穴死毒髮夾脊兩邊大筋上其色蒼名筋疽內必有癰在肥腸中治之早且得法急用藥解之宜神效托裡散如期八日刺之或猶可生不然九十日死夫諸俞皆屬於脊故所發癰毒亦屬於脊若乃背有三發俱屬於脊以脊與背相附其為處可分而不可分也何謂三發發於天柱骨下其傷在肺為肺後發中發發於厥陰俞下其傷在肝為對心發下發發於脾胃二俞下其傷在腎為對臍發夫三發之為地雖有上中下之分而其為症則不分上中下而總上中下有陰陽之別虛實之殊如毒發壅盛焮熱如火焚初如手掌大五七日如盆如碗四圍赤暈浮面漸潰去紫瘀膿汁甚多而腫仍不退痛仍不止發渴發嘔氣逆喘急浮淺開闊者尤宜發膿托毒此為陽症屬實初起宜仙方活命飲托裡散繼用托裡消毒散排膿內補十宣散如毒氣深沉外面腫發只大如盞口其實內虛毒已近膜必至攻入臟腑入四肢或先攻頭面次攻手足毒氣流散不可止遏其候必聲嘶氣脫眼黑睛小十指腫黑乾焦此為陰症屬虛為險症難治宜內托復煎散神秘陷脈散精要云發背之名雖多總不越陰陽兩症若初發一粒如豆便身熱焮赤疽處腫大熱痛此外發也屬陽雖如盆碗可治初起身不熱覺倦怠疽處亦不熱數日漸大不腫不痛卻低陷而壞爛此內發也屬陰難治據此益可見陰陽兩症即外象亦屬顯然矣乃繆仲淳又謂發背有五一曰陽毒二曰陰毒三曰服金石燒煉藥毒四曰酒食毒五曰冒山嵐瘴氣毒此言陽毒者先因風熱或患熱毒消渴或先患傷寒餘毒畜積於背脊膂之間不拘椎數但從兩夾脊起滿背焮熱赤紫或紅如焰膿毒難成成後痛不除數日間忽然平塌昧者誤為腫消殊不知此是內攻內陷不可復藥矣其言陰毒者乃氣冷而作初如黍米隱痛直應前心頭目昏重寒熱如瘧五七日後始覺攻腫膿毒深沉遲緩未透急宜以補氣湯藥內托外以抽膿藥貼之其言金石燒煉藥毒者初如丹疹狀漐漐漸開如湯火傷面赤心膈煩躁多渴嗜冷其瘡難起起則驚人更甚於陰陽二毒須以解金石毒湯散急治其內方保無虞宜綠雲散其言酒食毒者平時飢後飽食即睡或過食酒食炙煿肥鮮積於臟腑恣意當風脾虛不能承受致毒發於背不拘椎數初起小彈子大後如拳堅如石痛引手足且拘急口苦舌乾腹急便澀十數日後頭面手足浮腫便泄急痛如刺初腫時急用收腫發穴潰膿湯藥內實臟腑外泄膿水若治之遲緩潰腐愈多傷骨爛筋復感外邪而致內敗死矣其言山嵐瘴氣毒者觸冒嵐瘴畜之臟腑日久及氣血衰損而發初腫色青黑形如靴皮附筋徹骨頑如木石引手加深色變青白如拳打狀寒戰如瘧頭動口歪又若有風手足厥逆眼黑睛小白多急宜破清血三五升方出黃白膿然其皮猶腫痛不止直至青黑色退盡方愈此宜急急追趕膿毒出外方為無害否則必死仲淳之言五毒乃於陰陽兩毒外復為推類至盡者也其陰陽兩毒方治已詳在前而金石毒宜綠雲散黃連解毒湯犀角地黃湯或以麻油一升薤白三升微火煎黑去渣合酒每飲二三合至百日氣血充盛也酒食毒宜托裡散寸金丹黃連消毒散山嵐瘴氣毒宜寸金丹仙方活命飲內消散神效托裡散皆當考覈方劑以治之由是而症雖險惡無憂矣他如酒毒發生當背心腫痛及麻木累累如彈如拳堅硬如石由飲酒太過毒結也宜神效消毒散黃連解毒湯加羌活葛根如老鼠攛又名遊走血脾癰生背脅之間兩三處症屬肝膽二經由怒氣熱毒壅積也宜黃連解毒湯或仙方活命飲加黃連山梔其治雖以順氣清熱為主而或汗宜紫金丹或下宜五利大黃湯或老弱宜補宜內托榮衛湯加味十全湯皆臨時斟酌如黃瓜癰生背上長徑尺狀如黃瓜故名疼痛引心四肢麻木難治症也宜急服仙方活命飲加羌活柴胡或紫金丹勝金丹如背上細㿔無數浸淫開闊如湯火傷必煩躁口渴亦即丹毒也宜黃連消毒飲以上皆背瘍之屬若夫乳癰者因忿怒鬱悶或厚味太過致厥陰之氣不行竅不得通陽明之血沸騰於內熱甚化膿亦或所乳之子口氣多熱含乳而睡熱氣所吹遂生結毒若初起時忍痛揉令稍軟吮令汁透自可消散失此不治必成癰矣古人治乳癰之法必用青皮以疏肝滯石膏以清胃熱甘草節以行瘀濁之血瓜蔞實以消腫導毒再加沒藥角刺橘葉當歸金銀花以少酒佐之此治實之法也宜以一醉膏芷貝散為主治若氣虛壅滯不宜專任克伐宜四君子湯加芎歸升柴若憂思傷脾必扶脾理氣宜歸脾湯加貝母白芷花粉連翹甘草節水酒煎若肝火鬱結成核腫痛必理肝氣解鬱結方為正治宜清肝解鬱湯萬金一醉膏神效瓜蔞散內托升麻湯虛者兼補宜托裡消毒散若初起焮痛寒熱當發散表邪宜內托升麻湯去肉桂加薄荷荊芥羌活白芷腫焮痛甚當清肝解毒宜連翹橘葉湯加柴胡若胃氣虛或鬱滯飲食少進急當扶胃宜茯芩開胃散若將潰時兩乳間生黑頭瘡頂下作黑眼急托裡宣毒使無內陷宜內托升麻湯若已潰而猶寒熱不止當疏導壅滯宜內托十宣散若已潰而晡熱內熱當清火解毒宜黃連解毒湯若過勞腫痛宜八物湯倍參耆歸術過怒腫痛宜八物湯加山梔胃虛作嘔宜六君子湯加乾薑藿香病不一治亦不一其詳究焉若潰腐日久而至傳囊則惟補其元氣而已宜歸脾湯然或傳囊至一半必死雖盧扁無濟也繆仲淳云男子亦有患乳癰者乃因房欲過度肝虛血燥腎虛精怯不得上行所致宜瓜蔞散十六味流氣飲餘症彷彿女人所患慎勿輕用清熱敗毒之劑其言當切記也乳岩者乳根成隱核大如棋子不癢不痛肉色不變其人內熱夜熱五心煩熱皆由憂鬱悶怒朝夕累積肝氣橫逆脾氣消沮而成至五六年七八年之久方成瘡陷以其瘡形凹嵌似巖穴之狀故名是時雖飲食如常必洞見五臟而死蓋至此而不可治矣誠惡症也須於初起之時多服疏氣行血之劑以攻散之方為良法宜十六味流氣飲或加味逍遙散或以追風逐濕膏貼而散之亦稱神劑鹿角膠一味消岩聖藥隔蒜灸亦妙總當以初起時選用而丹溪治乳岩法用青皮四錢水盞半煎一盞徐徐咽之日一服論者謂此方還應加貝母橘葉連翹自然銅等藥良是但如體弱人終當酌量施治也吹乳者乳房結核日漸腫大不早治便成癰癤出膿血皆由肝胃二經鬱熱滯血所致或所乳之子膈有滯痰口氣熱含乳睡臥熱氣吹入乳竅亦成結核患此者亦當於初起時忍痛揉稍軟吮令汁透亦自消散然吹乳之生於產後者名外吹乳亦有生於產前者名內吹乳而治法則同宜芷貝散橘皮散立效散神效瓜蔞散蒲公英酒五發最險直指曰發腦髮鬢發眉發頤發背是為五發至險其症皆令人頭痛惡心寒熱氣急拘攣正腦上一處起為腦癰皮起易得破穴急破出膿不害又腦疽皮厚難得破穴須急發內毒使破穴方可又腦爍初起如橫木色青黑如靴為發硬不見膿難愈此三症並在大椎骨上入髮際生左右鬢生癰疽是為髮鬢亦危篤左右額角及太陽穴生皆同左右眉稜生為發眉亦重鼻下人中及下頤發為發頤又曰髮鬢亦害人背後五臟俞分生癰疽是為發背最重究其病原有風有氣有食有藥毒有房勞風則多癢氣則多痛食則發寒熱藥毒則堅硬房勞則瘦弱風氣食三種易療藥毒房勞二者難醫五發皆用五香散五香湯發背症治薛立齋曰發背屬膀胱督脈經或陰虛火盛或醇酒厚味或鬱怒房勞均可致之脈洪腫痛者為熱毒易治脈數無力色黯作渴為陰虛難治脈微細不痛不腫為甚虛尤難治又曰腫焮作痛寒熱作渴飲食如常此形氣病氣俱有餘先用仙方活命飲次用托裡消毒散若頭痛拘急乃表症先服人參敗毒散次用金銀花散神效托裡散焮痛腫硬脈實用清涼飲活命飲腫硬不悶疼痛發熱煩躁引飲便秘脈沉者內疏黃連湯清涼飲大便已利欲作膿者活命飲托裡散漫腫微痛色不赤不思飲食此形氣病氣俱不足用托裡散調補之若不作膿膿成不潰陽氣虛也托裡散加參耆肉桂膿出而反痛或膿消氣血俱虛也八珍湯調補惡寒不斂陽氣虛也十全大補湯晡熱內熱或不收斂陰血虛也四物加參術作嘔欲吐或不收斂胃氣虛也六君子加炮姜食少體倦不收斂脾氣虛也補中益氣湯加茯苓半夏肉赤不斂血熱也四物加山梔連翹肉白不斂脾虛也四君子加木香酒炒白芍又曰若初起未發出而寒熱疼痛作渴飲冷此邪氣也仙方活命飲口渴飲熱漫腫微痛元氣虛也托裡消毒散飲食少思肢體倦怠脾胃虛也六君子湯不應加薑桂若真氣虛邪氣盛不能發出亦有死者在旬日外見之若已發出用托裡消毒散不腐潰用托裡散不應急補脾胃若真氣虛不能腐潰亦有死者在二旬之外見之若已腐潰用托裡散以生肌不應急溫補脾胃若脾氣虛不能收斂亦有死者在月餘外見之大抵初起邪氣盛大用隔蒜灸法終不痛但未潰以前皆可灸更用箍藥圍之更用烏金膏點之候有瘡口以烏金膏或翠青錠子紝之又曰治發背有火照方名神燈照火方並敷藥二方俱秘方也千金不易精要曰凡癰疽初發腫硬高起者毒氣卻淺此乃六腑不和為癰症屬陽勢急而易治若初發如粟粒如豆許與肉平等或作赤色或覺癢甚勿抓破此乃五臟不調為疽屬陰毒氣內畜勢緩而難瘳乳癰乳岩症治千金方曰女人患乳癰四十以下治之多愈四十以上治之多死不治則自終其天年入門曰婦人積傷憂怒致生乳岩五七年後外腫紫黑內漸潰爛滴盡氣血方死惟清心靜養始苟延歲月丹溪曰一婦年六十性急多妒忽左乳結一核大如棋子不痛即以人參湯調青皮甘草末入薑汁細細呷一日夜五六次至六七日消矣又一婦性躁難於後姑乳生隱核以單煮青皮湯間以加減四物湯加行經絡之藥治兩月而安此皆乳岩初起之症故易治單煮青皮湯用青皮四錢水煎日三服治胸膈脊背乳病方七十六味丸補腎熟地八兩山萸山藥各四兩丹皮茯苓澤瀉各三兩寬胸飲疏肝柴胡鬱金川芎當歸降香香附陳皮砂仁甘草延胡索旋覆湯肝著川芎細辛赤苓前胡鮮枇杷葉旋覆花五苓散水氣肉桂白朮茯苓豬苓澤瀉二陳湯痰氣茯苓陳皮半夏甘草寬中散膈痛木香丁香砂仁厚朴青皮陳皮香附甘草白蔻仁補肝散又五味子山藥山萸川芎當歸黃耆熟地白朮木瓜獨活棗枇杷葉湯龜胸蘇子貝母桑葉花粉沙參百合薄荷射干前胡枇杷葉十全大補湯虛弱人參當歸黃耆白朮白芍熟地茯苓川芎肉桂炙草枳實理中湯胸痞人參白朮茯苓炮姜枳實炙草蜜丸每兩作四丸湯下此方如傷寒結胸心胸痞滿手不可近氣欲絕陷胸湯丸皆不效者用此如神黃連消痞丸又黃連黃芩各六錢枳實五錢半夏四錢薑黃白朮澤瀉各三錢人參陳皮厚朴各二錢豬苓錢半砂仁乾薑神麯甘草各一錢蒸餅丸湯下百丸加味陷胸湯又桔梗枳殼各錢半瓜蔞仁黃連黃芩半夏麥冬各一錢姜五片枳實消痞丸又枳實黃連各五錢厚朴四錢半夏曲人參白朮各三錢乾薑茯苓麥芽甘草各二錢蒸餅丸一名失笑丸柴胡半夏湯又瓜蔞實丸又瓜蔞仁枳殼半夏桔梗各一兩薑汁糊丸薑湯下瓜蔞潤肺降痰枳實破滯氣半夏燥濕桔梗開膈可云善治痞悶之至矣火動則痰生本方加黃連尤妙平補枳朮丸又白朮三兩白芍兩半陳皮枳實黃連各一兩人參木香各五錢荷葉濃湯煮糊丸白朮補脾氣為君白芍補脾血為臣陳皮枳實消痞黃連清熱為佐人參補氣木香調氣為使可云平補橘皮枳朮丸又白朮二兩補脾枳實一兩消痞陳皮一兩和胃此方補瀉簡當香砂養胃湯又白朮陳皮茯苓半夏各一錢香附砂仁木香枳實蔻仁厚朴藿香各七分甘草三分姜三棗二桔梗枳殼湯又桔梗枳殼各二錢甘草一錢姜五瓜蒂散又枳實導滯丸又大黃一兩枳實神麯各五錢茯苓白朮黃連黃芩各三錢澤瀉二錢大陷胸湯結胸大黃三錢芒硝二錢甘遂末五分分二貼先煎大黃至半入硝一二沸去渣入甘遂末攪服如已快利即止後服大陷胸丸又大黃五錢葶藶杏仁各三錢芒硝二錢半甘遂末一分蜜丸彈子大每一丸水煎服小陷胸湯又三物白散又桔梗貝母各三錢巴豆去皮心炒研如脂二錢每服五分白湯下虛人二分五釐或吐或利如不利進熱粥一碗利不止進冷粥一碗柴陷湯又半夏三錢瓜蔞仁柴胡各二錢黃連黃芩各一錢人參七分甘草五分姜三片棗二枚此即小柴胡湯合小陷胸湯也赤茯苓湯又赤苓半夏各二錢陳皮人參川芎白朮各一錢姜三枳朮湯又白朮四錢枳實二錢海蛤散又海蛤粉滑石甘草各一兩芒硝五錢每末二錢雞子清調下小腸壅則膻中血不流服此則小腸通而膻中血自散矣元胡索散又元胡索當歸炒蒲黃赤芍官桂各一錢薑黃木香乳香沒藥各七分炙草五分姜三片活龍散又活地龍四條大者研爛入蜜薑汁薄荷汁各一匙新汲水調徐徐灌盡熱甚加冰片少許服後穩睡一覺即揉心下片時再令睡有汗即愈破結丹又辰砂青礞石葶藶肉豆蔻黑醜頭末木香肉桂附子巴豆各五錢輕粉五釐麝香五分金箔五片醋半盞先研辰砂黑醜附子熬成膏次入諸藥末和丸皂夾子大輕粉為衣每二丸蜜湯下陰陽毒伏逆變為結胸五六日大便結攻之不可達之不及此主之柴桔湯又柴胡二錢黃芩枳殼半夏桔梗各一錢人參七分甘草五分姜棗柴陳湯又柴胡二錢黃芩陳皮半夏赤苓各一錢人參七分甘草五分姜棗桂枝人參湯又桂枝甘草各二錢人參白朮乾薑各一錢半夏瀉心湯又和氣飲腎逆乾薑一分葛根升麻各二錢熟大黃枳殼各一錢半桔梗蒼朮各一錢白芍七分甘草八分當歸半夏白芷茯苓各四分小茴五分川椒十五粒烏沉湯脊強烏藥一兩沉香五錢炙草四錢人參三錢每末一錢薑鹽湯下羌活勝濕湯風寒羌活獨活藁本防風川芎炙草蔓荊子導痰湯背寒半夏二錢南星橘紅枳殼赤苓甘草各一錢姜五片人參瀉肺湯背熱黃芩山梔薄荷枳殼連翹杏仁桑皮桔梗甘草酒大黃各七分三合湯背痛麻黃陳皮烏藥川芎姜蠶白芷桔梗枳殼甘草乾薑茯苓半夏香附蘇葉蒼朮此即烏藥順氣散二陳湯香蘇散三方合而成劑故名三合三方之外須要再加羌活蒼朮復煎湯又蒼朮四兩水二碗煎一碗去渣入羌活升麻澤瀉柴胡藁本白朮各五分川柏三分紅花一分煎至半碗去渣服虎骨酒骨弱虎脛骨一具炙黃焦打碎糯米三升用曲作酒封五十日飲之附子湯陽虛人參白朮白芍茯苓附子人參白虎湯實熱通氣防風湯風熱柴胡升麻防風黃耆羌活陳皮人參甘草藁本青皮蔻仁黃柏氣虛人切不可服煨腎散傴僂甘遂末一錢入豬腰子內煨食之令上吐下瀉三服無不愈當歸拈痛湯濕熱羌活防風升麻葛根茯苓豬苓知母甘草苦參澤瀉人參當歸白朮蒼朮茵陳草溫腎散脊痛熟地錢半牛膝巴戟肉蓯蓉麥冬炙甘草五味子各八分茯神乾薑杜仲各五分補中益氣湯虛弱人參黃耆當歸白朮陳皮炙草升麻柴胡地龍湯瘀血羌活獨活肉桂桃仁甘草黃柏麻黃蘇木歸尾地龍烏藥順氣散寒聚麻黃陳皮烏藥姜蠶炮姜川芎枳殼桔梗炙草加羌活半夏曲茯苓清肝解鬱湯乳痛當歸白朮各一錢貝母赤苓白芍熟地山梔各七分人參柴胡丹皮陳皮川芎甘草各五分此方一切肝膽不和之症皆用之十六味流氣飲又蘇葉錢半人參黃耆當歸各一錢川芎肉桂厚朴白芷防風烏藥檳榔白芍枳殼木香甘草各五分桔梗三分加青皮一錢牛蒡子湯又牛蒡子山梔陳皮甘草黃芩連翹花粉角刺柴胡青皮瓜蔞仁忍冬藤解鬱湯腫硬陳皮遠志生地香附白芍川芎當歸半夏青皮茯神貝母蘇葉桔梗山梔木通甘草姜八珍湯因虛人參茯苓白朮炙草川芎當歸白芍熟地歸脾湯肝脾神效瓜蔞散因虛瓜蔞一個甘草當歸各五錢乳香沒藥各一錢加味逍遙散肝虧甘草當歸白芍白朮茯苓柴胡各一錢桂皮山梔各七分連翹散妒乳大黃一錢連翹射干升麻獨活桑寄生沉香木香藿香丁香甘草各七分麝香三分水煎服以利為度橘皮湯下乳去白陳皮麩炒為末麝香每末二錢酒調服一帖即止勝金丹又百齒霜即木梳上垢不拘多少無根水丸黃丹為衣每三丸倒流水下左乳病左臥右乳病右臥於溫處令汗出即愈通乳湯下乳雄豬蹄四雙通草川芎各一兩穿山甲炒黃十四片甘草一錢水五升煎半分三服先以溫蔥湯洗乳房漏蘆散又漏蘆二錢半蛇退一條燒瓜蔞煅一個每末二錢酒調下少頃食熱羹湯助之湧泉散又瞿麥穗麥冬穿山甲炮龍骨王不留行等分先吃豬蹄湯後以溫酒下藥末一錢仍用木梳梳左右乳上兩三次立效散又桔梗二錢瞿麥柴胡花粉各一錢通草七分木通青皮白芷赤芍連翹甘草各五分水煎細飲更摩乳房又名通草湯立效散又萵苣子糯米各一合細研水一碗入甘草末三分攪勻煎頻頻細口服五香散又木香丁香沉香乳香麝香等分每粗末三錢水煎服一方無麝香有藿香治胸膈脊背乳瘡瘍方四十九仙方活命飲井疽穿山甲白芷防風赤芍皂角刺甘草歸尾花粉貝母各一錢金銀花陳皮各三錢乳香沒藥各一錢二味另研為末水酒煎送下二末內疏黃連湯又黃連白芍當歸黃芩檳榔木香山梔薄荷桔梗甘草各一錢連翹大黃各錢半姜水煎此方須量人虛實而用勝金丹又制白砒麝香各五分蟾酥一錢雄黃辰砂乳香沒藥血竭各錢半全蠍炮天龍去頭足炙穿山甲炙各三錢姜蠶炒五錢各研末秤准每服三錢砂糖調蔥頭湯送下犀角解毒湯又牛蒡子荊芥防風黃芩犀角甘草內托榮衛湯腎俞發黃芩紅花連翹蒼朮酒歸身柴胡羌活防風茯苓人參炙甘草各一錢桂枝七分水酒煎此方兼治風濕熱鬱於手足少陽致血脈凝逆元氣消弱面色腫赤微黯時多忿怒瘡色赤黯腫硬奮然高起其脈洪緩而弦宜發汗以通榮衛則邪氣去矣內托復煎散又地骨皮黃芩茯苓白芍人參鹽黃耆白朮桂枝炙草酒防風酒當歸各一兩先以蒼朮一升水五升煎至四升去蒼朮入前藥再煎至二升終日飲之加防己此方治瘡瘍焮腫在外脈浮若邪氣勝必侵於內用此托之加味十全湯又黃耆地黃川芎當歸人參芍藥茯苓白朮陳皮各一兩甘草肉桂五味子各五錢烏藥七錢每粗末一兩加薑棗煎服此方治癰疽潰後補氣血進飲食為潰瘍之要劑丹溪云此湯須看年紀老少資稟壯弱症候緩急時令寒熱加減用之清熱解毒湯土龍疽神效托裡散筋疽黃耆忍冬葉當歸各五錢粉草二錢酒煎服渣敷患處托裡散發背人參黃耆各二錢白朮陳皮當歸熟地茯苓酒白芍各錢半托裡消毒散又鹽黃耆人參酒當歸白芍川芎白朮茯苓各一錢金銀花白芷各七分炙草連翹各五分排膿內補十宣散又酒當歸人參各八分防風炒桔梗各一錢川芎肉桂各三分鹽黃耆一錢甘草白芷各五分厚朴六分水煎服或為末木香湯或酒下亦可神秘陷脈散又黃耆人參赤芍酒當歸川芎乳香沒藥各五分甘草橘紅地骨皮五加皮忍冬葉各七分水酒煎調送乳沒二味末此方治瘡瘍初起托裡消毒行氣破血用五七服甚效綠雲散又鳳尾草葉背有金星者炙十一兩酒一碗煎五六沸入冷酒一碗飲以醉為度生井中者尤佳此方治五發生於背腦或手足瘍皆由於服金石者服此大有奇效黃連解毒湯又黃連黃芩黃柏炒山梔各錢半此方治瘡瘍焮腫煩躁飲冷脈洪數或發狂言寸金丹又粉霜黃蠟各三錢乳香烏金石輕粉雄黃狗寶沒藥各一錢硼砂五錢水煎乾方可用蟾酥二錢狗膽一個乾用鯉魚膽一個乾用金頭蜈蚣七條酥炙黃色頭生子乳一合將蠟乳熬膏和藥為丸大人綠豆大小兒芥子大用白丁香七個研爛新汲水調下一丸重者三丸衣覆取汗勿令透風雖無頭瘡腫三服立效服後宜用白粥此方專治發背癰疽附骨疼痛煩渴發熱四肢沉重身體壯熱雖至臨危口禁藥可下咽即能甦醒故此方別名又曰返魂丹百生丸追命丹延壽丸來蘇丸知命丸得道丸東垣黃連消毒散又酒黃連酒生地酒歸身羌活連翹黃耆各一錢澤瀉七分黃芩酒防己黃柏獨活防風藁本蘇木陳皮桔梗各一錢酒知母四分甘草梢人參各五分水煎入酒少許服此方專治背疽腦疽腫焮疼痛或麻木膏粱之人允宜用此內消散又穿山甲炒羚羊角乳香大黃各一錢俱為末皂角刺七個桃仁四十九粒金銀花花粉厚朴各錢半水一鍾煎角刺五味至六分調山甲等四味末此方未成膿即消已成膿從大便出五利大黃湯老鼠攛大黃黃芩升麻各錢二分山梔芒硝各一錢稍熱服此方治瘡疽初發年壯氣盛大小便秘宜用此方紫金丹又一醉膏乳癰甘草五錢沒藥二錢半瓜蔞一個去皮研爛酒三碗煎碗半作兩次溫服重者再進一服以瘥為度或加當歸白芷乳香尤妙此方治癰疽發背乳癰初起神效如要宣毒加角刺一錢芷貝散又白芷貝母等分每末一錢酒調頻服結核以此為主加川芎當歸柴胡升麻此方治一切乳症頻服不致潰膿若無乳者加漏蘆酒調服四君子湯又人參茯苓白朮炙草歸脾湯又當歸龍眼棗仁遠志人參黃耆白朮茯神各一錢木香五分甘草炙三分姜棗清肝解鬱湯又人參茯苓貝母熟地各一錢柴胡陳皮川芎丹皮白芍各八分白朮山梔當歸各錢半炙草五分此方治肝經血虛風熱或鬱火傷血乳內結核或為腫潰不愈神效瓜蔞散又當歸生草各五錢乳香沒藥各一錢瓜蔞一個子多者良水酒煎一方有穿山甲一方以此藥為末入瓜蔞內重紙封微火煅存性為末每用末二錢酒下內托升麻湯又升麻葛根連翹各錢半黃耆炙草當歸各一錢牛蒡子五分肉桂心三分黃柏二分此方能治兩乳間出黑頭瘡瘡頂陷下作黑眼子並乳癰初起連翹橘葉湯又川芎連翹角刺金銀花橘葉青皮桃仁甘草節各一錢治吹乳初起茯苓開胃散又茯苓一兩炙草五錢麩枳殼三錢每末一錢鹽湯下此方專治胃氣鬱滯飲食不進八物湯又川芎當歸白芍熟地延胡索苦楝子各一錢木香檳榔各五分六君子湯又人參茯苓白朮甘草半夏陳皮瓜蔞散男乳症瓜蔞仁青皮各一錢石膏二錢金銀花甘草沒藥歸尾角刺各五分橘葉打汁二匙沖水酒煎此方治乳癰未潰者即散已潰者去石膏沒藥角刺金銀花將歸尾換歸身加人參黃耆川芎白芍十六味流氣飲又人參黃耆當歸各一錢川芎肉桂厚朴白芷甘草防風烏藥檳榔白芍枳殼木香各五分桔梗三分紫蘇錢半食後服由忿怒加青皮一錢此方通行十二經若病在一經者不用加味逍遙散又甘草當歸白芍白朮茯苓柴胡各一錢桂皮山梔各七分此方治肝脾血虛內熱發熱遍身搔癢寒熱肢體作痛盜汗怔仲食少不臥橘皮散吹乳去白陳皮麩炒為末入麝少許研每二錢末酒調下一服即效此方專治吹乳妒乳乳癰未結即消已結即潰痛者即不痛神效立效神散又生薑去皮一兩大黃甘草各五錢瓜蔞一個同搗一塊水一碗煎七分去渣入乳香沒藥末各一錢調和作一服五香散又木香沉香丁香乳香麝香等分每粗末三錢煎服一方無麝香有藿香此方能治一切陰陽之氣鬱結不消結核腫痛並癰疽使人發熱頭疼五香湯又木香沉香丁香麝香乳香甘草各五分人參黃耆犀角屑各一錢此方專治一切因血凝氣滯而生癰疽以氣血聞香則行故宜用此透達經絡人參敗毒散表症人參羌活獨活柴胡前胡枳殼桔梗茯苓川芎甘草各一錢金銀花散又金銀花蜜炙黃耆當歸甘草各二錢半水煎入酒半杯食後溫服此方治乳脈不行結成癰腫疼痛不可忍者清涼飲腫硬大黃赤芍當歸甘草各二錢此方治瘡瘍煩躁飲冷焮痛脈實便秘尿赤八珍湯調補人參茯苓白朮炙草川芎當歸白芍熟地十全大補湯陽虛四物湯陰虛川芎當歸白芍熟地補中益氣湯脾虛烏金膏外點背疽照火方麝香二分雄黃硃砂血竭沒藥各一錢研細末棉紙捻長尺許每用藥三分真麻油潤灼離瘡半寸許自外而內周圍徐徐照之火頭上出藥氣熏入毒瘡隨氣解散自不內侵臟腑初用三條漸加至五六七條瘡勢漸消又漸減之熏罷隨用敷藥治陰症為宜敷藥方連根車前草五爪龍豨薟草金銀花等分打爛加陳米粉調如漿加飛鹽少許調敷瘡上留一孔拔膿出若冬月用根若畜下於葉醋調敷其畜草陰乾者佳五爪龍如一時無有瘡勢又急只用四味亦能奏功如初起取草汁半盞黃酒和飲腫內消毒自散又方將雄黃狗下頷連皮毛肉瓦上燒存性骨另燒存性蠶豆白斂各二兩各煅過與狗骨肉灰等分研末醋調鵝翎敷上不必留孔片時即癢未膿立消已膿即出而愈已膿甚者並醋調服百治百效經驗獨奇前照火方每日照一次腰臍病源流腰痛精氣虛而邪客病也經曰腰者腎之府轉搖不能腎將憊矣此條言內傷房勞陽氣虛弱不能運動以致腰痛也又曰太陽所至為腰痛又曰巨陽虛則頭項腰背痛此二條言膀胱之脈挾脊抵腰別下項是經虛則六氣之邪客之以致痛也而六氣所害惟寒濕居多總之凡人精耗腎衰則膀胱之氣亦不能獨足故邪易侵犯則腎虛其本也風寒濕熱痰飲氣滯血瘀閃挫其標也或從標或從本貴無失其宜而已蓋風痛者左右無定處牽引兩足脈必浮宜防風蒼朮湯甚者加全蠍一味杜仲薑汁炒為末酒下一錢專治腎氣腰痛兼治風冷痛牛膝酒亦可寒痛者腰間如冰得熱則減得寒則增脈必緊宜姜附湯加杜仲肉桂如兼濕須用寒濕兼治之劑宜五積散加蒼朮麻黃濕痛者久坐水濕或著雨露身重天陰更甚脈必緩宜腎著湯若挾風宜獨活寄生湯挾寒宜加桂枝桃仁挾熱宜羌活勝濕湯須各分別用藥火熱痛者口渴便秘脈必洪數宜干豆湯加天麻川斷痰飲痛者脈必滑宜二陳湯加南星香附烏藥枳殼若脈有力則痰必實宜二陳湯加大黃或威靈仙為末每二錢入豬腰內煨食以微下為度氣滯痛者脈必沉宜烏藥順氣散死血痛者轉動若錐刀之刺大便黑小便或黃或黑日輕夜重脈必芤宜調榮活絡湯閃挫跌撲痛者痛必甚宜乳香趁痛散加全蠍效更速不效必有惡血宜四物湯加桃仁大黃穿山甲勞役負重痛者宜十全大補湯下青娥丸阻抑失志而痛者宜牛膝杜仲菖蒲遠志茯苓沉香乳香憂鬱怒傷肝痛者宜乳香菖蒲木瓜棗仁桂枝當歸牛膝牽引足膝痛者宜續斷丸腰膝疼痛或頑麻無力者宜牛菟丸腰膝痛不可忍似腎臟風毒攻刺者宜海桐皮酒腎虛腰痛不能反側者羊腎丸卒然腰痛不可俯仰者宜炙鱉甲末酒服方寸匕日二腰痛日久不止者宜絲瓜根饒存性每末二錢酒服效甚捷腰痛連環跳穴痛痹者宜沙苑子桂枝茯苓桑寄生炒杞子炒茴香腰髀環跳悉痛脈澀煩勞即發下焦空虛脈絡不宣所謂絡虛則痛者宜歸身小茴桂枝木防己牛膝萆薢沙苑子生杜仲老年腰膝久痛牽引少腹兩足不堪步履所謂奇經之脈隸於肝腎為多者宜薄桂當歸鹿角霜肉蓯蓉小茴香柏子仁痛之為類不一宜各治療如此總之諸般腰痛其源皆屬腎虛若有外邪須除其邪如無一於補腎而已腰肢痿弱身體疲倦腳膝痠軟脈或大或細皆無力痛亦隱隱而不甚是其候也然雖總屬腎虛其間又宜分寒熱二患脈細無力短氣溺清是為陽虛而屬寒法當溫補宜鹿茸肉蓯蓉巴戟補骨脂川椒茴香附子肉桂脈大無力火炎便赤是為陰虛而屬熱法當滋補宜六味丸加芎歸知柏龜板白芍杜仲丹參續斷此其要法也丹溪曰若久腰痛必用肉桂開之方止亦是妙法不可不知脈法內經曰按之至骨脈氣少者腰脊痛而身有痹也又曰尺脈沉腰背痛脈經曰腰痛之脈皆沉弦沉弦而緊者為寒弦而浮者為風沉弦而濡細者為濕沉弦而實者為閃挫丹溪曰腰痛脈必沉而弦沉為滯弦為虛澀是瘀血緩者是濕滑者伏者是痰大者是腎虛也腰病原由症治入門曰腰者腎之外候一身所恃以轉移開合者也然諸經貫於腎絡於腰脊雖外感內傷不同必腎虛而後邪能湊之故不可輕用涼藥亦不可純用參耆補氣也又曰腰痛有十有腎虛有痰飲有食積有挫閃有瘀血有風有寒有濕有濕熱有氣凡十種食積雲者因醉飽入房濕熱乘虛入腎故腰痛難以俯仰也合用四物二陳加麥芽神麯葛花砂仁杜仲黃柏桔梗官桂枳殼治之仲景曰病人身體重腰中冷如坐水形如水狀反不渴小便自利飲食如故腰以下冷痛重如帶五千錢腎著湯主之鰲按此即腎著症也亦屬於腰治法大抵與濕同醫說曰腰痛病面上忽見紅點人中黑者死也鰲按古今醫鑑載有補腎湯一方可為一切腰痛主治之劑或隨其風寒濕熱痰食氣血略為加減可也其方用炒破故紙鹽酒炒茴香酒炒元胡索酒洗牛膝酒洗當歸酒炒杜仲鹽酒炒知母鹽酒炒黃柏各一錢加姜三片空心服今議加減之法如有風加制草烏七分天麻錢半如有寒倍杜仲加桂枝炮附子各一錢如有濕加蒼朮白朮桃仁各一錢如有熱去破故紙加羌活一錢黑豆三錢如有痰減知柏一半加制南星六分製半夏二錢茯苓三錢如有食倍故紙加神麯麥芽枳實各一錢如有氣減知柏一半加白蔻仁白檀香各五分烏藥青皮各一錢如有瘀血去知柏倍元胡歸身換歸尾加肉桂柴胡各一錢桃仁二錢甚者加五靈脂一錢如跌撲閃挫去知柏倍元胡歸身加羌活獨活乳香沒藥桃仁各一錢或加肉掛赤芍酌治分數腰痛導引法得效曰病人正東坐收手抱心一人於前據躡其兩膝一人於後捧其頭徐牽令偃臥頭到地三起三臥便差臍痛腎經病也難經曰十二經脈皆繫於生氣之源所謂生氣之源者謂腎間動氣即下丹田也此五臟六腑之本十二經脈之根呼吸之門三焦之源也故正理論曰下丹田在臍下三寸方圓四寸著於脊梁兩腎之間右白左青上赤下黑中央黃色名曰大海貯其精血據此則知臍為一身所繫而關於腎也故仲景特傳臍築症謂臍築湫痛命將難痊湫者深也臍為生氣之源築痛者生氣已絕也海藏亦謂臍下築者腎氣動理中湯去朮加桂主之腎惡燥故去朮恐作奔豚故加桂也若悸者茯苓海藏之法誠能深體仲景者也余嘗治一少年數日必患腹痛痛連少腹臍中常濕甚則黃水流出診其脈兩尺皆虛右關濡而且沉知其有傷腎元又為脾濕所遏故因制方以藥令填臍中宜沈氏填臍散內服丸劑宜沈氏溫臍丸數月全愈蓋欲治臍必以治腎為主或兼他症乃可瘳也小兒有臍風臍腫臍瘡等症皆由斷臍後為風寒水濕所侵而成臍風則必面赤喘急啼聲不出臍腫突腹膨脹日夜多啼不能飲乳甚則發搐噤口撮口宜調氣益黃散甚者宣風散至如熱在胸膛伸引努氣亦令臍腫發風宜千金龍膽湯凡臍邊青黑爪甲黑者死大約初生七日內見噤口撮口臍風三症者危百日內見此症手足蜷者亦不治斷臍後傷水濕或入風冷致成臍腫必四肢不和多啼不能乳宜柏墨散五通膏臍中血水汁出或赤腫痛乃臍瘡也宜龍骨散摻之臍之為病如此臍病症治內經曰臍者齊也言其上下齊也天樞之穴正當臍兩旁各二寸是為身半也集要曰病人臍腫反出者死臍反出此為臍先死凡人膿從臍中出者肚癰也丹溪曰水腫臍突出者死東垣曰腸癰為病繞臍生瘡或膿從臍出連腎發者即下搭也生十四椎旁腰腎之間其發也寒熱百節痛口渴宜仙方活命飲黃耆內托散不治潰爛透膜而死若咳嗽嘔噦腰間似折不能俯仰者亦死此皆由房勞太過有傷腎水所致也若腰胯之間疽發如石經月不潰名石疽由肝胃二經積熱邪毒固結元氣弱不足以起發之故經月不潰也急服藥以發之宜仙方活命飲加羌活獨活柴胡黃芩或汗之宜勝金丹或下之宜一粒金丹或老弱者補之宜人參養榮湯十全大補湯各隨所宜嘔噦不食神昏脈散者亦死也纏腰火丹者即火帶瘡由心腎不交肝火內熾流入膀胱纏於帶脈故腰間生瘡累累如珠如束帶者然急宜服藥以解之宜仙方活命飲壯實者下之宜內疏黃連湯外用清熱解毒藥敷之不早治毒由臍入亦膨脹死也蛇纏瘡亦往往生腰間如蛇盤之狀宜醋調雄黃末塗之仍酒調服流注者不盡生腰間或四肢關節或胸腹腿臀皆患之以腰間亦生此症故詳於此生他處者可一例治也其原皆由脾胃傷損或由房勞陰陽湊或由營氣逆於肉裡或由邪客腠理或由暴怒傷肝或由鬱結傷脾或由濕痰流走或由跌撲血瘀或由產後惡露凝滯種種之由要必成於元氣虧損其為症也有結塊者有漫腫者有腫硬作痛者方其未潰急急消之先服行氣散血之劑宜瘡科流氣飲一兩帖隨服消散藥宜沈氏流注散則自愈矣若已成者當潰宜托之宜托裡消毒散久而不斂者當益氣補血宜人參養榮湯內有膿管而不斂者必腐化其管宜針頭散一切流注皆如此治法不獨腰間流注也臍膀紫黑先厥後熱少腹痛如刀刮二便皆澀兩足筋縮者有腸癰之慮至於臍瘡已詳上篇不贅流注之屬薛之齋曰有馬𤷍串者名走散流注外形微腫骨內疼痛因風熱走散四肢治當疏風散熱不可針烙繆仲淳曰馬𤷍串名不一種但有熱者用去熱散有表者用荊防敗毒散有里者用內疏黃連湯有表又有里者用追疔奪命湯又曰馬𤷍有熱未成服藥退之已成者但出膿其熱方退若生堆核四五必盡出膿方退若潰爛者依潰瘍法治之治腰臍病方二十六防風蒼朮湯風痛防風蒼朮桔梗陳皮桃仁白芷川芎當歸枳殼厚朴姜附湯寒痛杜仲乾薑炮附子炮腎著湯濕痛乾薑茯苓白朮甘草獨活寄生湯風濕獨活牛膝杜仲秦艽細辛白芍人參茯苓當歸熟地防風甘草桑寄生五積散寒濕白芷半夏白芍枳殼桂枝當歸茯苓川芎甘草麻黃陳皮桔梗厚朴乾薑蒼朮加蔥羌活勝濕湯濕熱羌活防風蒼朮甘草黃連黃柏澤瀉豬苓甘豆湯熱痛黑豆二合甘草二錢二陳湯痰飲茯苓陳皮半夏甘草烏藥順氣散氣滯白朮白芷青皮茯苓烏藥陳皮人參甘草調榮活絡湯死血大黃牛膝赤芍當歸杏仁羌活生地紅花川芎桔梗乳香趁痛散閃跌龜板赤芍沒藥當歸防風血竭官桂白芷牛膝天麻羌活檳榔乳香虎脛骨自然銅白附子蒼耳子骨碎補五加皮每末一錢酒下四物湯惡血川芎當歸白芍生地十全大補湯勞役人參茯苓白朮炙草川芎當歸白芍熟地黃耆肉桂姜棗青娥丸又補骨脂杜仲胡桃肉同蜜丸續斷丸牽引六味丸補陰熟地山萸山藥丹皮茯苓澤瀉牛菟丸頑麻牛膝菟絲子各一兩同入銀器內酒浸一寸五分曬為末將原酒煮糊丸空心酒下海桐皮酒痛極海桐皮苡仁各二兩生地十兩牛膝川芎羌活地骨皮五加皮各一兩甘草錢半浸酒二斗冬十四日夏七日空心飲一盞日飲三次常令醺醺禁毒食此方治濕熱而痛者方內藥味分量切不可添減方效羊腎丸腎虛鹿茸菟絲子各一兩茴香五錢為末以羊腎二對入酒煮爛搗泥和丸陰乾每三十五丸酒下日三服沈氏填臍散臍濕大附子一個甘遂研錢半蛇床子研篩一錢麝香五釐先將附切一蓋挖空將二末裝入以蓋蓋好線扎用火酒半斤入罐內將附子並挖下屑俱放在內細火同煮罐口竹紙封好蓋上放糯米七粒米熟取出切片烘乾並屑亦烘乾同研細末入麝香再研每用一匙填臍內外用膏藥貼之此余自制方也用之奇效沈氏溫臍丸內服補骨脂五錢巴戟白朮杜仲烏藥苡仁各一兩菟絲子兩半蒼朮小茴青鹽各四錢神麯糊丸空心米湯下此亦余自制方也用之效調氣益黃散臍風金頭赤足蜈蚣一條酒浸炙蠍尾四個白殭蠶七個炒瞿麥五分每末一字吹鼻取嚏啼哭則可治仍用薄荷湯調一字服千金龍膽湯又柏墨散臍腫黃柏末釜下墨亂髮灰等分為末乾摻之或油調敷五通膏又生地生薑蔥白蘿蔔子田螺肉共打爛搭臍四圍一指厚抱住下屁泄而愈龍骨散臍瘡龍骨煅枯礬少許摻之油調敷亦可治腰臍瘡瘍方十一仙方活命飲下搭穿山甲炒白芷防風赤芍甘草歸尾花粉貝母角刺各一錢金銀花陳皮各三錢乳香沒藥各一錢另研末水酒煎送下二末黃耆內托散又黃耆當歸川芎厚朴桔梗防風人參甘草白芍白芷各五分官桂三分為末灑服此方治潰後內虛氣虛初發亦可用勝金丹石疽制白砒麝香蟾酥各一錢雄黃辰砂乳香沒藥血竭各錢半全蠍炮天龍炙去頭足穿山甲炙各三錢炒姜蠶五錢每三錢砂糖調蔥頭酒下取汗一粒全丹又沉香乳香木香各五分巴霜一錢半棗肉丸芡子大每一丸量人虛實先呷水一口行一次胃氣實者只可呷水三四口後用水一口送下行數次米飲補之人參養榮湯又人參陳皮黃耆肉桂當歸白朮炙草各一錢遠志五分白芍錢半熟地五味子茯苓各八分十全大補湯又人參茯苓白朮炙草川芎當歸白芍熟地黃耆肉桂內疏黃連湯火帶黃連白芍當歸檳榔木香黃芩山梔薄荷桔梗甘草各一錢連翹大黃各錢半水煎量人虛實而用瘡科流氣飲流注人參桔梗肉桂當歸甘草黃耆厚朴紫蘇白芍烏藥枳殼防風檳榔川芎白芷木香生薑痛加乳香沒藥流注加羌活獨活氣滯加香附胃虛加陳皮不可多服致氣血虛耗不能成膿此方主恚怒氣結塊核腫硬及風寒濕熱搏結經絡或血氣不和成腫塊漫腫木悶者神效沈氏流注散又木香錢半雄黃五分硃砂六分蟬退全蟲各七個金銀花子五錢共為末分三服酒下此余自制方也用之無不效托裡消毒散又人參鹽水炒黃耆酒炒當歸炒白芍川芎白朮茯苓各一錢金銀花白芷各七分炙甘草連翹各五分針頭散又乳香蟾酥各一錢研勻以兒乳汁和如泥入磁盒安放每用以唾調一些點腫處以膏藥貼之毒氣自消即發亦輕
