body:
  text: 卷一臟腑門肺病源流肺脹肺萎肺癰息賁手太陰肺脈起於中焦下絡大腸還循胃口上膈到肺從肺系橫出脅下下循𩪰內行少陰心主之前下肘中循腎內骨上廉入寸口上魚際出大指之端少商穴止其支者從腕後直出次指內廉之端次注於手陽明大腸經每日寅時周身氣血俱薈萃而注於肺手太陰肺經多氣而少血肺主氣上連喉系下通心肝之竅司呼吸出入居上以鎮諸臟而壓糟粕以行於大腸出納清氣以出濁物所受者太陽之陰以固陽氣所司者太陰之陽以行陰物又與足太陰脾同行氣以給眾臟故亦名太陰其屬則位西方金其配則為秋令秋則氣化清肅萬物賴以成遂金則為水之母其氣恆下行靜時下澄於腎宮與水相通經所謂母隱子胎是也但腎為真水天一所生肺既為其母故居華蓋之頂猶據天河之上源以注崑崙而入龍門以匯於海也其輸精臟腑猶在天之雨露廣沛群生也然嘗病燥與寒熱以輸精布眾或太過未及滋化或邪乘不得行令故反病燥宜滋燥飲反病寒熱也寒宜紫蘇飲子熱宜瀉肺湯古人嬌臟之名所由來矣夫肺主皮毛而皮毛則純屬太陽之部太陽之傷風傷寒汗出中風與形寒飲冷皆能傷肺故其現症如鼻塞聲重喘咳氣逆肩背痛嚏噴胸滿煩心亦與太陽同五志之火上炎陰虛內爍肝火挾心而刑金亦能傷肺故其現症如肺萎肺癰痿躄吐血聲嘶息有音鼽衄掌熱喘不休口血出皮毛焦皆由火燥焦卷之故若虛則有少氣不能報息耳聾嗌乾諸症而此諸症或由外傷治與足太陽所感病同法或邪盛鬱塞必於足太陽瀉之若傷於內者正氣衰金被殘賊必於足少陰養之使子能助母而金氣不至耗泄於足太陰培之使母能生子而金氣得以涵育昔人云補水培土是養金善法洵有然也抑猶有進者金性下沉隱於子胎腎家水火兩病肺俱能受其害故有時腎水上泛為痰肺受之則喘壅而嗽有時腎火上凌其母肺受之則喘息而鳴皆腎氣上逆而為病也要不外足太陽足太陰足少陰三經從而治之脈法脈經曰肺傷者其脈細緊浮數其人勞倦咳唾血肺病症經曰風寒入舍於肺名曰肺痹發咳上氣又曰大骨枯大肉陷胸中氣滿喘息不便其氣動形期六月死真臟脈見乃與之期日注曰肺之臟也難經曰外症面白善嚏悲愁欲哭內症右有動氣按之牢若痛其病喘咳灑淅而寒熱也靈樞曰肺氣虛則鼻息不利少氣實則喘咳胸頻伸息肺病間甚經曰肺病者下晡慧日中甚夜半靜肺病治法經曰肺苦氣上逆急食苦以泄之注曰此肺氣有餘也肺欲收急食酸以收之用酸補之辛瀉之又曰肺病禁寒飲食寒衣肺絕候經曰手太陰氣絕則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節傷皮節傷則爪枯毛折毛折者毛先死丙日篤丁日死又曰肺絕三日死何以知之口張但氣出而不返一云口鼻虛張短氣仲景曰汗出發潤喘不休者此為肺絕肺氣滯澀保養法保生秘要曰凡人氣旺則血榮而潤澤氣絕則血枯而滅形故氣虛弱滯澀而成病如澀於肺則肺氣不清液凝滯而為痰諸痰膹郁皆屬肺上焦之疾或傳於大腸秋月金旺宜常呬吸以和其氣慎勿用諸肺則不厭其魄時秋初夏末熱氣酷甚宜少貪風涼一切行立坐臥飲食衣服皆慎之免傷背之腧穴中風之症蓋感此也肅殺之天殺中有生秋分之日戒傷生命大抵時至萬物收斂人心更要持守勿為馳逞發揚以散其氣肺脹肺家氣分病也仲景曰咳而上氣煩躁者為肺脹欲作風水發汗自愈又曰咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之又曰肺脹咳而上氣煩躁而喘脈浮者心下有水氣小青龍湯加石膏主之丹溪曰肺脹而嗽或左或右不得眠此痰挾瘀血礙氣而病宜養血以流動乎氣降火疏肝以清痰四物湯加桃仁訶子青皮竹瀝之類據二家說可知肺脹本為肺經氣分之病故宜以收斂為主宜訶子青黛丸清化丸即挾痰挾血者亦不離乎氣不得專議血專議痰也肺萎久嗽氣虛而熱在上焦病也其症之發必寒熱往來自汗氣急煩悶多唾或帶紅線膿血宜急治之宜舉肺湯元參清肺飲切忌升散辛燥溫熱仲景云或有患此症吐涎沫而咳者宜生薑甘草湯有吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多吐涎必溫之宜甘草乾薑湯又有火盛者宜人參平肺散有喘急而面浮者宜葶棗散大約此症總以養肺養氣養血清金降火為主若肺萎將變為癰又必兼理膿毒宜紫菀散脈法脈經曰左寸脈數虛澀肺萎也肺萎之因仲景曰熱在上焦者因咳為肺萎此從何得之蓋以或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之又曰寸口脈數其人渴口中反有濁唾涎沫者此為肺萎之病脈經曰肺萎咳唾咽燥欲飲水者自愈自張口者短氣也肺癰肺熱極而成病也其症痰中腥臭或帶膿也總治宜清金飲皆緣土虛金弱不能生水陰火爍金之敗症故補脾亦是要著而其條治之法如初起咳嗽氣急胸中隱痛吐膿痰急平之宜麥冬平肺飲或咳吐膿痰胸膈脹滿喘氣發熱急清之宜元參清肺飲或病重不能臥急安之宜寧肺桔梗湯或已吐膿血必以去膿補氣為要宜排膿散勿論已成未成總當清熱滌痰使無留壅自然易愈宜金鯉湯凡患肺癰手掌皮粗氣急脈數顴紅鼻煽不能飲食者皆不治脈法脈經曰右寸脈數實肺癰也但色白而脈兼短澀者生色赤而脈兼浮大者死肺癰之因仲景曰寸口脈數若口中辟辟燥咳胸中隱隱痛脈反兼滑此為肺癰息賁肺積病也在右脅下如覆盆狀令人洒洒寒熱背痛嘔逆喘咳發肺癰脈必浮而長皆由肺氣虛痰熱壅結也宜調息丸息賁丸當以降氣清熱開痰散結為主治肺病諸藥要品及方五肺實宜降氣清潤蘇子桑皮天冬貝母枇杷葉杏仁前胡白前知母栝蔞根竹茹石膏黃芩麥冬車前子竹葉桑葉牛蒡子葶藶肺虛宜順氣清熱蘇子貝母百部沙參枇杷葉百合桑皮杏仁天冬五味子麥冬梨肉柿子無熱可加人參滋燥飲肺燥天冬麥冬生地花粉白芍秦艽加蜜童便服紫蘇飲子肺寒蘇葉桑皮青皮杏仁麻黃陳皮甘草五味子各一錢人參半夏各六分姜三片瀉肺湯肺熱山梔黃芩薄荷枳殼杏仁連翹桑皮桔梗甘草酒大黃各七分瀉白散肺實地骨皮桑皮各二錢甘草一錢或加知母貝母桔梗山梔生地麥冬亦可補肺散肺虛阿膠二錢牛蒡炒糯米各一錢馬兜鈴七分杏仁麩炒九個甘草五分治肺脹方五越婢加半夏湯總治麻黃石膏甘草半夏姜棗小青龍湯水氣桂枝麻黃乾薑酒白芍炙甘草細辛半夏五味子四物湯挾瘀川芎當歸白芍生地訶子青黛丸收斂訶子青黛杏仁海粉便香附栝蔞仁半夏曲薑汁蜜丸含化清化丸總治貝母一兩杏仁五錢青黛二錢薑汁砂糖丸含化治肺萎方七生薑甘草湯吐咳生薑五錢炙甘草三錢人參二錢棗五枚甘草乾薑湯吐而不咳炙草四錢炮乾薑二錢人參平肺散火盛桑皮二錢知母人參地骨皮炙草各一錢天冬赤苓各八分陳皮青皮各五分五味子二十粒姜三片葶棗散喘急面浮炒葶藶為末大棗十枚煎湯去棗調末二錢服舉肺湯總治桔梗甘草天冬竹茹阿膠沙參貝母百合元參清肺飲又元參柴胡桔梗陳皮地骨皮茯苓麥冬苡仁人參甘草檳榔加童便一小杯沖服紫菀散肺萎成癰紫菀人參知母五味子桔梗貝母甘草茯苓阿膠姜治肺癰方六清金飲總治苡仁橘葉黃芩花粉貝母桑皮桔梗牛蒡白蒺藜麥冬平肺飲初起麥冬人參赤芍檳榔甘草赤苓陳皮桔梗元參清肺飲吐膿方詳上寧肺桔梗湯不臥桔梗貝母當歸黃耆枳殼桑皮防己栝蔞仁甘草節五味子百合苡仁葶藶杏仁地骨皮知母咳甚倍百合身熱加柴胡便秘加大黃排膿散已成人參黃耆白芷五味子等分金鯉湯總治鯉魚重四兩者去腸勿見水入貝母末二錢縫好童便半碗浸之重湯煮至睛出去鱗骨將肉仍浸童便內頓熱一日分三次便肉俱食之其效至速治息賁方二調息丸總治陳皮蔻仁射干紫菀桑皮桔梗石咸海浮石旋覆花水泛丸息賁丸又川連一兩三錢厚朴八錢乾薑茯苓紫菀川椒各錢半人參二錢桂枝桔梗三稜天冬陳皮川烏蔻仁各一錢青皮五分巴霜四分茯苓另研余為末篩出和茯苓末研勻再入巴霜研勻蜜丸梧子大初服二丸每日加一丸漸加至大便微溏再從兩丸加服積去大半便勿服咳嗽哮喘源流咳嗽肺病也然雖為肺之主病五臟六腑皆有之蓋肺不傷不咳脾不傷不久咳腎不傷火不熾咳不甚其大較也而咳與嗽異先不可不辨有聲無痰曰咳非無痰痰不易出也病在肺肺主聲故聲先而痰後有痰無聲曰嗽非無聲痰隨嗽出聲不甚響也病在脾脾藏痰故痰出而嗽止二者總因心火困土剋金所致因咳有痰重在咳肺為主急宜順氣肺惡溫燥橘紅貝母桔梗桑皮知母麥冬紫菀為要藥因痰致嗽重在痰脾為主速宜消痰脾惡寒潤二朮南星半夏為要藥清火兼之最是要法而致咳之由則有兩大頭腦一曰內傷七情飢飽是也一曰外感風寒暑濕是也而風寒暑濕所感竟有不咳者感太重徑傷臟腑不留於肺故不咳不然先中皮毛以次傳及五臟故亦不復咳七情飢飽所傷竟有不嗽者病尚淺止在本臟不上干於肺故不咳否則臟氣受傷以次病及上焦故一時不遽咳所以傷寒以有嗽為輕七情之咳必久而後見也自表入者病在陽若用寒涼收斂必連綿不解變生他症故宜辛溫寧嗽湯或二陳湯加防風紫蘇之屬以求其屬散其邪肺清而嗽自愈自內生者傷其陰陰虛陽浮水涸金燥喉癢而咳最忌辛香助陽故宜甘潤宜保和湯滋陰清化丸以滋養肺水旺氣暢而咳自愈然外治雖宜散若病氣形氣俱虛又當補益以溫解如參蘇飲之用參桂枝湯之用甘芍實脾也脾實則肺金得養前邪易出後邪難入矣內治雖宜潤若命門火衰氣不化水不得概執滋陰之說而參羌附桂不妨酌用也然則內傷外感之殊不可先悉其源流乎而其發於五臟移於六腑者可更條析言之經曰肺咳之狀喘息有音甚則唾血宜以肺經藥治之如桔梗貝母栝蔞桑皮蘇子花粉等咳不已大腸受之咳則遺尿引上加升麻引下加大黃主治餘糧湯心咳之狀心痛喉中介介如梗狀甚則咽腫喉痹宜以心經藥治之如黃連細辛鬱金麥冬遠志等咳不已小腸受咳則失氣氣與咳俱失引上加桔梗引下加木通小茴主治芍藥湯脾咳之狀右胠下痛引肩背甚或不可動動則咳劇宜以脾經藥治之如半夏二朮陳皮腹皮之屬咳不已胃受之咳則嘔或長蟲出引上加升麻引下加石膏益智厚朴主治烏梅丸肝咳之狀左脅下痛甚則不可以轉轉則兩胠下滿宜以肝經藥治之如柴胡前胡川芎青皮青黛等咳不已膽受之咳則嘔膽汁引上加川芎引下加青皮主治黃芩湯腎咳之狀腰背相引痛舌本干咽作咸甚則咳涎宜以腎經藥治之如獨活天冬山萸故紙等咳不已膀胱受之咳則遺溺引上加羌活引下加橘核主治茯苓湯久嗽不已三焦又受之咳則腹滿不欲飲食引上加川芎引下加青皮主治木香順氣散心包絡咳心胸間隱隱作痛宜以心經藥治之如丹皮山梔肉桂等此經言臟腑相因之咳所當分別而治者也其餘又有肺脹痰挾瘀血或左或右不得眠動則喘急者宜四物湯加山梔紅花訶子青皮竹瀝薑汁等不得臥者不治又有肺勞熱生蟲如蠶咳逆氣喘謂之膏肓病針灸不至者宜驅二豎丸又有脾胃先虛不能制水水泛為痰水冷金寒而咳者宜六君子湯加減又有過服涼冷脾胃受傷寒水挾木勢而上侵肺胃前病未除新病更甚若進寒涼必至危殆者急補土母宜八味丸六君子湯加炮附又有因火爍肺金而咳者清金降火誰不知之芩連二冬知柏誤用必至更甚急補北方以瀉南方宜六味丸桔梗湯補陰後隨用參耆救肺使金土相生方可謂識先後著若用參耆於壯水之先陽火愈旺金愈傷矣以上皆臟腑餘症未可忽視者也且夫咳之為病有新久虛實之殊新咳者肺有實邪風則散之宜參蘇飲寒則發之宜二陳湯加紫蘇葛根杏仁桔梗熱則清之宜金沸草散去麻黃半夏加薄荷五味杏仁桑皮貝母茯苓桔梗枇杷葉之屬火則瀉之宜清火止咳湯濕則除之宜白朮湯痰則滌之宜加味二陳湯有久病忽咳病雖久而咳則暴亦為新咳必新傷風食也風則疏之宜消風寧嗽湯食則消之宜大安丸去連翹黃連加桔梗枳實等即愈矣久咳者屬虛屬郁有由氣虛者宜補中益氣湯有由血虛者宜阿膠四物湯有由血虛火盛喘咳聲嘶者宜芩連四物湯有氣血兩虛者宜寧肺湯有虛勞嗽痰熱渴汗者宜滋陰清化丸有虛勞咳血痰喘者宜五汁膏有虛勞嗽一二聲無痰夜則發熱過則冷睡多夢者宜劫勞散有火鬱於肺咳則有聲無痰者宜桔梗湯有濕痰內郁痰出則咳少止少項又咳者宜加味二陳湯而又有咳久傷脾滿面生瘡者宜人參蛤蚧散有久咳失音者宜杏仁膏清肺湯有久咳失氣者宜劫嗽丸有久咳面目浮腫者宜葶藶散有久咳不止諸藥不效者宜噙化丸立效方有久咳成癆者宜保和湯有久咳經年百藥不效余無他症與勞嗽異者宜百部膏烏梅膏有痰鬱火邪在中成乾咳嗽者此症極難治先用開劑宜逍遙散重加桔梗後用補陰之品宜本事鱉甲丸加熟地當歸白芍麥冬阿膠茯苓之屬咳之為病又有四時晝夜之異春嗽春氣上升也宜清氣宜二陳湯加川芎凡咳遇春即發為脾病健脾為主宜異功散加止嗽藥夏嗽炎火逼肺也無黃連不愈宜桔梗湯加石膏黃連秋嗽燥金用事也宜二陳湯加桑皮天冬秋末發嗽交夏方愈乃寒包熱也還須解表宜二陳湯加柴胡葛根冬嗽風寒外束也亦須發散宜二陳湯加麻黃杏仁羌活防風五更嗽或五更痰多或清晨痰多總皆脾虛所致宜六君子湯加炮姜日夜不咳但朝晨咳幾聲火空則發也宜二陳加黃芩桔梗桑皮日夜亦嗽惟早晨嗽更甚胃中有食積至此時火氣流入肺中也宜瀉白散加知母或二母散五更嗽同上半日咳痰稠黃胃火也宜二陳湯加竹茹貝母石膏午後咳痰黑黏滯陰虛火動也宜六味作湯加止嗽藥黃昏咳腎經陽衰陰弱虛火上炎也當補脾肺生腎水不可專用嗽藥宜六味丸六君子湯間服不論大人小兒黃昏熟睡中忽咳兩三聲食積痰也消其痰而咳自止宜二陳湯加山楂神麯麥芽後半夜嗽風也宜二陳湯加防風日輕夜重咳血少也宜二陳湯多加當歸即止凡黃昏五更上半夜咳屬實後半夜咳屬虛此又不可不知者總而言之咳嗽之因共十有六一曰風嗽風乘肺也其脈浮必兼鼻塞流涕聲重口乾喉癢憎寒發熱自汗惡風煩躁語未竟自咳宜款冬花散金沸草散二曰寒嗽脾肺皆受寒邪也其脈弦微必兼面白口甘水反侮土寡於畏也腹中大寒痰白作泡口甘涎沫者胃寒不和必以辛甘熱去之宜紫蘇飲子半夏溫肺湯或有遇寒即發者乃寒包熱也解表則熱自除宜桔梗湯加麻黃防風杏仁陳皮紫蘇木通黃芩大概寒傷肺而咳者其脈緊必兼鼻塞聲重憎寒發熱無汗煩躁不渴胸緊甚至音啞宜二陳湯加麻黃杏仁桔梗三曰熱嗽傷於暑熱而得嗽也其脈數必兼口燥聲嘶煩熱引飲或吐涎沫甚至咯血宜洗肺散芩半丸黃連化痰丸須知咳嗽面赤胸腹脅常熱惟足乍有時冷其脈洪滑者必熱痰留滯於內故嗽而胸滿也宜半黃丸小陷胸湯四曰濕嗽濕傷脾也其脈濡細必兼骨節煩疼四肢沉重或有汗小便不利痰多宜白朮湯白朮丸五曰郁嗽即火嗽也其脈數必兼面赤或肺脹喘急睡不安痰少甚者乾咳而無痰乃腎水枯涸邪火獨炎所致宜清化丸清金降火湯六曰勞嗽虛勞咳嗽也其脈細數必兼盜汗出痰多作寒熱火升喘促蓋緣酒色過度虛勞少血津液內耗心火上炎遂使燥熱乘肺唾咯膿血上氣涎潮其嗽連續不已也宜人參清肺湯訶黎勒丸人參芎歸湯七曰食積嗽傷食生痰久積發咳也其脈數硬必兼胸滿噫酸發熱或稠痰壅滯喘滿皆由胃火上炎沖逼肺氣久而不愈也此非青黛栝蔞不除栝蔞丸二母寧嗽湯總之凡有食積者必面青黃白不常面上如蟹爪路一黃一白者此又可望色而知也八曰氣嗽七氣積傷成咳也其脈浮洪滑數必兼上氣喘急痰涎凝結或如敗絮或如梅核滯塞咽喉吐不出咽不下多因七情鬱結或勞傷脾肺甚而多吐膿血漸成肺萎將作勞瘵也然氣嗽一症婦人多有之宜團參飲子蘇子降氣湯星香丸九曰痰嗽嗽動便有痰聲痰出即嗽止也其脈浮滑必兼胸膈滿痰涎多或寒熱交作面浮如盤緣濕痰在胃上干於肺也宜半瓜丸滴油散澄清飲其有一種發咳時直至頓吐飲食痰物俱盡方小安者此乃肝木克脾土風痰壅盛所致也宜白圓子十曰干嗽肺中無津液也其脈細澀必兼氣弱或促乃痰鬱火邪於肺中輕則連咳數十聲方有痰出重則雖多咳亦無痰故為乾咳嗽極難治始宜用苦桔梗以開之再用補陰降火之劑不已則成勞瘵在不得志者多患此宜干嗽補肺膏加味二母丸瓊玉膏十一曰血嗽嗽而多唾瘀血也其脈浮芤而數必兼喉中有腥氣或因上焦有熱血瘀沉悶嗽聲連並氣不得透宜桑皮散或因打撲損傷肺氣作咳多吐黑血宜當歸散十二曰酒嗽傷酒而成也蓋酒大熱有毒或冷熱兼飲日久漸傷胃脘其氣結聚不流致成濕痰作嗽宜栝蔞青黛丸栝蔞杏連丸蜂姜丸十三曰久嗽諸般嗽久也蓋積痰留聚肺脘黏滯如膠以致氣不升降或上氣喘急宜蜂姜丸貝母湯加味百花膏並有至數十年不愈者宜馬兜鈴丸潤肺除嗽飲十四曰火嗽火熱嗽也其脈洪數必兼面赤煩渴引飲有聲痰少或由肺家積熱宜清肺飲或由傷寒潮熱痰盛胸脅痛宜柴胡枳桔湯或由火肺郁脹氣急息重宜海青丸蓋以肺腎二經乃人身之化源二經有虧則化源絕故痰火益盛而嗽發不止也宜滋陰清化丸十五曰夜嗽陰虛嗽也多屬腎氣虧損火炎水涸或津液壅而為痰故夜間屬陰分陰氣相感故咳聲不絕至曉方緩或兼口苦胸痞脅痛多吐涎沫不進飲食故夜咳必用知母切忌生薑以其辛散恐復傷陰也古人多以六味丸加知柏天冬貝母橘紅治之所以滋化源也宜滋陰清化丸麻黃蒼朮湯十六曰天行嗽感時行之氣作咳也蓋因時令不正人多感冒以致痰盛寒熱或鼻塞聲重宜人參飲子一服散而亦有四時感受風寒作嗽不盡由一時天行之氣者宜參蘇飲由是以治諸咳庶幾用藥皆有關竅而罔弗奏功矣脈法咳嗽哮喘肺萎肺癱內經曰喘鳴肩息者脈實也緩則生急則死也脈訣曰咳嗽所因浮風緊寒數熱細濕房勞澀難右關濡者飲食傷肺左關弦短疲極肝衰浮短肺傷法當咳嗽五臟之嗽各視本部浮緊虛寒沉數實熱洪滑多痰弦澀少血形盛脈細不足以息沉小伏匿皆是死脈惟有浮大而嗽者生外證內脈參考調停正傳曰關上脈微為咳脈弦或緊為寒脈浮為風脈細為濕脈數為熱脈沉為留飲沉數為實熱洪滑為多痰脈浮軟者生沉小伏匿者死又曰喘脈滑而浮者生澀而數者死大抵宜浮遲不宜急數又曰咳逆脈浮而緩者易治弦急而按之不數者難治脈急或促或微皆可治脈代者死右關脈弦者木乘土位難治仲景曰咳唾膿血脈數虛為肺萎數實為肺癰脈經曰喘脈滑而手足溫者生脈澀而手足寒者死數者亦死為其形損故也又曰肺癰唾血脈緊強者死滑者生回春曰喘急脈沉肺脹停水氣逆填胸脈必沉取沉而實滑身溫易愈身冷脈浮尺澀難補入門曰咳逆上氣脈散者死散即數也咳逆脈數為火刑金故必死咳嗽之因內經曰人感於寒微則為咳甚則為泄為痛河間曰經云秋傷於濕冬生咳嗽者蓋傷濕積於脾也大抵秋氣宜清肅若反動之氣必上衝為咳嗽甚則動脾濕而為痰也是知脾無留濕雖傷肺氣亦不為痰若有痰而寒少熱多故咳嗽是咳嗽非專主於肺病以肺主皮毛而司於外故風寒先能傷之也經云五臟六腑皆能使人咳非獨肺邊各以其時主之而受病焉非其時則傳以與之也所病不等風寒燥濕火皆能令人咳惟濕病痰飲入胃留之而不行上入於肺則為嗽假令濕在心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰各隨症用藥又曰無痰有聲曰咳肺氣傷而不清也無聲有痰曰嗽脾濕動而為痰也有痰又有聲則曰咳嗽耳喘咳由腎家虛直指曰腎虛不能納氣歸元故氣逆咳喘痰盛或喘或脹髓虛多唾足冷骨痿胸腹百骸俱為牽掣咳愈重聲愈干當於受病之處圖之又曰肺出氣腎納氣凡咳嗽暴重動引百骸自覺氣於臍下逆奔而上此腎虛不能納氣也當以補腎為主毋徒寧肺咳嗽不治症靈樞曰咳而羸瘦脈堅大者死咳而脫形發熱脈小堅急者死入門曰凡咳喘至肺脹有咽瘡失音者必死脈數有熱喘嗽吐血上氣不得臥者死正傳曰久嗽不止成癆聲啞或喉中生瘡者不治丹溪曰咳嗽肺脹郁遏不得眠者為難治也禁忌法入門曰凡久嗽忌用人參半夏陳皮等燥藥久喘亦忌人參凡氣嗽忌罌粟殼肉豆蔻等澀藥丹溪曰凡咳嗽口乾咽燥而有痰者忌南星半夏宜栝蔞仁貝母若有飲水者又忌栝蔞恐膩膈導引保生秘要曰伸足坐定雙捏兒訣用力撐起低頭躬身漸下以兩手扳足尖三次隨原訣用力仰起次咽津下降幽闕如此躬法二十四回養靜半香效運功保生秘要曰此症有三種或感風寒而嗽或因心火妄動災於肺竅但用歸元凝神一法封固火不上行肺竅不癢其嗽自止卻寒嗽持守微用閉法卻火嗽但用封固取靜後引腎水澆灌肺火周旋度數肺得水潤嗽自然止哮肺病也當先辨哮與喘與短氣三症之相似而不同李氏士材曰喘者促促氣急噏噏痰聲張口抬肩搖身擷肚哮者與喘相類但不似喘開口出氣之多而有呀呷之音呷者口開呀者口閉開口閉口俱有聲音呀呷二音合成哮字以痰結喉間與氣相擊故呷呀作聲短氣者呼吸雖急而不能接續似喘而無痰聲亦不抬肩但肺壅而不能下按士材分別三症至為精細臨症時所當詳察哮之一症古人專主痰後人謂寒包熱治須表散宜陳皮湯冬加桂枝竊思之大都感干幼稚之時客犯鹽醋滲透氣脘一遇風寒便窒塞道路氣息急促故多發於冬初必須淡飲食行氣化痰為主宜千金湯能治一切哮禁涼劑恐風邪難解也禁熱劑恐痰火易升也蘇子枳殼青皮桑皮桔梗半夏前胡杏仁山梔皆治哮必用之藥士材謂先於八九月未寒時用大承氣下其熱至冬寒無熱可包此法大妙而又有食哮宜清金丹有水哮宜水哮方有風痰哮宜千緡導痰湯有年久哮宜皂莢丸青皮散若服青皮散愈後宜用半夏八兩石膏四兩蘇子二兩丸服皆當隨症治之無不可以斷其根也宜定喘湯哮病證治入門曰哮以聲響言喘以氣息言綱目曰哮喘遇冬則發者有二症一由內外皆寒須用東垣參蘇溫肺湯一由寒包熱須用越婢加半夏湯表散之正傳曰喘促喉中如水雞聲者謂之哮氣促而連續不能以息者謂之喘喘肺病也內經論喘之因甚多獨諸病喘滿皆屬乎熱一語足為綱領王海藏云氣盛有餘便是火氣盛當作氣衰有餘當作不足肺氣果盛有餘則清肅下行豈復為喘皆以其火入肺炎爍真陰氣衰不足故喘所謂盛有餘者非肺之氣肺中之火也海藏誠發千古之精奧而猶未究火所由來火之有餘即水之不足諸逆衝上皆緣壯火食氣銷爍肺金真陰虛故火益旺其症多自小腹下火起而上左尺大而虛非四物陰血之劑可療下焦龍火亦非寒涼可降其挾痰者乃水挾木火而上非竹瀝枳半能消必當補瀉兼行宜六味作湯加麥冬五味子大劑濃煎服之則水自升火自降痰自消若六脈俱沉實遍身痰氣火氣坐臥不得則又不在此例宜黃連膏總之喘因雖多而其原未有不由虛者元氣衰微陰陽不接續最易汗脫而亡一時難救古人言諸般喘症皆屬惡候是也蓋人身氣血陰陽如連環式樣一般兩圈交合之中一點真陽命也牽扯和勻即呼吸調息也若不接續即見鼻扇唇青掀胸抬肚張口搖肩等狀脈亦不續無神即死故凡喘皆不可忽視也試條列之火鬱喘六脈俱澀或沉伏四肢厥冷拂拂氣促而喘以為有餘脈卻不緊數以為陰虛尺脈又鼓指寒熱俱難投惟當宣散畜熱宜逍遙散加黃連吳萸使之發汗既愈再養陰和陽宜六味丸乃佳水氣喘促乃水氣逆行乘肺肺得水而浮喘不能臥氣不宣通當從小便去之宜桂苓甘術湯腎氣丸風寒外束喘喘必有力其氣粗有餘之喘也宜三拗湯勞碌氣虛喘必呼吸急促宜六君子湯胃虛喘抬肩擷肚喘而不休宜五味子湯食喘凡病初起即喘急多食或放屁或咬人或見壯脈皆食重之故消其食自愈宜資生丸痰喘動作便有痰聲宜先服定喘湯加栝蔞三劑次照痰症治痰甚喘痰聲更甚喘不休宜神仙住喘湯氣喘呼吸急促無痰聲宜定喘湯火喘乍進乍退食則減已則發宜桔梗二陳湯暑喘遇暑熱即病清暑益氣湯濕喘不論內蒸外感皆胸滿張口促急以利水為要宜滲濕湯陰虛喘火自臍下上衝便喘不休宜四物湯加知柏麥冬五味間服六味丸肺癰喘必口燥胸中隱隱痛吐膿右寸脈數實以保金化毒為主宜桔梗湯加防風橘紅金銀花麥冬肺萎喘唾有膿血或濁痰宜紫菀散肺脹喘上氣煩躁目如脫狀脈浮而大宜越婢加半復湯脈浮心下必有水氣宜小青龍湯加石膏藥後喘或其人素來勞倦氣虛或當病後用攻伐藥太過以致喘不能收宜補中益氣湯忽作喘必因感風感氣或多食飲酒而然須兼所感治之宜以定喘湯為主各加所感藥似喘非喘之喘由陽明之氣下行胃絡不和逆而上出也宜六君子湯似火非火之喘真元耗極腎氣上奔四肢厥冷面赤煩躁惡熱此非邪火乃命門真火離宮不歸兩寸浮數兩尺微弱用涼藥似稍快少頃依然此當細求其緒與以助元接真鎮墜之品宜六味丸腎氣丸生脈散送下覺氣稍定復用大劑以鎮於下或可回生宜大劑參耆加故紙牛膝阿膠小兒行走氣急作喘必是食食喘必兼感如感風疏風感氣開氣受驚鎮驚加入消食中自愈宜以平胃散為主各加所感藥老人動即作喘皆由虛衰必用補益不可專任定喘之劑宜嵩崖脾腎丸喘遇秋冬即發寒包熱也解表則愈宜陳皮湯喘不休汗出如油氣脫也不治惟獨參湯濃煎多服或可少延時日種種喘症皆當詳察治之至用藥通忌斂澀升發燥熱酸鹹之品降氣清火潤肺方為治喘平和之法宜通用蘇子桑皮枇杷葉前胡烏藥枳殼半夏山梔元參知母青黛黃芩梨肉貝母杏仁花粉桔梗橘紅天冬麥冬等孫慶曾先生云凡喘皆不可輕視言易治旨哉言乎誠見乎喘病之重而治喘之難也臨症者慎旃喘急形症內經曰肺主氣形寒飲冷則傷肺故其氣逆而上行沖沖而氣急喝喝而息數張口抬肩搖身掀肚者是為喘丹溪曰喘急者氣因火鬱而成稠痰在肺胃也入門曰呼吸急促者謂之喘喉中有聲響者謂之哮虛者氣乏身冷痰如冰實者氣肚胸滿身熱便硬又曰有起居如故而息有音者乃肺之絡脈逆而不得隨經上下也又曰喘非風寒傷肺則痰火脹急風寒則祛散痰火則疏導但火熱者亦不可純用苦寒宜溫以劫之又曰凡喘未發以扶正為主已發以散邪為主喘由腎虛得效曰下元虛冷腎氣不得歸元上喘氣急安腎丸八味丸主之喘嗽聲嘶丹溪曰聲嘶者由血虛受熱也蛤粉青黛蜜丸時常含化喘病不治症仲景曰凡喘煩躁無脈身冷神昏者死發汗如油汗出如珠不流抬肩擷肚喘而不休及膈前高起手足厥冷脈散及數者皆死直指曰汗出發潤喘者為肺絕身汗如油喘者為命絕直視譫語喘滿者不治諸有病篤正氣欲絕之時邪氣盛行都壅逆而為喘然則喘之危急又何可以尋常小症目之哉導引哮喘同保生秘要曰用手法於十一椎下脊中穴掐之六十四度擦亦如數兼行後功喘自然安運功哮喘同保生秘要曰以手摩擦兩乳下數遍後擦背擦兩肩定心咽津降氣以伏其喘治咳嗽方八十三寧嗽湯表病嗽桔梗半夏枳殼陳皮前胡葛根桑皮茯苓蘇葉杏仁甘草加薑蔥冬加麻黃取汗服此方後再用加味二陳湯一劑全愈不必多服二陳湯寒嗽半夏陳皮茯苓甘草保和湯內傷咳貝母知母天冬麥冬款冬花苡仁五味炙草紫蘇薄荷馬兜鈴紫菀桔梗百合阿膠當歸百部飴糖加姜失血加蒲黃生地小薊痰多加橘紅茯苓栝蔞仁喘者去紫蘇薄荷加蘇子桑皮陳皮滋陰清化丸內傷咳天冬麥冬生地熟地知母貝母茯苓山藥花粉五味子甘草蜜丸彈子大含化芍藥湯小腸咳白芍甘草各四錢煎餘糧湯大腸咳禹餘糧赤石脂烏梅丸胃咳烏梅細辛炮附桂枝人參黃柏乾薑黃連當歸蜀漆飯丸黃芩湯膽咳黃芩生薑半夏甘草茯苓湯膀胱咳茯苓桂枝生薑炙甘草木香順氣散三焦咳木香香附青皮陳皮厚朴蒼朮枳殼砂仁甘草四物湯肺脹川芎當歸白芍地黃驅二豎湯肺勞生蟲麥冬炮姜川椒黃耆人參肉桂百部白朮遠志肉細辛炙甘草杏仁蜜丸含化六君子湯水冷金寒咳人參茯苓白朮甘草半夏廣皮八味丸過服寒涼地黃萸肉山藥茯苓丹皮澤瀉附子肉桂六味丸火爍肺金地黃山藥萸肉丹皮澤瀉茯苓桔梗湯火鬱於肺桔梗香附山梔黃芩前胡貝母知母參蘇飲風嗽人參紫蘇葛根半夏前胡桔梗枳殼廣皮茯苓甘草木香金沸