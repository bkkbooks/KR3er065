人陰瘡方蛇床子研末和白粉少許綿裹棗大納陰中下疳小便腫脹方冰片分半大黃一錢黃柏二錢二分輕粉一錢研田螺肉搗膏塗之制甘草方連節大粉草四兩取山澗東流水一碗以甘草浸而炙炙而浸水完止研末入皂角灰少許分四服湯調下大有神效或酒煎服久自消此方專治穀道後生癰偷糞老鼠方瓦上曬白貓屎炙研酒下加味地黃丸熟地黃耆各兩半槐花黃柏杜仲白芷各一兩山萸獨活山藥各八錢丹皮茯苓澤瀉各六錢白附子二錢蜜丸空心米湯下五十丸此方為五痔滋陰必用之藥
