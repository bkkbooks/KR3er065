body:
  text: 卷二十八腹少腹病源流腹痛五臟俱有病也脾胃內舍心腹肺心內舍胸膺兩脅肝內舍胠脅少腹腎內舍少腹腰脊大小腸衝任脈皆在少腹此臟腑所舍之部位也後世醫者都以腹分三部大腹屬太陰脾臍腹屬少陰腎少腹屬厥陰肝竊按臟腑部位膈下即為胃上口曰賁門胃下口曰幽門傳入小腸處計胃長二尺六寸則當臍正屬胃之地分又考十二經筋脈所到心脾筋結臍胃筋脈亦挾臍至腎之筋脈從腰貫脊並不及臍則以大腹少腹屬脾肝猶未盡然而以臍腹屬腎尤不可解然則臍腹何屬屬之胃而已胃與脾表裡屬胃仍屬之脾而已故難經曰臍上痛心症也臍下痛腎症也臍右痛肺症也臍左痛肝症也臍之上下左右難經既分屬心腎肺肝土居中央則臍腹非屬之脾與胃乎臍腹者當臍也當臍痛而用腎藥大謬蓋以腹痛而分屬五臟猶厥心痛五邪相乘而病亦異也衝任大小腸亦屬腹每部各有氣血虛實內傷外感當細察之更有五臟之疝不於睪丸止在腹痛者亦宜察之總之腹痛之病先分寒熱虛實再詳蟲血食痰治法備矣腹痛多寒亦有因熱者寒痛脈必沉遲或伏痛綿綿無增減得寒愈甚得熱稍緩宜乾薑肉桂吳萸草蔻仁木香厚朴陳皮甘草香附麥酒炒白芍方用厚朴溫中湯桂香散熱痛脈必洪數腹中常覺有熱時痛時止痛處亦熱手不可近口乾舌燥小便赤澀肛門如燒此為積熱宜白芍黃連山梔甘草滑石木通方用調胃承氣湯下之或四順清涼飲辨虛實之法不一而總以可按屬虛不可按屬實為準故有按之似痛重按之卻不痛大便利者為虛寒症宜理中湯桂香散其或按之痛甚手不可近大便堅者為實熱症宜調胃承氣湯今人但知諸痛屬實宜破結疏利因用枳實青皮檳榔大黃等苟其得當亦驗若遇虛寒必更甚矣故惟稔知壯實與初病當下之虛弱與久病當和之而治虛之法又必分氣血痛時常覺虛豁似飢非飢呼吸無力屬氣虛也宜六君子湯加廣木香若偎偎作痛如細筋抽引不寧又如芒刺牽引屬血虛也宜四物湯加陳皮木香以上寒熱虛實之辨也若食痛者脈必弦食得寒則滯得熱則行宜用溫散法如乾薑蒼朮白芷川芎香附薑汁之類不可妄用攻下峻利藥更兼行氣快氣藥助之自愈或面黃腹痛宿食不消吞酸腹痛痰滯傷食法亦同之宜丁香脾積丸平胃散加草蔻枳實半夏痰痛者脈必滑小便必不利飽則暫止餓則又痛宜導痰解鬱法宜二陳湯加香附蒼朮川芎枳實薑汁蓋清痰能作痛必胸腹有聲宜芎術散濕痰亦作痛由阻塞氣道之故宜四合湯蟲痛者不吐不瀉心腹懊憹往來上下痛有休止或腹中塊起按之不見五更心嘈牙關強硬噁心吐涎沫或清水腹熱善渴食厚味或飽則止面色青白赤不定蛔蟲攻咬面必黃宜殺蟲丸驗蟲之法以面上白斑唇紅能食心嘈顏色不常臉上有蟹爪路是其候也小兒蟲痛症最多死血痛者脈必芤澀痛有定處或由負重努傷或由跌撲損傷或婦人由經來瘀閉或由産後惡露未盡皆成死血宜消血飲萬靈散或桃仁承氣湯加當歸蘇木紅花童便酒以上食痰蟲血之辨也他如脾血虛而痛按之則止宜益氣補血宜人參炙草圓眼棗仁麥冬石斛白芍大棗中氣虛而腹寒痛宜補中益氣宜人參黃耆白朮沉香五味子益智仁陽氣虛而絡空冷氣乘之當臍微痛手按則止不可破泄真氣宜茯苓煨薑白朮肉桂脾陽郁傷每痛必周身寒栗吐涎沫而痛止宜升陽散郁宜半夏厚朴蘇梗生薑延胡索草果金鈴子陰濁腑陽不通脈沉微腹痛欲大便宜以辛熱通陽宜生白朮吳萸良薑厚朴半夏川熟附茯苓小茴益智仁薑汁郁傷肝脾之絡致敗血瘀留遇勞役動怒腹痛即發宜辛通潤血宜桃仁桂枝韭白穿山甲營分虛寒當臍腹痛噯氣遇冬必發過飢動怒亦發宜溫通營分宜肉桂當歸炮薑茯苓炙草暑傷氣分長夏腹脹食減微痛宜調脾疏肝宜人參廣皮白芍茯苓穀芽益智仁陰毒腹痛厥逆唇青卵縮六脈欲絶宜宣通陽氣宜鴿子屎一合研沖熱酒一盞澄清頓服腎臟虛冷氣攻臍腹及兩脅痛不可忍宜祛散冷結宜定痛丸腹內熱毒絞結作痛甚至下血宜培土和中宜干黃土煮數沸去渣暖服一二升濕熱腹痛按之愈甚宜升提利小便宜升麻柴胡防風葛根木通黃連黃芩滑石車前不愈微利之宜加熟大黃即土鬱則奪之之義久受風露積冷攻刺痛淹延歲月百藥不效宜祛散沉寒宜和劑抽刀散過飲酒漿成積作痛宜醒脾解濕宜木香茵陳湯傷濕腹痛小便祕大便泄宜燥濕利水宜胃苓湯痰積腹痛下白物時眩喜熱湯脈滑宜消痰暖內宜星半安中丸氣滯塞腹痛大脹脈沉宜開通疏利宜木香順氣散腹痛而兼嘔吐陽不得降而胸熱欲嘔陰不得升而下寒腹痛為升降失常宜調燮陰陽宜黃連湯腹臍絞痛有時止妨食發欲死宜宣通氣血宜七氣湯攪腸痧腹痛四肢冷急以礬湯探吐甚者昏倒不省人急刺委中或十指出血宜藿香正氣散加木香砂仁或以馬蘭根葉細嚼咽汁即安或服童便立止疝氣腹痛即五臟疝不於睪丸者宜通調臟氣宜腹疝湯失血後腹痛或連少腹宜補養營血宜四物湯加炮姜以上皆腹痛之由也士材云腹痛以白芍甘草主之蓋甘者己也酸者甲也甲己化土此仲景之妙方也若脈緩傷水加桂枝生薑脈洪傷金加黃芩大棗脈澀傷血加當歸脈弦傷氣多加白芍脈遲傷火加乾薑綿綿痛欲熱手按脈遲者寒也香砂理中丸士材加增之法良為仲景功臣余又按一切腹痛以黑神丸主之無不效雖然腹之為病有不止於痛者如腹中鳴也靈樞以為中氣不足內經以為脾氣虛又以為病本於胃合而推之全屬土病宜平胃散而臟寒有水亦能鳴宜五積散火欲升水欲降亦相擊而多鳴宜二陳湯加芩連山梔如腹中窄狹也在肥人則由濕痰流灌臟腑宜二陳湯加蒼朮香附瘦人則由濕熱熏蒸臟腑宜二陳湯加蒼朮黃連雖為痰為熱不同而原於濕則一故丹溪以為此症必用蒼朮能燥濕也甚有神昏性躁心神不斂者宜二陳湯加遠志麥冬棗仁有兼血虛氣弱者宜六君子湯加川芎當歸總能除濕利氣使升降自如自然平復如腹皮麻頑或痛也凡人夏月洗浴後往往露腹當風其腠理開邪因入皮毛適與衛氣相值因搏擊而為麻頑不仁宜多煮蔥白食之自愈腎虛不能行水加以喜食酒面酒與水交聚腹中而面毒復纏滯其氣故水滲於腹皮而作痛也必先疏泄大便宜以錢氏宣風散蜜水煎送下神保元然後令脾腎氣復自然向安宜以青木香元一分安腎丸二分用二陳湯空心下之如腹中有水而為湧水症也內經言肺移寒於腎為湧水湧水者按之腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水也宜葶藶丸如腹皮弸急或硬也脾氣素虛又傷風與食交固不散日久而腹皮漸急而堅硬即俗名單腹脹也單云者以四肢不脹單脹急在腹也宜調中健脾丸以上諸款皆腹所生病也而要豈止於痛而已哉若少腹痛疝病為多然有不盡由於疝者其為症可辨如痛而喜按虛也宜溫補湯痛不可按實也宜溫氣湯痛而小便不利濕熱也宜五苓散加大黃滑石痛而脹急小便反利死血也宜和血湯痛連陰莖按之則止肝血虛也宜補血清熱用當歸生地白芍艾草牛膝麥冬丹皮童便甘菊有汗加人參黃耆棗仁五味子痛如絞急不可忍耐小便如淋諸藥不效酒欲過度也宜黃芩木通甘草三味煎服立止痛而按之有塊時脹悶其痛不移處瘀血已久也宜元胡索肉桂香附歸尾桃仁砂仁少腹之為病又如此脈法脈經曰脈細小緊急腹中刺痛陰弦亦是腹痛尺脈緊臍下痛弦急小腹痛尺脈伏或實小腹痛心腹痛不得息脈細小遲者生堅疾者死腹痛脈反浮大而長者死脈訣曰心腹痛脈沉細宜浮大弦長命必殂醫鑑曰尺脈弦則腹痛腹痛原由症治內經曰寒氣客於脈外則脈寒脈寒則縮綣縮綣則絀急絀急則外引小絡故卒然而痛因重中於寒則痛久矣寒氣客於背俞其俞注於心故相引而痛寒氣客於厥陰之脈則血澀脈急故脅肋與小腹相引痛寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣又曰熱氣留於小腸小腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣又曰腎虛則胸中痛大腹小腹痛清厥意不藥寒氣客於經脈之中與靈氣相搏則脈滿滿則痛而不可按也寒氣客於夾脊之脈則深按之不能及故按之無益也正傳曰從心下至小腹硬滿而痛者是邪實也須以大陷胸湯下之若小腹硬滿而痛小便利則是畜血之症小便不利則尿澀之症直指曰寒熱死血痰飲食積腹痛每每停聚不散惟蟲痛則乍作乍止去來無定又或嘔吐清沫此為可驗耳大腹外症名腹癰小腹外症名沖疽腹癰因於膏梁厚味及七情火鬱脾虛氣滯毒聚熱壅所致其症生於肚腹之皮裡膜外如腹痛特甚左關洪數乃即腹癰之兆其治以未膿已膿分法漫腫堅硬肉色不變是膿尚未成之候也宜托裡散仙方活命飲焮腫痛甚者邪氣實也宜仍用仙方活命飲托裡散或黃連消毒散此未膿前治法若腫起而軟皮色紅是膿汁已成之候也急速其潰宜托裡消毒散倘因氣血俱虛不即自潰或已有白頭宜急用替針丸或未有白頭宜急用針刺總當速令出膿切不可誤服克伐涼藥致腫痛不潰潰不能斂甚而壯者弱弱者死蓋以腹皮厚而脂膜脆使淹延日久腫不即潰潰不即斂易至內腐洞腸見腑為患不小故當其未膿必以扶元解毒為主佐以行經活血之藥及其已膿亦必以健脾胃壯氣血為主佐以排膿斂口之方宜十全大補湯托裡當歸湯此已膿後治法若發於小腹疼痛寒熱其名沖疽由心火炎熾流入腎經故疽發於腎部位也宜仙方活命飲或勝金丹奪命丹選用此症五日變色便可刺亦以速去毒膿速斂瘡口為主若失治必五十日死以小腹之為地與大腹同一要害也治腹少腹病方三十七厚朴溫中湯寒痛炮姜二錢厚朴陳皮各錢半赤苓草蔻煨各七分木香炙草各五分姜三片棗二枚四順清涼飲熱痛大黃當歸赤芍炙草各一錢二分薄荷十葉理中湯虛寒六君子湯氣虛人參茯苓白朮炙草陳皮半夏四物湯血虛川芎當歸白芍熟地丁香脾積丸食積三稜蓬朮各一錢青皮錢半良薑醋炒丁香木香巴霜各錢七分皂莢一片燒灰百草霜一匙糊丸麻子大白湯下二三十丸平胃散又蒼朮厚朴陳皮甘草二陳湯痰痛茯苓陳皮半夏甘草芎術散又川芎蒼朮香附白芷等分薑汁磨木香點熱湯調下二錢四合湯又陳皮半夏各錢半厚朴枳殼赤苓蘇葉香附鬱金各七分甘草五分姜五片殺蟲丸蟲痛鶴蝨雷丸蕪荑檳榔烏梅苦楝根使君子肉消血飲死血元胡索歸尾蘇木桃仁紅花赤芍五靈脂沒藥桃仁承氣湯又萬靈散又當歸一兩生地六錢肉桂蓬朮各五錢木香三錢每末二錢空心酒下此方兼治婦人少腹痛小便淋瀝是血也氣也熱也或大小産後遺經敗血所致五積散寒痛白芷茯苓當歸半夏炙草川芎陳皮肉桂枳殼白芍厚朴桔梗乾薑蒼朮如虛加人參白朮香附砂仁薑桂湯又乾薑肉桂良薑枳殼陳皮砂仁吳萸厚朴香附木香元胡索小茴甘草乳香桂香散又草豆蔻煨良薑炒白朮縮砂仁炙草煨姜厚朴棗肉各一兩青皮訶子肉各五錢肉桂二錢半水一碗同煮令乾杵作團曬研粗末每三錢入鹽少許沸湯點服此方治脾臟久冷腹痛空心腹痛最難得藥此特能止痛理不可知定痛丸又乾蠍七錢半焙為末以酒及童便各三升煎如稠膏丸每二十丸酒下藿香正氣散又茯苓白芷藿香紫蘇大腹皮厚朴白朮陳皮桔梗甘草調胃承氣湯積熱木香茵陳湯酒積木香檳榔枳殼蓬朮黃連黃柏大黃牽牛香附當歸田螺殼和劑抽刀散積冷白姜五兩入巴豆肉二錢二分半同炒黑去巴豆良薑五兩入斑貓二十五個同炒黑去斑貓石菖蒲五兩不炒糯米六兩炒黃每末二錢酒下和氣湯虛痞木香紫蘇檳榔陳皮半夏香附青皮甘草乳香沒藥胃苓湯濕痛蒼朮厚朴陳皮甘草白朮肉桂赤苓豬苓澤瀉星半安中丸痰積膽星半夏香附滑石枳殼青皮木香蒼朮山梔砂仁茯苓橘紅甘草二陳平胃散宿食茯苓陳皮半夏甘草蒼朮厚朴山楂神麯砂仁草果枳實壯人加木香檳榔蓬朮枳殼黃連大黃香附當歸黃連湯升降黃連一錢人參錢半半夏二錢二分乾薑桂枝各八分甘草五分姜棗木香順氣散氣滯木香香附檳榔青皮陳皮厚朴蒼朮枳殼甘草砂仁七氣湯絞痛人參肉桂半夏乳香甘草元胡索腹疝湯五臟疝人參黃耆茯苓白朮炮附子沉香木瓜羌活川芎紫蘇甘草加姜香砂理中丸寒痛黑神丸總治胡蘆巴石菖蒲各四錢皂角去皮弦二錢麵糊丸每服一錢半大陷胸湯下劑溫補湯虛痛人參白朮川芎當歸白芍熟地肉桂木香小茴香附元胡索溫氣湯實痛青皮香附小茴木香木通檳榔川楝子元胡索五苓散濕熱白朮肉桂茯苓豬苓澤瀉和血湯死血桃仁紅花歸尾赤芍生地青皮香附治腹少腹瘡瘍方九仙方活命飲腹癰穿山甲炒黃白芷防風赤芍甘草歸尾花粉貝母角刺各一錢陳皮金銀花各三錢乳香沒藥各一錢二味另研末水酒煎送二末托裡散又人參黃耆各二錢白朮陳皮當歸熟地茯苓白芍各錢半黃連消毒散又酒黃連酒生地酒歸身連翹羌活黃耆各一錢澤瀉七分黃芩黃柏炒獨活防風酒防已藁本蘇木陳皮桔梗各一錢酒知母四分人參甘草梢各五分水煎入酒少許服托裡消毒散又人參鹽黃耆酒當歸炒白芍川芎白朮茯苓各一錢金銀花白芷各七分甘草連翹各五分替針丸又十全大補湯又人參茯苓白朮炙草川芎當歸白芍熟地黃耆肉桂托裡當歸湯又當歸黃耆人參熟地川芎白芍各一錢柴胡甘草各五分勝金丹沖疽麝香制白砒各五分蟾酥一錢雄黃辰砂乳香沒藥血竭各錢半全蠍炮天龍炙去頭足穿山甲炙各三錢姜蠶炒五錢每末三錢砂糖調蔥頭酒下奪命丹又蟾酥輕粉各五分硃砂三錢寒水石枯礬銅緑各一錢蝸牛三十一個另研乳香沒藥麝香各一錢各另研將蝸牛泥為丸量添酒糊亦可緑豆大每用一丸生蔥三兩根嚼爛放手心裹藥酒下行六七里汗為效重者再服一二丸此方能治諸般大腫毒前陰後陰病源流前陰諸疾肝任督三經病也內經曰足厥陰之脈入毛中過陰器抵少腹是前陰為肝脈所過也又曰督脈者起於少腹以下骨中央女子入系廷孔循陰器男子循莖下至篡與女子等是前陰又為督脈所過也又曰任脈起於中極之下以上毛際循腹裡是前陰又為任脈所過也惟為三脈所過故前陰之病皆繫於三經而以三經為主焉夫前陰之病最重者莫如諸疝已另立篇於任脈病後茲不必贅茲故但詳前陰外見之疾一曰陰痿凡人色欲過度精髓耗敗傷於腎元遂致陰痿不起宜五精丸又有精出非法或強忍房事有傷宗筋亦致陰痿不起宜上丹還少丹又有陰濕傷陽陽氣不能伸舉亦致陰痿不起宜九仙靈應散又有失志之人抑鬱傷肝肝木不能疏達亦致陰痿不起宜達郁湯加菖蒲遠志杞子菟絲子一曰陰冷大約下部陽虛陰寒之氣凝結於腎致成此疾宜金匱腎氣丸加鹿茸又有命門火衰元陽虛憊常痿不起亦成此疾宜加減內固丸又有因寒疝厥冷及小腸膀胱奔豚等症亦成此疾宜十補丸又有因厥疝上逆囊寒卵縮亦成此疾宜吳茱黃湯又有陽氣怫鬱卒然陰結亦成此疾宜助陽散回春散一曰陰腫多因坐地觸風受濕或蟲蟻吹呵遂令外腎腫大莖物通明或痛或不痛小兒患此者尤多宜蟬退散又有囊腫莖不腫不痛如水㿉之類當別新久新發宜三白散橘核散久者宜橘核丸一曰陰縱亦名陰挺由前陰受熱則玉莖挺長不收或腫脹而痿或與股相磨難行甚至兩脅氣逆上手足倦弱宜柴胡清肝湯或小柴胡湯加黃連作大劑行其濕熱少加黃柏降其逆上之氣當漸收外以絲瓜汁調五倍子末敷之即愈婦女陰挺則陰中突出一物如菌如雞冠四圍腫痛由肝鬱脾虛下陷所致宜先以補中益氣湯加山梔茯苓車前青皮以清肝火升脾氣更以歸脾湯加山梔茯苓川芎調理外塗藜蘆膏或陰中挺出一條長尺許痛墜旦尿澀宜早服補中益氣湯晚服龍膽瀉肝湯外塗藜蘆膏或陰中生一物漸大牽引腰腹膨痛由多服熱藥或犯非理房事或意淫不遂所致宜一捻金丸或洗心散二錢地黃湯下一曰陰縮凡人一身之筋皆以宗筋為主宗筋在毛際系陰器寒邪乘之則宗盤急而陰必縮經故曰足厥陰之筋傷於內則不起傷於寒則陰縮也宜茱黃內消散陰囊之縮亦由於寒與傷寒熱病之熱入厥陰囊卵縮者有異蓋彼由於熱此由於寒也夫知陰囊之縮亦由寒則可知陰囊之縱亦由熱矣婦人亦有陰縮之病則陰戶急痛引入小腹是也宜加味逍遙散加知母地骨皮車前子婦人一切陰戶諸疾詳後瘡瘍條中當參看茲不贅一曰脫陽症凡人大吐大瀉之後元氣不接四肢逆冷面黑氣喘冷汗自出外腎縮搐不省人事須臾不救與傷寒陰陽易證同急服藥救之宜大固陽湯此急症也不得緩圖脈法綱目曰腎脈大甚為陰痿前陰屬宗筋內經曰前陰者宗筋之所聚太陰陽明之所合也注云宗筋挾臍下合於陰器太陰脾脈陽明胃脈皆輔近宗筋故云合也又曰宗筋謂陰毛中橫骨上下之堅筋也後陰諸疾大小腸病也後陰即肛門亦為穀道而其病之最重而難愈者惟腸風及痔兩大端如脫肛肛門癢痛腸澼等亦皆後陰病而腸風臟毒已詳諸血篇腸澼已詳痢疾篇脫肛肛門癢痛已詳大腸篇皆可勿贅試專舉痔病言之仲景曰大腸有熱必便血小腸有熱必痔故痔非外邪成病乃由臟內濕熱風燥四氣相合而成故入門云腸頭成塊者濕也腸頭墜腫者濕兼熱也出膿血水者熱勝血也作大痛者火熱也癢者風熱也大便祕者燥熱也小便澀者肝臟濕熱也其分別原由至為詳細仲淳又謂瘡頭向上硬者熱多瘡頭向下軟者濕多無非本於脾腎三經之虛又曰大便作痛者則潤燥除濕肛門墜痛者則瀉火除濕小便澀滯者則清肝導濕已成漏者則補精養血其言治法大概亦頗精當雖然痔之病不同而痔之名亦不一有五痔牡痔牝痔腸痔脈痔血痔是也俱宜五痔散神應散有九痔牛奶鼠奶雞心雞冠蓮花翻花蜂窩穿腸外痔是也俱宜槐角丸神應黑玉丹此皆古人隨症而定之名三因又即五痔而增氣痔酒痔瘻痔之名共有八痔痔之病雖多大約可以此八者概之矣且古人定名之義莫不各因其症之大小形似以為斷而要之毒深者其形大毒淺者其形小形雖異而實則同固非別有所感也故治痔之法總以涼血為主槐花槐角生地地榆所必用也又必和血生血故阿膠川芎當歸桃仁所宜用也又必寬腸行氣故枳實枳殼蒺藜木香所宜用也又必清熱故丹皮山梔黃芩連翹所宜用也又必逐濕故黃柏防己茯苓澤瀉所宜用也又必潤燥故麻仁大黃瓜蔞當歸所宜用也又必疏風故防風荊芥秦艽羌活所宜用也又必止痛故乳香沒藥雄黃黃連所宜用也雖應病之藥正多而治之之法不外是矣然而痔不分於大小要當別其內外八痔之名已足概痔之病而八痔之為內為外則有所當知者大約腸痔脈痔氣痔血痔酒痔此五者皆屬內牡痔牝痔瘻痔三者皆屬外何以見其然也腸痔結核肛內發則寒熱往來登廁肛即脫下血出宜獨虎散縮砂散脈痔腸口㿔發顆顆且癢且痛下血淋漓宜神應黑玉丹或釣腸丸皂角刺丸氣痔憂愁毒怒適臨乎前立時腫痛氣散即愈宜加味香蘇散血痔每大便有清血隨下如線而射出宜涼血地黃湯柏葉湯黃連湯酒痔每過飲酒輒發痛腫或下血宜乾葛湯槐角元所謂內五種也牡痔肛邊發露肉珠狀如鼠奶時潰膿血宜加味槐角丸秦艽蒼朮湯五痔散牝痔肛邊一枚生瘡陷入宜良方五痔散痔瘡方瘻痔浸淫濕爛歲積月纍蟲生其間蝕腸穿穴與痔漏約略相同宜大僂丸骨碎補丸所謂外痔三種也即此八法以為治痔其無弗瘳乎雖然更有雜治之法如內痔流血不止也宜豬臟丸如不拘內外痔出血裡急疼痛將欲成漏也宜蝟皮丸如濕熱內甚飽食腸澼發為諸痔久而成瘻也宜加味連殼丸或痔由血熱蘊結壅滯不通或一身盡熱或日晡肌熱或夜發熱也宜四順清涼飲如並無酒色之害平時但飽食久坐而成痔也宜三神丸如不拘內外痔下血不止也宜川歸丸如患痔而痛甚便燥也宜止痛丸如腸痔生核且腫且痛寒熱不休也宜皂角煎丸如由氣滯而發痔也宜荊芷湯如痔頭向上是大腸熱甚收縮而上也宜四物解毒湯如痔發疼痛坐臥不得叫喊難忍也宜椒子散如痔中生蟲蝕齧疼癢也宜獨葉丹如富貴人酒色過度喜怒不常生痔如鼠奶連珠或肛門腸腫膿血痛如刀割也宜神效散或外痔如蓮實鼠奶痛極之際掃上此藥即愈也宜茄柯湯如痔潰腐如爛桃多膿血也宜去毒散如翻花痔腫潰不堪也宜荊芥湯木鱉子散如痔發破潰其狀如雞冠也宜黃連赤小豆末敷如風痔腫痛發歇不定也宜姜蠶炒為末烏梅丸每五丸薑蜜湯空心下如諸痔有時發癢徹心爬搔不得極難忍也宜全蠍炒煙燻治痔之法亦既詳且備矣而又有痔漏者酒色之徒其所患痔瘡綿延不愈濕熱鬱久乃敗壞肌肉銷損骨髓甚者穿腸透穴而成漏管久則內如槁白外如黑腐涓涓流水清而帶黃初則濕熱久則濕寒矣此與瘻痔相似而不同以瘻痔乃痔中一種痔漏乃不拘何痔皆能成漏也故丹溪謂痔輕而漏重痔實而漏虛治痔之法不過涼血清熱治漏之法則初宜涼血清熱宜涼血飲久宜澀竅殺蟲宜蓮花蕊散蝟皮丸辰砂膏兼乎溫散宜苦參丸蓋初則腸胃氣實而為熱久則腸胃氣虛而為寒也據此則方書有云痔漏專以涼血為主者固非有云痔漏即瘻痔者亦非矣故患此症者與諸毒成漏者總宜大補氣血佐以涼血清熱燥濕方為正治宜加味槐角丸臟頭丸久則黑玉丹釣腸丸苦參丸蠟礬丸若久而成管必用毒藥腐爛而後新肉可生此其大略也若夫無痔之人肛門左右別生一竅流出膿血名為草漏與本有痔漏肛邊別生一塊作膿穿痔孔而出乃食積注下也俱宜連槐散此二種與痔漏其為患又依約相似夫東垣以痔疾為本於肝脾腎三經之虛丹溪又以為風熱燥歸於大腸故不列於瘍科而歸於內病也醫者其知之脈法脈經曰䘌蝕肛陰其脈虛小者生緊急者死正傳曰凡痔脈沉小實者易治浮洪而軟弱者難愈痔病原由症治內經曰因而醉飽筋脈橫解腸澼為痔三因曰腸澼為痔如大澤中有小山突出為痔又於九竅中凡有小肉痔出皆曰痔不特於肛門邊者有牙痔眼痔鼻痔等類其狀不一故曰痔者峙也漢避呂后諱號痔疾為野雞病醫鑑曰凡痔因酒色風氣食五事過度而變成二十四症歌曰痔症分三八憑名仔細看莫教年月久見者膽心寒菱角看形怪蓮花不可觀穿腸並鼠奶酒色兩相干莫願翻花怨蜂窠亦不寬雌雄同氣血子母及腸盤元珠尤可怪釣腸痛苦鑽核桃與流氣見者便心酸粟子於中大雞心在外安珊瑚形可惡那更脫肛難內痔紅不出搭腸里內蟠垂珠更難治日久有雞冠切莫輕刀火令君性命殘用功無半月去病更除根東垣曰痔核已破謂之痔漏本草曰瘻痔亦謂蟲痔日久蟲蝕其間痛癢不堪或肛門間射血如線乃蟲痔也蟲痔宜熏蝟皮艾入門曰痔疾有兼下疳瘡者有莖中出白津者有兼疝者皆肝腎不足變出勿單用寒涼正傳曰治法以苦寒瀉火芩連梔子槐花之類以辛溫和血當歸川芎之類風邪在下秦艽防風升麻之類提之燥熱怫鬱大黃枳殼麻仁之類潤之又曰初發便服槐角丸熱實服湯藥疏利臟腑及浴洗熏尉以取內消若變成痔漏須用寸金錠子三五次全愈甲乙經曰久痔與陰相通者死痔漏成穴大小便相通者亦死綱目曰痔根本是冷慎冷飲食及房事雞肉最毒而房事尤甚蕎麥麵亦須忌前陰後陰近處所發瘡瘍有七種一曰便癰生小腹腿胯上下合縫之間直指所謂上不在腹下不在腿介乎其中是也發於左名魚口發於右名便毒總名曰便癰又名曰騎馬癰此衝任督脈之墜道故為三經之病又其處為厥陰肝經之絡所在厥陰經少氣多血故此實為血疝有一邊發者症輕有兩邊發者症重皆由房欲不節或淫心不遂敗精搏血留聚經隧所致亦有交合不潔淫火衝動膚腠開通一時受毒而成者其來也不同其發也則一初起時寒熱交作結核腫塊四邊浮腫相併伏硬青黑或卒然而起或先患下疳瘡而發一兩日內當先辨其有表裡症與否如有表腫痛發熱急散之宜荊防敗毒散雙解散如有肝家濕熱急清之宜八正散甚者仙方活命飲如有里焮痛大小便祕脈洪實有力急瀉之宜龍膽瀉肝湯如有小便不利肝脈數急解之宜加味龍膽瀉肝湯加山梔黃柏或服克伐藥而致大便不利急培之宜十全大補湯如表裡俱無但氣血虛弱急補托宜參耆歸術兼用排膿清肝火宜白芷角刺柴胡澤瀉山梔甘草節潰後更須補養宜十全大補湯若不但氣血虛並遺精滑精大便不利腰腳沉重此並下元虛矣急須溫補宜先用六君子湯加補骨脂肉豆蔻數帖再用十全大補湯此大概必用之法婦人亦患便毒於兩拗腫痛腹內有塊不時上攻小便不利屬肝脾氣滯宜四君子湯加芎歸柴胡山梔或間以龍膽瀉肝湯加味逍遙散識此而便毒無難治矣二曰下疳生陰莖上屬肝經濕熱或陰虛火燥或交接過度或受不潔婦人汙穢之毒均能致此而斯症之發又當以陰虛火燥為本腫痛寒熱為標試詳其治腫痛發熱者挾有表也宜四物湯加柴胡山梔腫痛寒熱者肝經濕熱也宜小柴胡湯加黃連澤瀉木通茯苓龍膽草腫痛便澀者濕熱壅滯也宜龍膽瀉肝湯腫痛腐潰者氣血虛而有火也宜小柴胡湯加參朮芎歸日晡倦怠者陽氣虛而下陷也宜補中益氣湯經久不愈者腎水不能生肝木也宜六味丸筋縱癢痛出白津者此即筋疝也宜龍膽瀉肝湯或間服清心蓮子飲脾虛補中益氣湯加山梔龍膽草有肉突出久不愈者必成廣瘡也宜荊防敗毒散以防之有二便俱祕者火熱勝也宜八正散至外治法不過用藥水淨洗宜甘草大豆湯再用藥或敷或摻之宜博金散丁泥散爐甘石散黃柏散香珠散若至腐潰綿延痛在莖之竅或在莖之標則由小腸膀胱不利熱毒傳入肝經故色變紫黑多潰蝕也若蝕盡玉莖則死劉涓子謂如遇此等症須用張子和泄水丸導其濕毒先泄其根次治其標用蔥白黑豆汁泄洗拭乾外以藥敷摻宜服泄水丸後用敷藥或內潰膿不出用追膿散仍用子和泄水丸按涓子此法甚善不可不遵三曰囊癰丹溪云囊癰但以濕熱入肝施治而佐以補陰雖潰脫可愈蓋此症之生屬厥陰肝經不但濕熱下注亦由陰虛所致也故法宜消毒為主兼用補劑若專攻其瘡致陰道愈虛必生他患此囊癰所以為治大概然也若其詳悉為治又有可得舉者初起時但覺赤腫脹痛小便澀滯寒熱作渴當即清肝火分消濕熱宜以黑龍湯吞滋腎丸如因入房太甚或淫邪不軌囊腫如斗小腹脹急小便結澀寒熱大作口渴痰壅則危同反掌治之急急宜腎氣丸料煎吞滋腎丸滲利濕熱腫痛仍在者宜補陰托裡以速其膿而針之若至便祕乃熱毒壅滯也宜托裡消毒飲或不減是熱毒未解也宜清肝益榮湯若膿已成急托膿解毒宜仙方活命飲或潰後皮脫並睪丸懸掛甚至脫出其玉莖半腐亦無害惟宜大補氣血大補脾胃宜托裡散加黃耆故紙五味子菟絲子或四物湯加參術吞腎氣丸外仍塗藥宜白鼠膏自然平復切不可專用寒涼攻伐及滲利損陰乃促之死矣如皮脫者以鮮荷葉包之其皮自生四曰陰頭癰生陰頭上屬厥陰肝經濕熱兼注腎經之病法與囊癰相似宜加味瀉肝湯清肝益榮湯外以鱉甲燒灰雞子白敷之自然痊愈切不可用攻伐損腎傷肝之藥五曰懸癰陰囊之後穀道之前為任脈別絡督沖二脈之會其地肉理如縷毒生其間往往易潰難合若三陰虧損之人又挾濕熱壅滯其地便生懸癰懸癰云者癰形倒垂如懸物也初覺腫痛或小便澀滯可藥以散之宜仙方活命飲龍膽瀉肝湯並加制甘草即或不散雖成亦輕雖潰亦淺其不膿不潰者可藥以補之宜八物湯其膿成者急為針刺如不能收斂或因腎虛宜腎氣丸或因血虛宜四物湯加參術或因氣虛宜四君子湯加芎歸或因脾虛宜補中益氣湯各隨其虛而補之自然毒散肌生久成漏者亦當藥以補塞宜十全大補湯鼠礬丸始終宜服國老膏若誤用寒涼消毒之劑必致不能收口瀝盡氣血而死重則肉潰即損最輕亦成漏管六曰痔癰生穀道左右初起急宜發穴宜發穴散破後急用排膿宜抽膿膏膿盡急當收口宜精義桃花散平肌散始終服藥以大補脾臟為主亦不可遷延時日使成漏管七曰肛內癰俗名盤肛癰生肛門口乃蘊積熱毒於大腸之間或多食煎煿毒物或濕熱流注日深皆致此症初起亦可消散宜仙方活命飲若既潰破恐腐爛難堪必致損命也大約此症必以驅毒為急宜肛內癰方清熱次之宜槐花散毋輕視也陰瘡此瘡有四種一濕陰瘡其原由腎虛風濕邪氣乘之瘙癢成瘡生於隱處浸淫汁出狀如疥癬宜活血驅風散蒺藜散二妒精瘡由壯年久曠房室大欲不遂敗精流入莖內陰上生瘡赤腫潰爛作臼痛癢妨悶初發則如粟粒拂之即痛或流清汁並有生於玉門內極似疳蝕瘡但不痛為異宜涼血解毒丸三陰蝕瘡由熱結下焦經絡澀滯或婦人子宮有敗精停留或月水未斷即與交合交合後又不洗沐汙穢沾滯遂令陰莖連睪丸腫痛小便如淋此所以成是瘡也宜消疳敗毒散涼血解毒丸並以大豆甘草湯洗若不早治經久潰爛侵蝕肌肉膿血不止即為下疳又不愈必為楊梅瘡宜服藥預防宜仙遺糧湯或荊防敗毒散而下疳治法已詳於前今不另贅然則下疳固有不由於陰蝕瘡始者而陰蝕瘡既久未有不成下疳者也四腎臟風瘡由腎虛有火血燥所成初起兩足時熱腳根作痛多於內脛或臁上生瘡如癬大癢搔破成瘡失治漸延腿股並遍身者有之其症或兼晡熱盜汗口燥咽乾吐痰體瘦腰腳倦怠總以補腎為主宜腎氣丸為主佐以四生散脾胃虛者必須補脾養胃宜補中益氣湯為主佐以腎氣丸四生散外用敷藥宜白膠香散逮至瘡生遍身膿水淋漓必兩腿更甚體倦作癢難熬或至經年不愈乃腎中虛火炎熾也宜八味丸外敷豬穢散白膠香散患此症者每兼耳鳴目癢鼻赤脈浮指縫白色等恙宜補瀉丸另有下疰瘡與腎臟風瘡相類生於腳脛或打撲而成其瘡口小皮內㿉得極寬皮之薄卻如竹膜極癢而痛黃水時流經年不愈又易染他人須忌房欲宜活血驅風散外敷檳椰散婦人血風瘡亦與腎臟風瘡相類乃三陰風熱鬱火血燥所致瘙癢不常膿水淋瀝潮熱盜汗宜當歸拈痛湯外塗大馬齒膏世俗竟以陰囊濕癢為腎臟風真屬大謬蓋陰囊濕癢者由於精血不足內為色欲所耗外為風冷所乘風濕毒氣乘虛而入囊下濕癢或生瘡皮脫下注則兩腳亦生瘡癬或耳鳴眼昏宜沐浴長春散外塗牡礬丹烏龍丸椒粉散不可不知分別至婦女亦有患陰瘡者其為類亦不一大約陰戶生瘡皆七情鬱火損傷肝脾又兼濕熱下注也故婦人陰內亦有下疳瘡以月後便行房事穢濁伏流陰道遂生疳瘡與男子妒精瘡略同用黃丹枯礬萹蓄藁本各一兩硫黃荊芥蛇床子各五錢蛇殼一條煅共為末別煎荊芥蛇床子湯洗拭香油調塗之婦人又有陰中䘌瘡少陰脈滑而數陰中或痛或癢如蟲行狀膿水淋瀝亦有陰蝕幾盡者皆由心神煩郁脾胃虛弱致血氣留滯耳當補心養胃宜補心湯藿香養胃湯陰內生瘡方外以藥洗之宜塌腫湯塞之宜雄黃鋭散甚或生蟲癢不可忍發寒熱若蝕入臟腑即死急用蛇床子湯洗拭外以藥摻之宜銅緑散或用梓樹皮焙作末枯礬四分之一麝香少許敷之立效婦人又有陰蝕瘡腫痛濕瘡常出汁水宜洗溻湯疳濕散婦人又有陰腫因胞絡素虛風邪客之乘於陰部血氣相搏之故若氣血虛弱則補之宜補中益氣湯若肝經濕熱則清之宜龍膽瀉肝湯或陰腫痛極便祕欲死宜加味逍遙散外用枳橘尉法或腫痛陰戶不閉寒熱尿澀宜加味逍遙散外用枳橘尉法或腫已消而陰戶仍不閉宜補中益氣湯或時常陰中作痛宜四物湯加防風藁本或但腫作痛宜四物湯加柴胡山梔丹皮龍膽草或不閉而小水淋瀝腹中如有一物攻動而脹痛宜逍遙散加柴胡山梔車前子或腫痛而至潰爛宜逍遙散或憂思過度腫痛而又濕癢出水宜歸脾湯加柴胡山梔丹皮白芍甘草或陰戶兩傍腫痛手足不能舒伸宜四物湯料入乳香末同搗成餅納陰中立效總之陰戶腫痛薛氏謂即婦人便毒方書謂之𤵄痃俗名喑子故其腫痛有在兩拗小腹者由肝經濕熱壅滯宜龍膽瀉肝湯有在玉門內外腫脹者由肝火血虛宜龍膽瀉肝湯加木香及加味逍遙散陰腫之為病為治不同如此若概投散血攻毒之藥其可乎婦人又有陰癢大全云婦女陰癢者是蟲蝕所為三蟲在腸胃之間因臟虛三蟲動作蝕於陰內其蟲作微則癢重乃痛按此陰癢之蟲當屬肝風內煽所化與陰瘡之蟲有異故治法亦必以清肝為主以清其內宜柴胡清肝湯逍遙散外用藥納陰中以制其蟲宜桃仁泥或雄黃末或雞肝納陰中且陰癢而有蟲止是一端有癢而竟無蟲者或由鬱怒傷於肝脾致陰中悶癢必兼胸膈不快內熱作渴飲食無味肢體倦怠小水赤澀宜歸脾湯加山梔逍遙散加山梔或由肝脾氣虛濕熱下注致陰內痛癢不時出水食少體倦宜歸脾湯加丹皮山梔白芍甘草或由肝脾鬱怒元氣虧損兼有濕熱致陰中癢痛內熱倦怠飲食少思宜參苓歸芍耆朮升柴丹皮山梔車前陳皮此皆但癢而無蟲者也亦有下疽痛癢難當腐爛生蛆所下如柿汁臭穢及心中㽲痛悶絶虛煩甚者則不治婦人又有陰冷由肝經有濕熱風冷又外乘之也如冷而小腹痞痛小便赤澀宜龍膽瀉肝湯如冷而內熱寒熱經候不調宜加味逍遙散如冷而寒熱體倦飲食少思宜加味四君子湯如冷而鬱怒發熱少寐懶食宜加味歸脾湯如冷而口苦脅脹寒熱小便黃澀必先祛利濕熱宜龍膽湯再調補氣血宜加味逍遙散如冷而寒熱脅脹嘔吐苦水兩股腫痛小便赤澀宜先用小柴胡湯加山梔次用龍膽瀉肝湯即效如冷而小便澄清腹中亦冷飲食少思下元虛冷大便溏泄宜八味丸服一兩月自愈或又謂陰冷之症因勞傷子臟風冷客之之故此亦有然也婦人又有陰㿗硬腫如卵狀極痛難忍皆由濕凝血結之故宜用攻散之劑宜隨症之左右取穿山甲之左右邊炒為末酒下二錢婦人又有陰吹由胃虛其濁氣下泄注於陰中甚喧若放屁連聲不絶者宜亂髮洗淨雞子大三團豬油四兩熬膏每三錢開水下婦人又有交接出血陰痛乃房事有傷肝火動脾而不能攝血也宜補中益氣湯若血出過多而見他症只當調補肝脾或交接時陽道違理及他物所傷犯血流瀝不止宜釜底墨納之或童女交接陽道違理血出不止宜發灰青布灰塗之婦人又有陰痔凡人九竅有肉突出者皆名為痔今陰中有肉突出故即名陰痔俗謂之茄子疾往往心躁如連綿黃水出者易治白水出者難治宜枳殼末煎湯熏洗將帛包渣入陰中即日漸消婦人産後又有陰脫由努力太過如脫肛狀逼迫腫痛清水續續小便淋露急用補托宜當歸黃耆飲外以藥敷宜硫黃烏賊骨各五錢五倍子二錢半為末敷患處即效婦人又有陰挺已詳前陰後陰病篇中不贅至於臀癰臀居少腹之後屬膀胱分野陰中之陰也道則遠位則僻雖膀胱經本屬多血然氣運不到血亦罕至比之他處尤為吃緊中年以後最忌此處生癰若參之脈症見有虛弱便當大補氣血方可保全若用尋常瘍科家驅熱解毒之藥恐擔延事勢虛虛之禍不免故初起未成膿者用隔蒜灸法庶乎可散若欲作膿則必潰矣宜內托羌活湯痛甚者宜仙方活命飲若腫硬作痛形氣虛邪氣實也宜托裡消毒散仙方活命飲若至潰後尤宜補養宜加味十全湯人參養榮湯以固其根本倘失補養其患尤在結痂之後設使變症多端則成惡候其或胃氣脫陷腸鳴腹痛神昏便溏所謂寒變內陷緩則不治者有之宜托裡溫中湯其或脾胃虛寒手足厥冷飲食不入嘔逆吐瀉者有之宜附子理中湯其或真陽虧損或誤下或膿血過多失於補托致上氣喘急自汗盜汗氣短頭暈者有之宜姜附湯其或氣血虛胃火盛而發渴者有之宜竹葉黃耆湯其或命門火衰不能生土致脾胃虛寒不思食食不化臍腹疼痛夜多漩溺者有之宜加減八味丸其或中氣虛諸藥不應或用藥失宜耗傷元氣虛症蜂起但用此補中氣諸症自退者有之宜參朮膏其或元氣本弱又因涼藥傷胃飲食少思或作嘔瀉等恙者有之宜托裡健中湯其或脾土素虛且寒水反侮土致飲食少思嘔吐泄瀉者有之宜托裡益黃湯其或一切不足之症不膿不潰潰後發熱惡寒肌肉消瘦飲食少思睡臥不寧盜汗不止者有之宜托裡養榮湯其或六郁內傷脾胃受制飲食不進倦怠不安者有之宜托裡越鞠湯其或毒邪深固色變紫黑者有之宜回毒金銀花湯其或腎水竭口燥舌乾者有之宜五味子湯其或熱毒上攻致咽喉口舌生瘡者有之宜犀角膏其或潰破後毒熱未退大疼不止日夜坐臥不安者有之宜止痛神功散以上種種皆屬惡候其方藥亦隨症施治無不各當者但種種惡候一切癰疽腫毒皆能變生至此不獨臀癰為然也雖詳於此固貴當局之通變耳總之臀癰一症必旬日收斂方保無虞若不慎房室不節飲食綿延成漏則為終身之患至臀癰之屬有騎馬墜生垂珠左右兩處此處微實皮薄而紋緊口亦難合易成漏管初起急宜消散宜散毒飲子有腆䐐近骨難愈防成漏管有鋭疽生臀尖上瘍科書所謂發於尻者是也其狀赤而且堅不急治三十日死有穿襠發生背脊盡處亦易成漏當急治有挽疽俗名稱鉤瘡生骶骨上初發如小豆後大亦不過如櫻桃痠疼之甚身便彎折不能直立宜用圍藥移逼偏旁處方可刺膿以上臀癰所屬五症皆為要害吃緊皆防成漏甚則殺人其治法於初起時總當急為消散俱宜仙方活命飲加羌活黃柏或金線重樓或腫痛甚尺脈緊按之無力用內托法宜內托羌活湯其壯實人或汗宜勝金丹或下宜一粒金丹老弱用補宜十全大補湯各隨所宜不可拘執不幸而竟至膿潰其治法總與臀癰相仿是在醫者神而明之也脈法瘡瘍脈論曰脈沉實發熱煩躁外不焮腫赤痛其邪乃深伏在裡宜先疏通浮大以數焮腫在外當托裡恐邪入內脈不沉不浮內外症宜審其經當和榮衛脈數身不熱為內有癰膿脈數應發熱而反惡寒者若有痛處即此處發癰若脈數不時見當生惡瘡鰲按此段脈論凡一身瘡瘍之脈皆然不特指前陰後陰外症言也醫者知之治前陰後陰病方七十三五精丸陰痿秋石茯苓山藥陽起石鹿角霜等分酒糊丸上丹又五味子八兩菟絲子蛇床子百部根杜仲茯苓防風巴戟肉蓯蓉山藥遠志杞子柏子仁各二兩蜜丸空心鹽湯下五七十丸還少丹又熟地杞子各兩半山藥牛膝遠志山萸巴戟茯苓五味子菖蒲肉蓯蓉楮實子杜仲茴香各一兩棗肉丸空心鹽湯下三五十丸亦有鬱火甚而致痿者非還少丹所能起當服黃柏知母清火堅腎之藥九仙靈應散又炮附子蛇床子紫梢花石菖蒲遠志海螵蛸丁香木鱉子各二錢小茴錢半每粗末五錢水三碗半溫洗並陰囊日二次留水再溫洗多洗尤妙達郁湯又升麻柴胡川芎香附刺蒺藜桑皮橘葉金匱腎氣丸陰冷熟地山藥山萸丹皮茯苓澤瀉附子肉桂牛膝車前子加減內固丸又肉蓯蓉巴戟山藥山萸菟絲子各三兩破故紙二兩半金石斛胡蘆巴各二兩小茴一兩附子五錢蜜丸鹽湯下十補丸又附子一兩切如豆大用防風一兩鹽四兩黑豆一合同炒以附子裂為度去諸藥只取附子胡蘆巴木香巴戟肉桂川楝子肉元胡索蓽澄茄茴香破故紙各一兩酒糯米粉糊丸硃砂為衣酒下三五十丸吳茱萸湯又川烏細辛各七分半吳萸五分良薑當歸肉桂乾薑各二分半回春散又歌曰一錢白礬八分丹二分胡椒細細研焰硝一分共四味好醋調勻手內攤男左女右合陰處渾身是汗濕衣衫此方用者如神效不義之人不可傳助陽散又乾薑牡蠣各一兩為末火酒調稠搽手上用雙手揉外腎婦人揉兩乳蟬退散陰腫蟬退五錢水煎洗腫處日三次內服五苓散合三疝湯加青檳榔木通空心煎服五苓散又白朮肉桂茯苓豬苓澤瀉三疝湯又車前子二錢四分茴香錢六分蔥白錢二分砂仁八分三白散又白醜頭末二兩桑白皮白朮陳皮木通各二錢半每末二錢蔥白或薑湯下橘核散又橘核錢半桃仁十五粒山梔一錢川烏吳萸各五分各炒橘核單止痛烏頭散寒鬱山梔除濕熱又引烏頭速下不令胃中停留用之甚捷橘核丸又橘核炒海藻鹽酒炒昆布鹽酒炒海帶鹽水洗桃仁麩炒川楝子炒黃各一兩元胡索酒炒厚朴薑汁炒枳實肉桂木香木通各五錢酒糊丸酒或鹽湯下久不消加醋煮硇砂二錢此指㿉疝卵腫不消言柴胡清肝湯陰縱柴胡山梔各錢半人參黃芩川芎各一錢連